          '</div>'+
          '<div style="font-size:28px;font-weight:700;color:'+(d.pScore!==null?scoreCol:'var(--g3)')+';margin-bottom:6px">'+(d.pScore!==null?d.pScore+'%':'--')+'</div>'+
          '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--g3);margin-bottom:3px"><span>Eval</span><span style="font-weight:700;color:'+( d.evalAvg!==null?'#166534':'var(--g3)')+'">'+(d.evalAvg!==null?d.evalAvg+'%':'--')+'</span></div>'+
          '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--g3)"><span>Coaching</span><span style="font-weight:700;color:'+(d.cScore!==null?'#1E40AF':'var(--g3)')+'">'+(d.cScore!==null?d.cScore+'%':'--')+'</span></div>'+
          '</div>';
      }).join('');

      const teamBars=last6.map(m=>{
        const allEvals=D.evaluations.filter(e=>(e.month||e.eval_date?.slice(0,7))===m);
        const sc=allEvals.length?Math.round(allEvals.reduce((s,e)=>s+evalScore(e),0)/allEvals.length):0;
        const col=sc>=75?'#3B82F6':sc>=60?'#16A34A':sc>=40?'#D97706':'#DC2626';
        return'<div style="flex:1;text-align:center">'+
          '<div style="font-size:10px;color:var(--g3);margin-bottom:3px">'+monthLabel(m)+'</div>'+
          trendBar(sc,col)+
          '<div style="font-size:10px;font-weight:700;margin-top:3px;color:'+col+'">'+sc+'%</div></div>';
      }).join('');

      return segHtml+
        '<div class="stats" style="margin-bottom:14px">'+
          '<div class="stat" style="background:#FFF0E6;border:1px solid #FFB380"><div class="stat-label" style="color:#D94D00">Team performance</div><div class="stat-value" style="color:#FF5900">'+teamAvgPerf+'%</div></div>'+
          '<div class="stat green"><div class="stat-label">Avg evaluation</div><div class="stat-value">'+teamAvgEval+'%<span style="font-size:11px;color:var(--g3);font-weight:400;margin-left:4px">×'+ps.evalWeight+'%</span></div></div>'+
          '<div class="stat blue"><div class="stat-label">Avg coaching</div><div class="stat-value">'+teamAvgCoach+'%<span style="font-size:11px;color:var(--g3);font-weight:400;margin-left:4px">×'+(100-ps.evalWeight)+'%</span></div></div>'+
          '<div class="stat"><div class="stat-label">vs last month</div><div class="stat-value" style="font-size:18px;margin-top:3px;color:'+diffCol+'">'+diffLabel+'</div></div>'+
        '</div>'+
        '<div style="display:grid;grid-template-columns:repeat('+Math.min(sorted.length,4)+',1fr);gap:10px;margin-bottom:14px">'+patCards+'</div>'+
        '<div class="tcard" style="padding:14px">'+
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'+
            '<div style="font-size:11px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em">6-month performance trend</div>'+
            monthSel+
          '</div>'+
          '<div style="overflow-x:auto"><table style="min-width:600px;width:100%"><thead><tr>'+
            '<th style="font-size:10px;white-space:nowrap">ID</th>'+
            '<th class="lt">Patroller</th>'+
            last6.map(m=>'<th class="r">'+monthLabel(m)+'</th>').join('')+
            '<th class="r">Trend</th></tr></thead><tbody>'+trendRows+'</tbody></table></div>'+
          '<div style="margin-top:16px;border-top:0.5px solid var(--g2);padding-top:14px">'+
              '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'+
              '<div style="font-size:11px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em">Full performance log</div>'+
              '<div style="display:flex;gap:8px;align-items:center">'+
                '<select onchange="D.perfLogMonth=this.value;render()" style="padding:4px 8px;border-radius:7px;border:0.5px solid var(--g2);font-size:11px;font-family:inherit">'+logMonthOpts+'</select>'+
                '<button onclick="window._downloadPerfLog()" class="btn" style="padding:5px 12px;font-size:11px"><i class="ti ti-download"></i> Export CSV</button>'+
              '</div>'+
            '</div>'+
            '</div>'+
            '<div style="overflow-x:auto"><table style="min-width:500px;width:100%"><thead><tr>'+
              '<th style="font-size:10px">Month</th>'+
              '<th style="font-size:10px;white-space:nowrap">ID</th>'+
              '<th class="lt">Patroller</th>'+
              '<th class="r">Eval</th>'+
              '<th class="r">Coaching</th>'+
              '<th class="r">Performance</th>'+
            '</tr></thead><tbody>'+logTableRows+(logRows.length>100?'<tr><td colspan="6" style="text-align:center;font-size:10px;color:var(--g3);padding:8px">Showing top 100 rows — export CSV for full data</td></tr>':'')+'</tbody></table></div>'+
          '</div>'+
        '</div>';
    }

    if(subTab==='evaluation'){
      const evalTableRows=sorted.map(({p,evalAvg,evalAvgRaw,evals},i)=>{
        const isBest=i===0&&evalAvg!==null;
        return'<tr '+(isBest?'style="background:rgba(255,89,0,.04)"':'')+'>'+
          '<td style="font-size:11px;font-family:monospace;color:var(--g4);white-space:nowrap">'+(p.patroller_id_num||'--')+'</td><td class="lt" style="font-weight:600">'+(isBest?'<i class="ti ti-trophy" style="color:#FF5900;font-size:10px;margin-right:3px"></i>':'')+p.name+'</td>'+
          '<td style="color:var(--g3);font-size:11px">'+evals+'</td>'+
          '<td style="font-size:11px">'+(evalAvgRaw!==null?evalAvgRaw+' / 4':'--')+'</td>'+
          '<td>'+(evalAvg!==null?ePill(evalAvg):'<span style="font-size:10px;color:var(--g3)">--</span>')+'</td>'+
          '<td><button onclick="openEvalEdit(\''+p.id+'\')" style="font-size:10px;padding:2px 7px;border-radius:5px;border:0.5px solid var(--g2);background:none;cursor:pointer;font-family:inherit;color:var(--g3)">Edit</button></td>'+
          '</tr>';
      }).join('');

      const recentRows=D.evaluations.filter(e=>(e.month||e.eval_date?.slice(0,7))===selMonth).slice(0,10).map(e=>{
        const pat=D.patrollers.find(p=>p.id===e.patroller_id);
        const pct=evalScore(e);
        const dt=new Date(e.eval_date).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
        return'<tr><td class="lt" style="font-weight:600">'+(pat?.name||'--')+'</td><td style="font-size:11px;color:var(--g3)">'+dt+'</td><td style="font-size:11px;color:var(--g3)">'+(e.location||'--')+'</td><td>'+ePill(pct)+'</td><td style="font-size:11px;color:var(--g3)">'+(e.evaluator_name||'--')+'</td></tr>';
      }).join('');

      return segHtml+
        '<div style="display:grid;grid-template-columns:360px 1fr;gap:12px">'+
          '<div class="tcard" style="padding:14px">'+
            '<div style="font-size:11px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px"><i class="ti ti-clipboard-plus" style="margin-right:4px"></i>New evaluation</div>'+
            '<div class="fg"><label>Patroller</label><select id="ev-patroller"><option value="">-- Select --</option>'+pts.map(p=>'<option value="'+p.id+'">'+p.name+'</option>').join('')+'</select></div>'+
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+
              '<div class="fg"><label>Location</label><input type="text" id="ev-location" placeholder="e.g. Seef, HRC"></div>'+
              '<div class="fg"><label>Date</label><input type="date" id="ev-date" value="'+todayStr()+'"></div>'+
            '</div>'+
            '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">'+
              '<span style="font-size:9px;font-weight:700;padding:2px 5px;border-radius:8px;background:#FEE2E2;color:#991B1B">1 Not performing</span>'+
              '<span style="font-size:9px;font-weight:700;padding:2px 5px;border-radius:8px;background:#FEF3C7;color:#92400E">2 Low</span>'+
              '<span style="font-size:9px;font-weight:700;padding:2px 5px;border-radius:8px;background:#DCFCE7;color:#166534">3 Performing</span>'+
              '<span style="font-size:9px;font-weight:700;padding:2px 5px;border-radius:8px;background:#DBEAFE;color:#1E40AF">4 Good</span>'+
            '</div>'+
            '<div style="display:grid;grid-template-columns:1fr;gap:0">'+
              EVAL_QUESTIONS.map(q=>qFormRow(q,0,'rb')).join('')+
            '</div>'+
            '<div class="fg" style="margin-top:8px"><label>Comment</label><textarea id="ev-comment" rows="2" style="width:100%;padding:7px 9px;border-radius:7px;border:0.5px solid var(--g2);font-family:inherit;font-size:12px;resize:vertical"></textarea></div>'+
            '<button onclick="submitEvaluation()" class="btn btn-primary" style="width:100%;padding:10px;justify-content:center"><i class="ti ti-circle-check"></i>Submit — score on save</button>'+
          '</div>'+
          '<div>'+
            '<div class="tcard" style="padding:14px;margin-bottom:10px">'+
              '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'+
                '<div style="font-size:11px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em"><i class="ti ti-chart-bar" style="margin-right:4px"></i>Evaluation summary</div>'+
                monthSel+
              '</div>'+
              (sorted.length===0?'<div style="padding:20px;text-align:center;color:var(--g3)">No evaluations for '+selMonth+'</div>':
                '<div class="t-scroll"><table style="min-width:400px"><thead><tr><th style="font-size:10px;white-space:nowrap">ID</th><th class="lt">Patroller</th><th>Evals</th><th>Avg rating</th><th>Eval score</th><th></th></tr></thead><tbody>'+evalTableRows+'</tbody></table></div>')+
            '</div>'+
            '<div class="tcard" style="padding:14px">'+
              '<div style="font-size:11px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px"><i class="ti ti-list" style="margin-right:4px"></i>Recent evaluations</div>'+
              (recentRows?'<div class="t-scroll"><table><thead><tr><th style="font-size:10px;white-space:nowrap">ID</th><th class="lt">Patroller</th><th>Date</th><th>Location</th><th>Score</th><th>By</th></tr></thead><tbody>'+recentRows+'</tbody></table></div>':
                '<div style="padding:20px;text-align:center;color:var(--g3)">No evaluations for '+selMonth+'</div>')+
            '</div>'+
          '</div>'+
        '</div>';
    }

    if(subTab==='coaching'){
      const coachMonths=[...new Set([...D.coachingAssignments.map(a=>a.month||a.assigned_date?.slice(0,7)).filter(Boolean),curMonth])].sort().reverse();
      const selCoachMonth=D.coachingMonth||curMonth;
      const cMonthSel='<select onchange="D.coachingMonth=this.value;render()" style="padding:4px 8px;border-radius:7px;border:1.5px solid var(--g2);font-size:11px;font-family:inherit">'+
        coachMonths.map(m=>'<option value="'+m+'" '+(m===selCoachMonth?'selected':'')+'>'+m+'</option>').join('')+'</select>';

      const monthAssignments=D.coachingAssignments.filter(a=>(a.month||a.assigned_date?.slice(0,7))===selCoachMonth);
      const monthCaseIds=new Set(monthAssignments.map(a=>a.case_id));
      const filteredCases=D.coachingCases.filter(c=>monthCaseIds.has(c.id)||(c.batch_date&&c.batch_date.startsWith(selCoachMonth)&&!D.coachingAssignments.find(a=>a.case_id===c.id)));
      const unassignedCases=filteredCases.filter(c=>!D.coachingAssignments.find(a=>a.case_id===c.id));
      const totalDone=monthAssignments.filter(a=>a.status==='completed').length;
      const totalPending=monthAssignments.filter(a=>a.status==='pending').length;
      let totalSLA=0,totalDupe=0;

      const coachBreakdown=pts.map(p=>{
        const assigned=monthAssignments.filter(a=>a.patroller_id===p.id);
        if(!assigned.length)return null;
        let slaBreach=0,duplicate=0;
        assigned.forEach(a=>{
          const c=D.coachingCases.find(x=>x.id===a.case_id);if(!c)return;
          const batchTime=new Date(c.created_at).getTime();
          if(a.status==='completed'&&a.completed_at){if(new Date(a.completed_at).getTime()-batchTime>24*3600000)slaBreach++;}
          else if(a.status==='pending'){if(Date.now()-batchTime>24*3600000)slaBreach++;}
        });
        const completed=assigned.filter(a=>a.status==='completed');
        const seen={};
        completed.forEach(a=>{
          const c=D.coachingCases.find(x=>x.id===a.case_id);if(!c)return;
          const key=c.rider_id+'|'+c.violation_type;seen[key]=(seen[key]||0)+1;
        });
        Object.values(seen).forEach(cnt=>{if(cnt>1)duplicate+=(cnt-1)*2;});
        const cs=Math.max(0,100-slaBreach-duplicate);
        totalSLA+=slaBreach;totalDupe+=duplicate;
        return{p,assigned:assigned.length,done:assigned.filter(a=>a.status==='completed').length,slaBreach,duplicate,cs};
      }).filter(Boolean).sort((a,b)=>b.cs-a.cs);

      const coachRows=coachBreakdown.map(({p,assigned,done,slaBreach,duplicate,cs},i)=>
        '<tr '+(i===0?'style="background:rgba(255,89,0,.04)"':'')+'>'+
        '<td style="font-size:11px;font-family:monospace;color:var(--g4);white-space:nowrap">'+(p.patroller_id_num||'--')+'</td><td class="lt" style="font-weight:600">'+p.name+'</td>'+
        '<td style="font-size:11px">'+assigned+'</td>'+
        '<td style="font-weight:600;color:#166534">'+done+'</td>'+
        '<td style="font-weight:600;color:#DC2626">'+slaBreach+'</td>'+
        '<td style="font-weight:600;color:#D97706">'+duplicate+'</td>'+
        '<td>'+pPill(cs)+'</td></tr>'
      ).join('');

      const caseRows=filteredCases.slice(0,15).map(c=>{
        const asgn=D.coachingAssignments.find(a=>a.case_id===c.id);
        const pat=asgn?D.patrollers.find(p=>p.id===asgn.patroller_id):null;
        const batchTime=new Date(c.created_at).getTime();
        let slaStatus,slaStyle;
        if(asgn?.status==='completed'&&asgn.completed_at){
          const diff=new Date(asgn.completed_at).getTime()-batchTime;
          if(diff<=24*3600000){slaStatus='On time';slaStyle='background:#DCFCE7;color:#166534';}
          else{const h=Math.round(diff/3600000);slaStatus='+'+h+'h breach';slaStyle='background:#FEE2E2;color:#991B1B';}
        }else if(asgn?.status==='pending'){
          if(Date.now()-batchTime>24*3600000){slaStatus='Breached';slaStyle='background:#FEE2E2;color:#991B1B';}
          else{slaStatus='In SLA';slaStyle='background:#FEF3C7;color:#92400E';}
        }else{slaStatus='Unassigned';slaStyle='background:var(--g1);color:var(--g3)';}
        const statStyle=asgn?.status==='completed'?'background:#DCFCE7;color:#166534':asgn?.status==='pending'?'background:#FEF3C7;color:#92400E':'background:var(--g1);color:var(--g3)';
        return'<tr><td class="lt" style="font-size:11px;font-weight:600">'+(c.rider_name||'--')+'</td>'+
          '<td style="font-size:11px">'+(pat?.name||'--')+'</td>'+
          '<td style="font-size:10px;color:var(--g3)">'+new Date(c.created_at).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'})+'</td>'+
          '<td style="font-size:10px;color:var(--g3)">'+(asgn?.completed_at?new Date(asgn.completed_at).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'}):'--')+'</td>'+
          '<td><span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;'+slaStyle+'">'+slaStatus+'</span></td>'+
          '<td><span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;'+statStyle+'">'+(asgn?.status==='completed'?'Done':asgn?.status==='pending'?'Pending':'Unassigned')+'</span></td>'+
          '</tr>';
      }).join('');

      return segHtml+
        '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px">'+
          '<div style="background:var(--g1);border-radius:10px;padding:12px"><div style="font-size:10px;font-weight:600;color:var(--g3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Total cases</div><div style="font-size:20px;font-weight:700;color:#FF5900">'+filteredCases.length+'</div></div>'+
          '<div style="background:#DCFCE7;border-radius:10px;padding:12px;border:0.5px solid #86EFAC"><div style="font-size:10px;font-weight:600;color:#166534;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">On time</div><div style="font-size:20px;font-weight:700;color:#166534">'+totalDone+'</div></div>'+
          '<div style="background:#FEE2E2;border-radius:10px;padding:12px;border:0.5px solid #FCA5A5"><div style="font-size:10px;font-weight:600;color:#DC2626;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">SLA breached</div><div style="font-size:20px;font-weight:700;color:#DC2626">'+totalSLA+'</div></div>'+
          '<div style="background:#FEF3C7;border-radius:10px;padding:12px;border:0.5px solid #FCD34D"><div style="font-size:10px;font-weight:600;color:#92400E;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Duplicates</div><div style="font-size:20px;font-weight:700;color:#D97706">'+totalDupe+'</div></div>'+
        '</div>'+
        '<div class="tcard" style="padding:14px;margin-bottom:10px">'+
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'+
            '<div style="font-size:11px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em"><i class="ti ti-school" style="margin-right:4px"></i>Coaching score breakdown</div>'+
            cMonthSel+
            (unassignedCases.length>0?'<button onclick="D.coachingMonth=\''+selCoachMonth+'\';autoAssignCoaching()" class="btn btn-primary" style="margin-left:auto;padding:4px 10px;font-size:11px"><i class="ti ti-users"></i>Auto-assign '+unassignedCases.length+'</button>':'')+
          '</div>'+
          (coachRows?'<div class="t-scroll"><table><thead><tr><th style="font-size:10px;white-space:nowrap">ID</th><th class="lt">Patroller</th><th>Assigned</th><th style="color:#166534">On time</th><th style="color:#DC2626">SLA −1pt</th><th style="color:#D97706">Duplicate −2pt</th><th style="background:#DBEAFE;color:#0C447C">Score</th></tr></thead><tbody>'+coachRows+'</tbody></table></div>':
            '<div style="padding:20px;text-align:center;color:var(--g3)">No coaching data for '+selCoachMonth+'</div>')+
        '</div>'+
        '<div class="tcard" style="padding:14px">'+
          '<div style="font-size:11px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px"><i class="ti ti-list" style="margin-right:4px"></i>Cases with SLA status</div>'+
          (caseRows?'<div class="t-scroll"><table style="min-width:650px"><thead><tr><th class="lt">Rider</th><th>Patroller</th><th>Assigned at</th><th>Completed at</th><th>SLA</th><th>Status</th></tr></thead><tbody>'+caseRows+'</tbody></table></div>':
            '<div style="padding:20px;text-align:center;color:var(--g3)">No cases for '+selCoachMonth+'</div>')+
        '</div>';
    }

    if(subTab==='audit'){
      return segHtml+
        '<div class="tcard" style="padding:14px;margin-bottom:10px">'+
          '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'+
            '<div style="font-size:11px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em"><i class="ti ti-settings" style="margin-right:4px"></i>Target settings <span style="font-size:10px;color:var(--g3);font-weight:400;text-transform:none;letter-spacing:0">Admin / TL only</span></div>'+
            '<button onclick="savePerfSettings()" class="btn btn-primary" style="padding:5px 12px;font-size:11px"><i class="ti ti-circle-check"></i>Save settings</button>'+
          '</div>'+
          '<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px">'+
            '<div class="fg"><label>Total target</label><input type="number" id="ps-total" value="'+ps.targetTotal+'"></div>'+
            '<div class="fg"><label>Unique target</label><input type="number" id="ps-unique" value="'+ps.targetUnique+'"></div>'+
            '<div class="fg"><label>Working hrs</label><input type="number" id="ps-hours" value="'+ps.workingHours+'"></div>'+
            '<div class="fg"><label>Total / hr</label><input type="number" id="ps-rate-total" value="'+ps.rateTotal+'"></div>'+
            '<div class="fg"><label>Unique / hr</label><input type="number" id="ps-rate-unique" value="'+ps.rateUnique+'"></div>'+
            '<div class="fg"><label>Task threshold</label><input type="number" id="ps-threshold" value="'+ps.taskThreshold+'"></div>'+
          '</div>'+
          '<div style="font-size:10px;color:var(--g3);margin-top:8px;padding-top:8px;border-top:0.5px solid var(--g2)"><i class="ti ti-info-circle" style="font-size:10px;margin-right:3px"></i>Eval weight is also adjustable — current: Eval <strong>'+ps.evalWeight+'%</strong> · Coaching <strong>'+(100-ps.evalWeight)+'%</strong>&nbsp;&nbsp;<input type="number" id="ps-eval-weight" value="'+ps.evalWeight+'" style="width:60px;padding:3px 6px;border-radius:5px;border:0.5px solid var(--g2);font-size:11px;font-family:inherit"> % eval weight</div>'+
        '</div>'+
        '<div class="tcard" style="padding:14px">'+
          '<div style="font-size:11px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px"><i class="ti ti-target" style="margin-right:4px"></i>Adjusted audit targets — '+selMonth+'&nbsp;&nbsp;'+monthSel+'</div>'+
          '<div class="t-scroll"><table><thead><tr>'+
            '<th class="lt">Patroller</th>'+
            '<th>Task hrs ('+selMonth+')</th>'+
            '<th>Hrs above '+ps.taskThreshold+'h</th>'+
            '<th style="color:#166534">Adj. total target</th>'+
            '<th style="color:#1E40AF">Adj. unique target</th>'+
            '<th>Reduction</th>'+
          '</tr></thead><tbody>'+
          perfData.map(({p,taskHrs,adj})=>{
            const overLabel=adj.over>0?adj.over+'h over':'<span style="color:var(--g3)">—</span>';
            const redLabel=adj.over>0?'<span style="font-weight:700;color:#DC2626">−'+(ps.targetTotal-adj.adjTotal)+' / −'+(ps.targetUnique-adj.adjUnique)+'</span>':'<span style="font-size:10px;color:var(--g3)">No adj.</span>';
            return'<tr>'+
              '<td style="font-size:11px;font-family:monospace;color:var(--g4);white-space:nowrap">'+(p.patroller_id_num||'--')+'</td><td class="lt" style="font-weight:600">'+p.name+'</td>'+
              '<td style="font-weight:600">'+taskHrs+'h</td>'+
              '<td style="font-weight:600;color:#D97706">'+overLabel+'</td>'+
              '<td style="font-weight:700;color:#166534">'+adj.adjTotal.toLocaleString()+'</td>'+
              '<td style="font-weight:700;color:#1E40AF">'+adj.adjUnique.toLocaleString()+'</td>'+
              '<td>'+redLabel+'</td>'+
              '</tr>';
          }).join('')+
          '</tbody></table></div>'+
          '<div style="font-size:10px;color:var(--g3);margin-top:8px;padding-top:8px;border-top:0.5px solid var(--g2)">Task hours auto-pulled from completed tasks this month · Formula: Base − ((task_hrs − '+ps.taskThreshold+'h) × rate/hr)</div>'+
        '</div>';
    }
    return segHtml;
  }

  // ── PATROLLER VIEW ──
  const myEvals=myPat?D.evaluations.filter(e=>e.patroller_id===myPat.id&&(e.month||e.eval_date?.slice(0,7))===curMonth):[];
  const myEvalAvg=myEvals.length?Math.round(myEvals.reduce((s,e)=>s+evalScore(e),0)/myEvals.length):null;
  const myCScore=myPat?coachingScore(myPat.id,curMonth):null;
  const myPScore=(myEvalAvg!==null&&myCScore!==null)?perfScore(myEvalAvg,myCScore,ps):null;
  const myTaskHrs=myPat?getPatrollerTaskHours(myPat.id,curMonth):0;
  const myAdj=getAdjustedTarget(myTaskHrs,ps);
  const myMonths=[...new Set(D.evaluations.filter(e=>myPat&&e.patroller_id===myPat.id).map(e=>e.month||e.eval_date?.slice(0,7)).filter(Boolean))].sort().reverse();
  const last3p=myMonths.slice(0,3);

  if(subTab==='myperformance'){
    const myTrendBars=last3p.map(m=>{
      const ev=D.evaluations.filter(e=>myPat&&e.patroller_id===myPat.id&&(e.month||e.eval_date?.slice(0,7))===m);
      const ea=ev.length?Math.round(ev.reduce((s,e)=>s+evalScore(e),0)/ev.length):null;
      const cs=myPat?coachingScore(myPat.id,m):null;
      const sc=(ea!==null&&cs!==null)?perfScore(ea,cs,ps):0;
      const col=sc>=75?'#3B82F6':sc>=60?'#16A34A':sc>=40?'#D97706':'#DC2626';
      return'<div style="flex:1;text-align:center">'+
        '<div style="font-size:10px;color:var(--g3);margin-bottom:3px">'+monthLabel(m)+'</div>'+
        trendBar(sc,col)+
        '<div style="font-size:10px;font-weight:700;margin-top:3px;color:'+col+'">'+sc+'%</div></div>';
    }).join('');

    return segHtml+
      '<div style="background:#411517;border-radius:14px;padding:18px;margin-bottom:12px;color:#fff">'+
        '<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">'+
          '<div style="width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700">'+ini(D.profile?.full_name)+'</div>'+
          '<div><div style="font-size:16px;font-weight:700">'+(D.profile?.full_name||'')+'</div><div style="font-size:11px;opacity:.5;margin-top:2px">Performance report · '+curMonth+'</div></div>'+
          '<div style="margin-left:auto;text-align:right"><div style="font-size:10px;opacity:.5;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">Performance score</div>'+
          '<div style="font-size:32px;font-weight:700;color:#FF5900">'+(myPScore!==null?myPScore+'%':'--')+'</div></div>'+
        '</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">'+
          '<div style="background:rgba(255,255,255,.1);border-radius:10px;padding:12px;text-align:center"><div style="font-size:10px;opacity:.5;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Evaluation</div><div style="font-size:22px;font-weight:700;color:#4ADE80">'+(myEvalAvg!==null?myEvalAvg+'%':'--')+'</div><div style="font-size:9px;opacity:.4;margin-top:3px">× '+ps.evalWeight+'% weight</div></div>'+
          '<div style="background:rgba(255,255,255,.1);border-radius:10px;padding:12px;text-align:center"><div style="font-size:10px;opacity:.5;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Coaching</div><div style="font-size:22px;font-weight:700;color:#93C5FD">'+(myCScore!==null?myCScore+'%':'--')+'</div><div style="font-size:9px;opacity:.4;margin-top:3px">× '+(100-ps.evalWeight)+'% weight</div></div>'+
          '<div style="background:rgba(255,89,0,.3);border-radius:10px;padding:12px;text-align:center;border:1px solid rgba(255,89,0,.5)"><div style="font-size:10px;color:#FFB380;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Final</div><div style="font-size:22px;font-weight:700;color:#FF5900">'+(myPScore!==null?myPScore+'%':'--')+'</div><div style="font-size:9px;color:#FFB380;margin-top:3px">'+(myEvalAvg!==null&&myCScore!==null?'('+myEvalAvg+'×.'+Math.round(ps.evalWeight/10)+')+('+myCScore+'×.'+(10-Math.round(ps.evalWeight/10))+')':'')+'</div></div>'+
        '</div>'+
      '</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'+
        '<div class="tcard" style="padding:14px">'+
          '<div style="font-size:10px;font-weight:700;color:var(--g3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">3-month trend</div>'+
          (last3p.length?'<div style="display:flex;gap:8px">'+myTrendBars+'</div>':'<div style="padding:16px;text-align:center;color:var(--g3);font-size:12px">No data yet</div>')+
        '</div>'+
        '<div class="tcard" style="padding:14px">'+
          '<div style="font-size:10px;font-weight:700;color:var(--g3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Score breakdown</div>'+
          '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--g1);font-size:12px"><span>Evaluation ('+ps.evalWeight+'%)</span><span style="font-weight:700;color:#166534">'+(myEvalAvg!==null?myEvalAvg+'% → '+((myEvalAvg*ps.evalWeight/100).toFixed(1)):'--')+'</span></div>'+
          '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--g1);font-size:12px"><span>Coaching ('+(100-ps.evalWeight)+'%)</span><span style="font-weight:700;color:#1E40AF">'+(myCScore!==null?myCScore+'% → '+((myCScore*(100-ps.evalWeight)/100).toFixed(1)):'--')+'</span></div>'+
          '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px;font-weight:700"><span>Performance score</span><span style="color:#FF5900">'+(myPScore!==null?myPScore+'%':'--')+'</span></div>'+
        '</div>'+
      '</div>';
  }

  if(subTab==='mycoaching'){
    const myAssignments=myPat?D.coachingAssignments.filter(a=>a.patroller_id===myPat.id&&(a.month||a.assigned_date?.slice(0,7))===curMonth):[];
    let myBreach=0,myDupe=0;
    myAssignments.forEach(a=>{
      const c=D.coachingCases.find(x=>x.id===a.case_id);if(!c)return;
      const bt=new Date(c.created_at).getTime();
      if(a.status==='completed'&&a.completed_at){if(new Date(a.completed_at).getTime()-bt>24*3600000)myBreach++;}
      else if(a.status==='pending'){if(Date.now()-bt>24*3600000)myBreach++;}
    });
    const completedA=myAssignments.filter(a=>a.status==='completed');
    const seen2={};
    completedA.forEach(a=>{const c=D.coachingCases.find(x=>x.id===a.case_id);if(!c)return;const k=c.rider_id+'|'+c.violation_type;seen2[k]=(seen2[k]||0)+1;});
    Object.values(seen2).forEach(cnt=>{if(cnt>1)myDupe+=(cnt-1)*2;});
    const finalCS=Math.max(0,100-myBreach-myDupe);

    return segHtml+
      '<div class="tcard" style="padding:14px">'+
        '<div style="font-size:11px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px"><i class="ti ti-school" style="margin-right:4px"></i>My coaching — '+curMonth+'</div>'+
        '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px">'+
          '<div style="background:var(--g1);border-radius:9px;padding:10px;text-align:center"><div style="font-size:10px;font-weight:600;color:var(--g3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Assigned</div><div style="font-size:20px;font-weight:700">'+myAssignments.length+'</div></div>'+
          '<div style="background:#DCFCE7;border-radius:9px;padding:10px;text-align:center;border:0.5px solid #86EFAC"><div style="font-size:10px;font-weight:600;color:#166534;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">On time</div><div style="font-size:20px;font-weight:700;color:#166534">'+completedA.length+'</div></div>'+
          '<div style="background:#FEE2E2;border-radius:9px;padding:10px;text-align:center;border:0.5px solid #FCA5A5"><div style="font-size:10px;font-weight:600;color:#DC2626;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Breached</div><div style="font-size:20px;font-weight:700;color:#DC2626">'+myBreach+'</div></div>'+
          '<div style="background:#DBEAFE;border-radius:9px;padding:10px;text-align:center;border:0.5px solid #93C5FD"><div style="font-size:10px;font-weight:600;color:#1E40AF;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">My score</div><div style="font-size:20px;font-weight:700;color:#1E40AF">'+finalCS+'%</div></div>'+
        '</div>'+
        '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--g1);font-size:12px"><span>Base score</span><span style="font-weight:700">100</span></div>'+
        '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--g1);font-size:12px"><span>SLA breaches × −1pt</span><span style="font-weight:700;color:'+(myBreach>0?'#DC2626':'var(--g3)');'">'+(myBreach>0?'−'+myBreach:'0')+'</span></div>'+
        '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--g1);font-size:12px"><span>Duplicate coachings × −2pt</span><span style="font-weight:700;color:'+(myDupe>0?'#D97706':'var(--g3)');'">'+(myDupe>0?'−'+myDupe:'0')+'</span></div>'+
        '<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:13px;font-weight:700"><span>Coaching score</span><span style="color:#1E40AF">'+finalCS+'%</span></div>'+
      '</div>';
  }

  if(subTab==='mytarget'){
    return segHtml+
      '<div class="tcard" style="padding:14px">'+
        '<div style="font-size:11px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px"><i class="ti ti-target" style="margin-right:4px"></i>My audit target — '+curMonth+'</div>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">'+
          '<div style="background:var(--g1);border-radius:10px;padding:14px">'+
            '<div style="font-size:10px;font-weight:600;color:var(--g3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Total audits target</div>'+
            '<div style="font-size:28px;font-weight:700;color:#166534">'+myAdj.adjTotal.toLocaleString()+'</div>'+
            '<div style="font-size:10px;color:var(--g3);margin-top:4px">Base '+ps.targetTotal.toLocaleString()+(myAdj.over>0?' − '+(ps.targetTotal-myAdj.adjTotal):'')+'</div>'+
          '</div>'+
          '<div style="background:var(--g1);border-radius:10px;padding:14px">'+
            '<div style="font-size:10px;font-weight:600;color:var(--g3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Unique audits target</div>'+
            '<div style="font-size:28px;font-weight:700;color:#1E40AF">'+myAdj.adjUnique.toLocaleString()+'</div>'+
            '<div style="font-size:10px;color:var(--g3);margin-top:4px">Base '+ps.targetUnique.toLocaleString()+(myAdj.over>0?' − '+(ps.targetUnique-myAdj.adjUnique):'')+'</div>'+
          '</div>'+
        '</div>'+
        '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--g1);font-size:12px"><span>Task hours this month</span><span style="font-weight:700">'+myTaskHrs+'h</span></div>'+
        '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--g1);font-size:12px"><span>Threshold</span><span style="font-weight:700">'+ps.taskThreshold+'h</span></div>'+
        '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--g1);font-size:12px"><span>Hours above threshold</span><span style="font-weight:700;color:'+(myAdj.over>0?'#D97706':'var(--g3)')+'">'+( myAdj.over>0?'+'+myAdj.over+'h':'None')+'</span></div>'+
        (myAdj.over>0?
          '<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--g1);font-size:12px"><span>Total reduction ('+myAdj.over+'h × '+ps.rateTotal+')</span><span style="font-weight:700;color:#DC2626">−'+(ps.targetTotal-myAdj.adjTotal)+'</span></div>'+
          '<div style="display:flex;justify-content:space-between;padding:7px 0;font-size:12px"><span>Unique reduction ('+myAdj.over+'h × '+ps.rateUnique+')</span><span style="font-weight:700;color:#DC2626">−'+(ps.targetUnique-myAdj.adjUnique)+'</span></div>'
        :'<div style="padding:10px 0;font-size:12px;color:var(--g3)">No adjustment needed — task hours ('+myTaskHrs+'h) are below the '+ps.taskThreshold+'h threshold.</div>')+
      '</div>';
  }

  return segHtml;
}



async function savePerfSettings(){
  const payload={
    target_total:parseInt(document.getElementById('ps-total')?.value)||2200,
    target_unique:parseInt(document.getElementById('ps-unique')?.value)||2000,
    working_hours:parseInt(document.getElementById('ps-hours')?.value)||208,
    rate_total:parseInt(document.getElementById('ps-rate-total')?.value)||11,
    rate_unique:parseInt(document.getElementById('ps-rate-unique')?.value)||10,
    task_threshold:parseInt(document.getElementById('ps-threshold')?.value)||40,
    eval_weight:parseInt(document.getElementById('ps-eval-weight')?.value)||60,
  };
  const existing=D.perfSettings;
  let error;
  if(existing?.id){
    const res=await sb.from('performance_settings').update(payload).eq('id',existing.id);
    error=res.error;
  }else{
    const res=await sb.from('performance_settings').insert(payload);
    error=res.error;
  }
  if(error){alert('Error: '+error.message);return;}
  closeM();await reload();
  addNotification('Performance settings saved','success');
}


async function submitEvaluation(){
  const patrollerId=document.getElementById('ev-patroller')?.value;
  const location=document.getElementById('ev-location')?.value?.trim();
  const evalDate=document.getElementById('ev-date')?.value;
  const comment=document.getElementById('ev-comment')?.value?.trim();
  if(!patrollerId){alert('Please select a patroller.');return;}
  if(!location){alert('Please enter a location.');return;}
  const scores=getEvalScores('rb');
  const missing=EVAL_QUESTIONS.filter(q=>!scores[q.key]);
  if(missing.length){alert('Please rate all questions. Missing: '+missing[0].label);return;}
  const pat=D.patrollers.find(p=>p.id===patrollerId);
  const now=getBahrainNow();
  const month=now.getUTCFullYear()+'-'+String(now.getUTCMonth()+1).padStart(2,'0');
  const payload={patroller_id:patrollerId,patroller_name:pat?.name||'',evaluator_id:D.profile.id,evaluator_name:D.profile.full_name,eval_date:evalDate||todayStr(),location,comment:comment||'',month,...scores};
  const btn=document.querySelector('button[onclick="submitEvaluation()"]');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader"></i> Saving...';}
  const{error}=await sb.from('evaluations').insert(payload);
  if(error){alert('Error: '+error.message);if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-circle-check"></i>Submit — score on save';}return;}
  await reload();
  addNotification('Evaluation submitted for '+(pat?.name||'patroller'),'success');
}

function openCoachingCase(assignmentId){
  const a=D.coachingAssignments.find(x=>x.id===assignmentId);if(!a)return;
  const c=D.coachingCases.find(x=>x.id===a.case_id);if(!c)return;
  const isDone=a.status==='completed';
  const rawNum=(c.contact_number||'').replace(/\s/g,'');
  const dialNum=rawNum.replace(/[^0-9+]/g,'');
  const waNum=dialNum.startsWith('+')?dialNum.slice(1):dialNum;
  const contactHtml=rawNum?`<div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;font-weight:600;color:#2A0D0F">${c.contact_number}</span><a href="tel:${dialNum}" style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:#EAF1FD;border-radius:7px;color:#1565C0;text-decoration:none" title="Call"><i class="ti ti-phone" style="font-size:14px"></i></a><a href="https://wa.me/${waNum}" target="_blank" style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:#DCFCE7;border-radius:7px;color:#16A34A;text-decoration:none" title="WhatsApp"><i class="ti ti-brand-whatsapp" style="font-size:14px"></i></a></div>`:'--';
  const row=(label,val,custom)=>(val||custom)?`<tr><td style="padding:7px 0;font-size:11px;color:var(--g3);width:140px;vertical-align:middle;text-transform:uppercase;letter-spacing:.04em;font-weight:600">${label}</td><td style="padding:7px 0;font-size:12px;font-weight:600;color:#2A0D0F;border-bottom:1px solid var(--g1)">${custom||val}</td></tr>`:'';
  const outcomeOptions=COACHING_OUTCOMES.map(o=>`<option value="${o.value}" ${a.outcome===o.value?'selected':''}>${o.label}</option>`).join('');
  const todayIdx=todayDayIdx();
  const onDutyPats=activePats().filter(p=>getUtype(p)==='patroller'&&gDZ(p.id,todayIdx)&&p.id!==a.patroller_id&&!isAbsentToday(p.id)&&!isOnVacationToday(p.id));

async function autoAssignCoaching(){
  if(!confirm('Auto-assign all unassigned cases equally among today\'s duty patrollers?'))return;
  const today=todayStr();const todayIdx=todayDayIdx();
  const onDuty=activePats().filter(p=>getUtype(p)==='patroller'&&gDZ(p.id,todayIdx)&&!isAbsentToday(p.id)&&!isOnVacationToday(p.id));
  if(!onDuty.length){alert('No patrollers on duty today. Use the reassign dropdown to assign manually.');return;}
  const unassigned=D.coachingCases.filter(c=>!D.coachingAssignments.find(a=>a.case_id===c.id));
  if(!unassigned.length){addNotification('All cases already assigned','info');return;}
  const now=getBahrainNow();
  const month=`${now.getUTCFullYear()}-${String(now.getUTCMonth()+1).padStart(2,'0')}`;
  const inserts=unassigned.map((c,i)=>({case_id:c.id,patroller_id:onDuty[i%onDuty.length].id,patroller_name:onDuty[i%onDuty.length].name,status:'pending',month,assigned_date:today,assigned_by:D.profile.id}));
  const{error}=await sb.from('coaching_assignments').insert(inserts);
  if(error){alert('Error assigning: '+error.message);return;}
  await reload();
  addNotification(`${inserts.length} cases assigned to ${onDuty.length} patrollers`,'success');
}

async function reassignCase(caseId,patrollerId){

}

// ── PAY LOOKUP TABLES (from real incentive sheet) ──
// Pay formula: score < 70% = 0, 70%-95% linear, >=95% = max
// Reports target: pat 26.25 / TL 30
// Unique target: pat 15.75 / TL 18
// Performance: pat 42 / TL 48
// Rider quality: pat 18 / TL 21

const INC_PAY={
  reports:{pat:26.25,tl:30},
  unique:{pat:15.75,tl:18},
  performance:{pat:42,tl:48},
  rider:{pat:18,tl:21}
};

function incLookup(score,comp,isTL){
  if(score===null||score===undefined)return null;
  if(score<0.70)return 0;
  const max=INC_PAY[comp][isTL?'tl':'pat'];
  if(score>=0.95)return+max.toFixed(3);
  return+((score-0.70)/0.25*max).toFixed(3);
}

function getIncentiveMonths(){
  const now=getBahrainNow();
  const cur=now.getUTCFullYear()+'-'+String(now.getUTCMonth()+1).padStart(2,'0');
  return[...new Set([...D.incentiveData.map(d=>d.month).filter(Boolean),cur])].sort().reverse();
}

// ── Performance score from system ──
// = average of eval score + coaching score (each 0-100), divided by 100 to get 0-1
function getSysPerfScore(patId,month){
  const evals=D.evaluations.filter(e=>e.patroller_id===patId&&(e.month||e.eval_date?.slice(0,7))===month);
  const evalAvg=evals.length?Math.round(evals.reduce((s,e)=>s+evalScore(e),0)/evals.length):null;
  const cScore=coachingScore(patId,month); // 0-100
  if(evalAvg===null||cScore===null)return null;
  // Use same weighted formula as performance tab
  const ps=getPerfSettings();
  return perfScore(evalAvg,cScore,ps)/100; // 0-1
}

// ── OT hours from system ──
function getSysOTHours(patId,month){
  return(D.overtimeRequests||[]).filter(ot=>
    ot.patroller_id===patId&&ot.start_datetime?.startsWith(month)
  ).reduce((s,ot)=>{
    const ms=new Date(ot.end_datetime)-new Date(ot.start_datetime);
    return s+(ms>0?ms/3600000:0);
  },0);
}

function getBasicSalary(patId){
  const pat=D.patrollers.find(p=>p.id===patId);
  return pat?.basic_salary||0;
}

// ── Adjusted targets from system ──
function getSysTargets(patId,month){
  const taskHrs=getPatrollerTaskHours(patId,month);
  const ps=getPerfSettings();
  return getAdjustedTarget(taskHrs,ps);
}

// ── Build per-patroller incentive calc row ──
function buildIncRow(patId,month,isTL){
  const inc=D.incentiveData.find(d=>d.patroller_id===patId&&d.month===month)||null;
  const adj=getSysTargets(patId,month);
  const perfScore=getSysPerfScore(patId,month);
  const otHrs=getSysOTHours(patId,month);
  const basic=getBasicSalary(patId);

  // Scores (0-1)
  const auditScore=adj.adjTotal>0&&inc?.achieved_total!=null?Math.min(1,inc.achieved_total/adj.adjTotal):null;
  const uniqueScore=adj.adjUnique>0&&inc?.achieved_unique!=null?Math.min(1,inc.achieved_unique/adj.adjUnique):null;
  const riderScore=(inc?.rider_quality!=null&&inc?.rider_coverage!=null)?(inc.rider_quality+inc.rider_coverage)/200:null;

  // Pay amounts
  const auditPay=incLookup(auditScore,'reports',isTL);
  const uniquePay=incLookup(uniqueScore,'unique',isTL);
  const perfPay=incLookup(perfScore,'performance',isTL);
  const riderPay=incLookup(riderScore,'rider',isTL);
  const otPay=otHrs>0&&basic>0?+(basic/208*1.5*otHrs).toFixed(3):0;

  const incentiveTotal=[auditPay,uniquePay,perfPay,riderPay].reduce((s,v)=>s+(v||0),0);
  const totalPay=incentiveTotal+otPay;

  return{inc,adj,perfScore,otHrs,basic,auditScore,uniqueScore,riderScore,auditPay,uniquePay,perfPay,riderPay,otPay,incentiveTotal,totalPay};
}

function incentiveView(){
  const isAL=canEdit();
  const myPat=D.patrollers.find(p=>p.user_id===D.profile?.id);
  const now=getBahrainNow();
  const curMonth=now.getUTCFullYear()+'-'+String(now.getUTCMonth()+1).padStart(2,'0');
  const months=getIncentiveMonths();
  const selMonth=D.incMonth||curMonth;
  const pts=activePats().filter(p=>getUtype(p)==='patroller');

  const monthSel='<select onchange="D.incMonth=this.value;render()" style="padding:4px 8px;border-radius:7px;border:1.5px solid var(--g2);font-size:11px;font-family:inherit">'+
    months.map(m=>'<option value="'+m+'" '+(m===selMonth?'selected':'')+'>'+m+'</option>').join('')+'</select>';

  // Score pill
  const sPill=(s,zero)=>{
    if(s===null)return'<span style="font-size:10px;color:var(--g3)">--</span>';
    if(s===0&&zero)return'<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:#FEE2E2;color:#991B1B">BHD 0.000</span>';
    const p=Math.round(s*100);
    const ok=p>=70;
    const bg=p>=95?'background:#DBEAFE;color:#1E40AF':p>=80?'background:#DCFCE7;color:#166534':p>=70?'background:#FEF3C7;color:#92400E':'background:#FEE2E2;color:#991B1B';
    return'<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;'+bg+'">'+p+'%'+(ok?'':' ✗')+'</span>';
  };
  const bhdFmt=(v,zero)=>{
    if(v===null)return'<span style="color:var(--g3)">--</span>';
    if(v===0)return'<span style="color:#DC2626;font-size:11px">BHD 0.000</span>';
    return'<span style="font-weight:600;color:#166534">BHD '+v.toFixed(3)+'</span>';
  };
  const inp=(id,val,w)=>'<input type="number" id="'+id+'" value="'+( val!==null&&val!==undefined?val:'')+'" placeholder="--" style="width:'+w+'px;padding:4px 6px;border-radius:6px;border:0.5px solid var(--g2);font-size:12px;font-family:var(--font-sans,system-ui,sans-serif);font-weight:400;color:var(--color-text-primary);background:var(--color-background-primary);text-align:right">'+'';

  if(isAL){
    // Build all patroller rows
    const rows=pts.map(p=>{
      const r=buildIncRow(p.id,selMonth,false);
      const adj=r.adj;
      return{p,r,adj};
    });

    // TL scores = avg of eligible patrollers (>=70%) per component
    const tlAvg=(key)=>{
      const eligible=rows.filter(({r})=>r[key]!==null&&r[key]>=0.70);
      if(!eligible.length)return null;
      return eligible.reduce((s,{r})=>s+r[key],0)/eligible.length;
    };
    const tlAudit=tlAvg('auditScore');
    const tlUnique=tlAvg('uniqueScore');
    const tlPerf=tlAvg('perfScore');

  const isTL=getUtype(myPat)==='lead';
  const ini=(D.profile?.full_name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

  // ── TEAM LEAD VIEW ──
  if(isTL){
    const allRows=activePats().filter(p=>getUtype(p)==='patroller').map(p=>({p,r:buildIncRow(p.id,selMonth,false)}));

function downloadPayoutLog(){
  const filterMonth=D.logFilterMonth||'';
  const months=[...new Set(D.incentiveData.map(d=>d.month).filter(Boolean))].sort().reverse();
  const filteredMonths=filterMonth?months.filter(m=>m===filterMonth):months;
  if(!filteredMonths.length){addNotification('No log data to export','info');return;}

  const headers=['Role','Month','Patroller ID','Patroller Name','Audit%','Unique%','Perf%','Rider%','Reports BHD','Unique BHD','Perf BHD','Rider BHD','OT BHD','Total BHD','Saved At'];
  const allRows=[];
  const tlLead=D.patrollers.find(p=>getUtype(p)==='lead');

  filteredMonths.forEach(m=>{
    // TL row — from DB if saved, otherwise compute live
    const tlRec=D.incentiveData.find(d=>d.month===m&&d.role==='Team Lead');
    const pts=activePats().filter(p=>getUtype(p)==='patroller');

    let tlRow=null;
    if(tlRec){
      const p=D.patrollers.find(pt=>pt.id===tlRec.patroller_id)||tlLead;
      tlRow=['Team Lead',m,tlRec.patroller_id_num||p?.patroller_id_num||'--',p?.name||tlRec.patroller_name||'--',
        tlRec.audit_score!=null?tlRec.audit_score+'%':'',tlRec.unique_score!=null?tlRec.unique_score+'%':'',
        tlRec.perf_score!=null?tlRec.perf_score+'%':'',tlRec.rider_score!=null?tlRec.rider_score+'%':'',
        (tlRec.payout_audit||0).toFixed(3),(tlRec.payout_unique||0).toFixed(3),
        (tlRec.payout_perf||0).toFixed(3),(tlRec.payout_rider||0).toFixed(3),
        (tlRec.payout_ot||0).toFixed(3),(tlRec.payout_total||0).toFixed(3),
        tlRec.saved_at?new Date(tlRec.saved_at).toLocaleDateString('en-GB'):'Computed live'
      ];
    } else if(tlLead){
      // Compute live
      const tlAvgFn=(key)=>{const el=pts.map(p=>({r:buildIncRow(p.id,m,false)})).filter(({r})=>r[key]!==null&&r[key]>=0.70);return el.length?el.reduce((s,{r})=>s+r[key],0)/el.length:null;};
      const tlAudit=tlAvgFn('auditScore');const tlUnique=tlAvgFn('uniqueScore');
      const tlPerf=tlAvgFn('perfScore');const tlRider=tlAvgFn('riderScore');
      const tlBasic=getBasicSalary(tlLead.id);
      const tlOTHrs=getSysOTHours(tlLead.id,m);
      const tlOTPay=tlOTHrs>0&&tlBasic>0?+(tlBasic/208*1.5*tlOTHrs).toFixed(3):0;
      const tlAP=incLookup(tlAudit,'reports',true)||0;
      const tlUP=incLookup(tlUnique,'unique',true)||0;
      const tlPP=incLookup(tlPerf,'performance',true)||0;
      const tlRP=incLookup(tlRider,'rider',true)||0;
      const tlTotal=tlAP+tlUP+tlPP+tlRP+tlOTPay;
      if(tlTotal>0){
        tlRow=['Team Lead',m,tlLead.patroller_id_num||'--',tlLead.name,
          tlAudit!=null?Math.round(tlAudit*100)+'%':'',tlUnique!=null?Math.round(tlUnique*100)+'%':'',
          tlPerf!=null?Math.round(tlPerf*100)+'%':'',tlRider!=null?Math.round(tlRider*100)+'%':'',
          tlAP.toFixed(3),tlUP.toFixed(3),tlPP.toFixed(3),tlRP.toFixed(3),
          tlOTPay.toFixed(3),tlTotal.toFixed(3),'Computed live'
        ];
      }
    }

    if(tlRow)allRows.push(tlRow);

    // Patroller rows
    const patRecs=D.incentiveData.filter(d=>d.month===m&&d.role==='Patroller'&&d.payout_total!=null)
      .sort((a,b)=>(a.patroller_name||'').localeCompare(b.patroller_name||''));
    patRecs.forEach(d=>{
      const p=D.patrollers.find(pt=>pt.id===d.patroller_id);
      allRows.push(['Patroller',m,d.patroller_id_num||p?.patroller_id_num||'--',p?.name||d.patroller_name||'--',
        d.audit_score!=null?d.audit_score+'%':'',d.unique_score!=null?d.unique_score+'%':'',
        d.perf_score!=null?d.perf_score+'%':'',d.rider_score!=null?d.rider_score+'%':'',
        (d.payout_audit||0).toFixed(3),(d.payout_unique||0).toFixed(3),
        (d.payout_perf||0).toFixed(3),(d.payout_rider||0).toFixed(3),
        (d.payout_ot||0).toFixed(3),(d.payout_total||0).toFixed(3),
        d.saved_at?new Date(d.saved_at).toLocaleDateString('en-GB'):''
      ]);
    });

    // Month total
    const tlTotal2=tlRow?parseFloat(tlRow[13])||0:0;
    const grandTotal=tlTotal2+patRecs.reduce((s,d)=>s+(d.payout_total||0),0);
    if(grandTotal>0){
      allRows.push(['MONTH TOTAL',m,'','','','','','','','','','','',grandTotal.toFixed(3),'']);
      allRows.push(Array(15).fill(''));
    }
  });

  if(!allRows.length){addNotification('No log data to export','info');return;}
  const csv=[headers.map(h=>`"${h}"`).join(','),...allRows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','))].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='payout-log'+(filterMonth?'-'+filterMonth:'')+'.csv';a.click();
  URL.revokeObjectURL(url);
}

async function saveTLPayout(month,patrollerList){
  const selMonth=month||(D.incMonth||(getBahrainNow().getUTCFullYear()+'-'+String(getBahrainNow().getUTCMonth()+1).padStart(2,'0')));
  const pts=patrollerList||activePats().filter(p=>getUtype(p)==='patroller');
  const tlLead=D.patrollers.find(p=>getUtype(p)==='lead');
  if(!tlLead)return;
  const tlAvgFn=(key)=>{
    const el=pts.map(p=>({r:buildIncRow(p.id,selMonth,false)})).filter(({r})=>r[key]!==null&&r[key]>=0.70);
    return el.length?el.reduce((s,{r})=>s+r[key],0)/el.length:null;
  };
  const tlAudit=tlAvgFn('auditScore');const tlUnique=tlAvgFn('uniqueScore');
  const tlPerf=tlAvgFn('perfScore');const tlRider=tlAvgFn('riderScore');
  const tlBasic=getBasicSalary(tlLead.id);
  const tlOTHrs=getSysOTHours(tlLead.id,selMonth);
  const tlOTPay=tlOTHrs>0&&tlBasic>0?+(tlBasic/208*1.5*tlOTHrs).toFixed(3):0;
  const tlAP=incLookup(tlAudit,'reports',true)||0;
  const tlUP=incLookup(tlUnique,'unique',true)||0;
  const tlPP=incLookup(tlPerf,'performance',true)||0;
  const tlRP=incLookup(tlRider,'rider',true)||0;
  const tlTotal=tlAP+tlUP+tlPP+tlRP+tlOTPay;
  if(tlTotal<=0)return;
  const existingTL=D.incentiveData.find(d=>d.patroller_id===tlLead.id&&d.month===selMonth);
  const tlPayload={
    patroller_id:tlLead.id,patroller_name:tlLead.name,month:selMonth,role:'Team Lead',
    patroller_id_num:tlLead.patroller_id_num||null,
    audit_score:tlAudit!==null?Math.round(tlAudit*100):null,
    unique_score:tlUnique!==null?Math.round(tlUnique*100):null,
    perf_score:tlPerf!==null?Math.round(tlPerf*100):null,
    rider_score:tlRider!==null?Math.round(tlRider*100):null,
    payout_audit:tlAP,payout_unique:tlUP,payout_perf:tlPP,payout_rider:tlRP,
    payout_ot:tlOTPay,payout_total:tlTotal,ot_hours:tlOTHrs,
    saved_at:new Date().toISOString()
  };
  if(existingTL){await sb.from('incentive_data').update(tlPayload).eq('id',existingTL.id);}
  else{await sb.from('incentive_data').insert(tlPayload);}
}

async function saveTLPayoutBtn(){
  const selMonth=D.incMonth||(getBahrainNow().getUTCFullYear()+'-'+String(getBahrainNow().getUTCMonth()+1).padStart(2,'0'));
  await saveTLPayout(selMonth);
  await reload();
  addNotification('Team Lead payout saved to log','success');
}

  pts.forEach(p=>{
    ['ach-total-','ach-unique-','rider-q-','rider-c-'].forEach(pfx=>{
      const el=document.getElementById(pfx+p.id);
      if(el)el.value='';
    });
  });
  addNotification('Manual inputs cleared','info');
}

async function saveIncentiveData(){
  const pts=activePats().filter(p=>getUtype(p)==='patroller');
  const selMonth=D.incMonth||(getBahrainNow().getUTCFullYear()+'-'+String(getBahrainNow().getUTCMonth()+1).padStart(2,'0'));
  const btn=document.querySelector('button[onclick="saveIncentiveData()"]');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader"></i> Saving...';}

  for(const p of pts){
    const achTotal=parseFloat(document.getElementById('ach-total-'+p.id)?.value);
    const achUnique=parseFloat(document.getElementById('ach-unique-'+p.id)?.value);
    const riderQ=parseFloat(document.getElementById('rider-q-'+p.id)?.value);
    const riderC=parseFloat(document.getElementById('rider-c-'+p.id)?.value);
    const existing=D.incentiveData.find(d=>d.patroller_id===p.id&&d.month===selMonth);

    // ── LOCK RULE: if log is already finalized (payout_total saved), only update manual inputs ──
    const isLocked=existing?.payout_total!=null&&existing?.saved_at!=null;

    // Build computed payouts
    const r=buildIncRow(p.id,selMonth,false);
    const adj=r.adj;
    const newAchTotal=isNaN(achTotal)?(existing?.achieved_total??null):achTotal;
    const newAchUnique=isNaN(achUnique)?(existing?.achieved_unique??null):achUnique;
    const newRiderQ=isNaN(riderQ)?(existing?.rider_quality??null):riderQ;
    const newRiderC=isNaN(riderC)?(existing?.rider_coverage??null):riderC;
    const auditScore=adj.adjTotal>0&&newAchTotal!=null?Math.min(1,newAchTotal/adj.adjTotal):null;
    const uniqueScore=adj.adjUnique>0&&newAchUnique!=null?Math.min(1,newAchUnique/adj.adjUnique):null;
    const riderScore=(newRiderQ!=null&&newRiderC!=null)?(newRiderQ+newRiderC)/200:null;
    const auditPay=incLookup(auditScore,'reports',false);
    const uniquePay=incLookup(uniqueScore,'unique',false);
    const perfPay=incLookup(r.perfScore,'performance',false);
    const riderPay=incLookup(riderScore,'rider',false);
    const otPay=r.otHrs>0&&r.basic>0?+(r.basic/208*1.5*r.otHrs).toFixed(3):0;
    const totalPay=[auditPay,uniquePay,perfPay,riderPay].reduce((s,v)=>s+(v||0),0)+otPay;

    if(isLocked){
      // LOCKED: only update the manual input fields — do NOT overwrite computed payout columns
      const manualOnly={
        achieved_total:isNaN(achTotal)?existing.achieved_total:achTotal,
        achieved_unique:isNaN(achUnique)?existing.achieved_unique:achUnique,
        rider_quality:isNaN(riderQ)?existing.rider_quality:riderQ,
        rider_coverage:isNaN(riderC)?existing.rider_coverage:riderC
      };
      await sb.from('incentive_data').update(manualOnly).eq('id',existing.id);
    } else {
      // FIRST SAVE: write everything including payout log
      const payload={
        patroller_id:p.id,patroller_name:p.name,month:selMonth,role:'Patroller',
        patroller_id_num:p.patroller_id_num||null,
        achieved_total:isNaN(achTotal)?null:achTotal,
        achieved_unique:isNaN(achUnique)?null:achUnique,
        rider_quality:isNaN(riderQ)?null:riderQ,
        rider_coverage:isNaN(riderC)?null:riderC,
        perf_score:r.perfScore!==null?Math.round(r.perfScore*100):null,
        audit_score:auditScore!==null?Math.round(auditScore*100):null,
        unique_score:uniqueScore!==null?Math.round(uniqueScore*100):null,
        rider_score:riderScore!==null?Math.round(riderScore*100):null,
        payout_audit:auditPay||0,payout_unique:uniquePay||0,
        payout_perf:perfPay||0,payout_rider:riderPay||0,
        payout_ot:otPay,payout_total:totalPay,
        ot_hours:r.otHrs,saved_at:new Date().toISOString()
      };
      if(existing){await sb.from('incentive_data').update(payload).eq('id',existing.id);}
      else{await sb.from('incentive_data').insert(payload);}
    }
  }

  // Clear manual input fields after save
  pts.forEach(p=>{
    ['ach-total-','ach-unique-','rider-q-','rider-c-'].forEach(pfx=>{
      const el=document.getElementById(pfx+p.id);
      if(el)el.value='';
    });
  });

  // ── SAVE TEAM LEAD PAYOUT ──
  await saveTLPayout(selMonth,pts);

  await reload();
  if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-circle-check"></i>Save & calculate';}
  addNotification('Incentive saved & locked in log','success');
}


function openLogEdit(id){
  const d=D.incentiveData.find(x=>x.id===id);if(!d)return;
  const p=D.patrollers.find(pt=>pt.id===d.patroller_id);
  const name=p?.name||d.patroller_name||'Unknown';
  openM({type:'editlogentry',id,name,d});
}

async function saveLogEdit(id){
  const audit=parseFloat(document.getElementById('le-audit')?.value)||0;
  const unique=parseFloat(document.getElementById('le-unique')?.value)||0;
  const perf=parseFloat(document.getElementById('le-perf')?.value)||0;
  const rider=parseFloat(document.getElementById('le-rider')?.value)||0;
  const ot=parseFloat(document.getElementById('le-ot')?.value)||0;
  const total=audit+unique+perf+rider+ot;
  const{error}=await sb.from('incentive_data').update({
    payout_audit:audit,payout_unique:unique,payout_perf:perf,
    payout_rider:rider,payout_ot:ot,payout_total:total,
    saved_at:new Date().toISOString()
  }).eq('id',id);
  if(error){showErr('le-e',error.message);return;}
  closeM();await reload();
  addNotification('Log entry updated','success');
}

async function deleteIncEntry(id,name,month){
  if(!confirm('Delete payout entry for '+name+' ('+month+')? This cannot be undone.'))return;
  await sb.from('incentive_data').delete().eq('id',id);
  await reload();
  addNotification('Entry for '+name+' deleted','info');
}

async function deleteIncMonth(month){
  if(!confirm('Delete ALL payout records for '+month+'? This will remove all '+month+' entries from the log and cannot be undone.'))return;
  await sb.from('incentive_data').delete().eq('month',month).eq('role','Patroller');
  await reload();
  addNotification('All entries for '+month+' deleted','info');
}

async function editIncEntry(id){
  // Jump to that month so admin can recalculate
  const rec=D.incentiveData.find(d=>d.id===id);
  if(rec){D.incMonth=rec.month;render();addNotification('Showing '+rec.month+' — edit values and click Save & calculate','info');}
}

// ── GLOBAL ERROR HANDLER ──
window.addEventListener('error', (e) => {
  console.error('Global error:', e.message, e.filename, e.lineno);
  const main = document.getElementById('main');
  if(main && (!main.innerHTML || main.innerHTML.trim() === '' || main.innerHTML === '<div class="fade-in"></div>')) {
    main.innerHTML = `<div style="padding:40px;text-align:center">
      <div style="font-size:40px;margin-bottom:12px">⚠️</div>
      <div style="font-size:15px;font-weight:700;color:#DC2626;margin-bottom:8px">Something went wrong</div>
      <div style="font-size:12px;color:#A08070;margin-bottom:16px;font-family:monospace">${e.message}</div>
      <button class="btn btn-primary" onclick="doRefresh()"><i class="ti ti-refresh"></i>Tap to refresh</button>
    </div>`;
  }
});
</script>
