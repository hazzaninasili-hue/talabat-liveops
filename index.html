async function getLocation(){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){reject(new Error('Geolocation not supported'));return;}
    navigator.geolocation.getCurrentPosition(
      p=>resolve({lat:p.coords.latitude,lng:p.coords.longitude,accuracy:p.coords.accuracy}),
      e=>reject(new Error('Location denied: '+e.message)),
      {enableHighAccuracy:true,timeout:15000}
    );
  });
}

// ── CLOCK IN ──
async function doClockIn(){
  const btn=document.getElementById('clock-in-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader" style="animation:spin .7s linear infinite"></i> Getting location...';}
  try{
    const loc=await getLocation();
    const pat=D.patrollers.find(p=>p.user_id===D.profile.id);
    if(!pat)throw new Error('No schedule record found');
    const today=todayStr();
    const todayIdx=todayDayIdx();
    const sh=getDayShift(pat.id,todayIdx);
    const mapUrl=mapsLink(loc.lat,loc.lng);
    const now=new Date();
    const nowIso=now.toISOString();

    // Calculate late minutes and adjusted end time
    const bhrNow=getBahrainNow();
    const clockInMins=bhrNow.getUTCHours()*60+bhrNow.getUTCMinutes();
    const startMins=sh?getShiftStartMins(sh):null;
    const lateMins=startMins!==null?Math.max(0,clockInMins-startMins):0;
    const adjEndMins=sh?getShiftEndMins(sh)+lateMins:null;
    const adjEndTime=adjEndMins!==null?`${String(Math.floor(adjEndMins/60)%24).padStart(2,'0')}:${String(adjEndMins%60).padStart(2,'0')}`:null;
    const clockInTimeStr=`${String(bhrNow.getUTCHours()).padStart(2,'0')}:${String(bhrNow.getUTCMinutes()).padStart(2,'0')}`;

    const{data,error}=await sb.from('attendance').upsert({
      patroller_id:pat.id,patroller_name:pat.name,date:today,
      clock_in:nowIso,clock_in_lat:loc.lat,clock_in_lng:loc.lng,clock_in_map:mapUrl,
      late_mins:lateMins,adj_end_time:adjEndTime,
      status:'Attended',updated_at:nowIso
    },{onConflict:'patroller_id,date'}).select().single();
    if(error)throw error;

    // Notify patroller if late
    if(lateMins>0&&sh){
      const lH=Math.floor(lateMins/60);const lM=lateMins%60;
      const lLabel=lH>0?`${lH}h ${lM}m`:`${lM}m`;
      addNotification(`⚠️ You clocked in ${lLabel} late. Shift adjusted: ${sh.start_time} → ${adjEndTime}`,'warning');
      // Show prominent modal alert
      setTimeout(()=>{
        openM({type:'lateAlert',lateMins,lLabel,origEnd:fmtT(sh.end_time),adjEnd:adjEndTime,startTime:fmtT(sh.start_time),clockInTime:clockInTimeStr});
      },500);
    } else {
      addNotification('Clocked in successfully! Have a great shift 🟢','success');
    }

    sendWebhook('clock_in',{patroller_name:pat.name,patroller_id:pat.id,date:today,clock_in_time:clockInTimeStr,late_mins:lateMins,adj_end_time:adjEndTime||'',clock_in_location:mapUrl,accuracy_meters:Math.round(loc.accuracy),app_url:REDIRECT});
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-clock-play"></i> Clock In';}
    alert('Error: '+e.message);
  }
}

// ── CLOCK OUT ──
async function doClockOut(){
  const pat=D.patrollers.find(p=>p.user_id===D.profile.id);
  if(!pat)return;
  const rec=getMyAttRecord();
  if(!rec||!rec.clock_in)return;
  const todayIdx=todayDayIdx();
  const sh=getDayShift(pat.id,todayIdx);
  // Check if clocking out before shift end
  if(sh&&sh.end_time){
    const nowMins=getBahrainMinutes();
    // Use stored late_mins from attendance record (most accurate)
    const lateMins=rec.late_mins||0;
    const adjEndMins=getShiftEndMins(sh)+lateMins;
    if(nowMins<adjEndMins-5){ // 5 min grace period
      const early=adjEndMins-nowMins;
      const eH=Math.floor(early/60);const eM=early%60;
      const earlyLabel=eH>0?`${eH}h ${eM}m`:`${eM}m`;
      const adjEndStr=`${String(Math.floor(adjEndMins/60)%24).padStart(2,'0')}:${String(adjEndMins%60).padStart(2,'0')}`;
      // Submit early clock out request
      openM({type:'earlyClockOut',earlyLabel,adjEndStr,patId:pat.id,attId:rec.id});
      return;
    }
  }
  // Normal clock out
  await _doNormalClockOut();
}

async function _doNormalClockOut(){
  const btn=document.getElementById('clock-out-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader" style="animation:spin .7s linear infinite"></i> Getting location...';}
  try{
    const loc=await getLocation();
    const pat=D.patrollers.find(p=>p.user_id===D.profile.id);
    if(!pat)throw new Error('No schedule record found');
    const today=todayStr();
    const mapUrl=mapsLink(loc.lat,loc.lng);
    const now=new Date().toISOString();
    const existing=getMyAttRecord();
    if(!existing)throw new Error('Please clock in first');
    const{error}=await sb.from('attendance').update({clock_out:now,clock_out_lat:loc.lat,clock_out_lng:loc.lng,clock_out_map:mapUrl,updated_at:now}).eq('id',existing.id);
    if(error)throw error;
    // Duration
    const inTime=new Date(existing.clock_in);const outTime=new Date(now);
    const mins=Math.round((outTime-inTime)/60000);
    const hrs=Math.floor(mins/60);const remMins=mins%60;
    const duration=`${hrs}h ${remMins}m`;
    sendWebhook('clock_out',{patroller_name:pat.name,patroller_id:pat.id,date:today,clock_in_time:new Date(existing.clock_in).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'}),clock_out_time:new Date(now).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'}),duration,clock_in_location:existing.clock_in_map,clock_out_location:mapUrl,app_url:REDIRECT});
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-clock-stop"></i> Clock Out';}
    alert('Error: '+e.message);
  }
}

    const mins=Math.round((new Date(rec.clock_out)-new Date(rec.clock_in))/60000);
    const duration=`${Math.floor(mins/60)}h ${mins%60}m`;
    clockWidget=`<div style="background:linear-gradient(135deg,#1e3a5f,#1e40af);border-radius:16px;padding:24px;text-align:center;color:#EFF6FF;margin-bottom:20px">
      <i class="ti ti-circle-check" style="font-size:36px;display:block;margin-bottom:8px;color:#60A5FA"></i>
      <div style="font-size:17px;font-weight:700">Shift Complete ✓</div>
      <div style="font-size:13px;margin-top:8px;opacity:.8">${inTime} → ${outTime} · <strong>${duration}</strong></div>
      <div style="display:flex;justify-content:center;gap:16px;margin-top:10px">
        <a href="${rec.clock_in_map}" target="_blank" style="color:#93C5FD;font-size:11px"><i class="ti ti-map-pin"></i> Clock-in location</a>
        ${rec.clock_out_map?`<a href="${rec.clock_out_map}" target="_blank" style="color:#93C5FD;font-size:11px"><i class="ti ti-map-pin"></i> Clock-out location</a>`:''}
      </div>
    </div>`;
  }

  // History
  const myRecs=(D.attendance||[]).filter(a=>a.patroller_id===pat.id).slice(0,30);
  const histRows=myRecs.map(a=>{
    const inT=a.clock_in?new Date(a.clock_in).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'}):'--';
    const outT=a.clock_out?new Date(a.clock_out).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'}):'--';
    const dur=a.clock_in&&a.clock_out?`${Math.floor(Math.round((new Date(a.clock_out)-new Date(a.clock_in))/60000)/60)}h ${Math.round((new Date(a.clock_out)-new Date(a.clock_in))/60000)%60}m`:'--';
    const sc=a.status==='Attended'?'background:#DCFCE7;color:#166534':a.status==='Absent'?'background:#FEE2E2;color:#991B1B':'background:#F4EDE3;color:#411517';
    return`<tr>
      <td style="font-family:monospace;font-size:11px">${a.date}</td>
      <td><span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;${sc}">${a.status||'--'}</span></td>
      <td style="font-size:11px">${inT}</td>
      <td style="font-size:11px">${outT}</td>
      <td style="font-size:11px">${dur}</td>
      <td style="font-size:11px">${a.clock_in_map?`<a href="${a.clock_in_map}" target="_blank" style="color:#FF5900"><i class="ti ti-map-pin"></i></a>`:'--'}</td>
      <td style="font-size:11px">${a.clock_out_map?`<a href="${a.clock_out_map}" target="_blank" style="color:#FF5900"><i class="ti ti-map-pin"></i></a>`:'--'}</td>
    </tr>`;
  }).join('');

  return`${clockWidget}
  <div style="font-size:13px;font-weight:700;color:#411517;margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">My Attendance History</div>
  ${myRecs.length===0?`<div style="padding:30px;text-align:center;color:var(--g3)">No attendance records yet.</div>`:`
  <div class="tcard"><div class="t-scroll"><table><thead><tr><th class="lt">Date</th><th>Status</th><th>Clock In</th><th>Clock Out</th><th>Duration</th><th>In Location</th><th>Out Location</th></tr></thead><tbody>${histRows}</tbody></table></div></div>`}`;
}

// ── ADMIN ATTENDANCE VIEW ──
function attendanceView(){
  const today=D.attDate||todayStr();
  const pts=activePats();

  // Stats
  const todayRecs=(D.attendance||[]).filter(a=>a.date===today);
  const attended=todayRecs.filter(a=>a.status==='Attended').length;
  const absent=todayRecs.filter(a=>a.status==='Absent').length;
  const onVacCount=pts.filter(p=>isOnVacationToday(p.id)).length;
  const todayIdx=todayDayIdx();

  // Build rows — skip off-day and vacation patrollers
  const workingPats=pts.filter(p=>{
    const vac=isOnVacationToday(p.id);if(vac)return false;
    const selectedDate=today;
    // Find day index for selected date
    const selDate=new Date(selectedDate);const selJsDay=selDate.getUTCDay();
    const selIdx=selJsDay;
    // Check if they have a zone on that day
    const ws=getWeekStartForDate(selectedDate);
    const sc=D.schedules.find(s=>s.patroller_id===p.id&&s.week_start===ws);
    return sc&&sc['day_'+selIdx];
  });
  const vacPats=pts.filter(p=>isOnVacationToday(p.id));
  const offPats=pts.filter(p=>{
    if(isOnVacationToday(p.id))return false;
    const selDate=new Date(today);const selJsDay=selDate.getUTCDay();
    const selIdx=selJsDay;
    const ws=getWeekStartForDate(today);
    const sc=D.schedules.find(s=>s.patroller_id===p.id&&s.week_start===ws);
    return!sc||!sc['day_'+selIdx];
  });

  const mkRow=p=>{
    const rec=todayRecs.find(a=>a.patroller_id===p.id);
    const status=rec?.status||'';
    const inT=rec?.clock_in?new Date(rec.clock_in).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'}):'--';
    const outT=rec?.clock_out?new Date(rec.clock_out).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'}):'--';
    const dur=rec?.clock_in&&rec?.clock_out?`${Math.floor(Math.round((new Date(rec.clock_out)-new Date(rec.clock_in))/60000)/60)}h ${Math.round((new Date(rec.clock_out)-new Date(rec.clock_in))/60000)%60}m`:'--';
    const isAtt=status==='Attended';const isAbs=status==='Absent';
    const selJsDay=getBahrainNow().getUTCDay();const selIdx=selJsDay;
    const ws=getWeekStartForDate(today);const sc=D.schedules.find(s=>s.patroller_id===p.id&&s.week_start===ws);
    const zone=sc?sc['day_'+selIdx]||'--':'--';
    const sh=getDayShift(p.id,selIdx);
    return`<tr>
      <td class="lt" style="font-weight:600">${p.name}</td>
      <td style="font-size:11px">${zone}</td>
      <td style="font-size:11px">${sh?`${sh.shift_type==='morning'?'☀️':'🌙'} ${fmtT(sh.start_time)}-${fmtT(getEffectiveEndTime(p.id,sh,today)||sh.end_time)}${(rec?.late_mins||0)>0?` <span style="color:#D97706;font-size:9px">⚠+${rec.late_mins}m</span>`:''}`:'-'}</td>
      <td><span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:8px;${isAtt?'background:#DCFCE7;color:#166534':isAbs?'background:#FEE2E2;color:#991B1B':'background:#F4EDE3;color:#94A3B8'}">${status||'Pending'}</span></td>
      <td style="font-size:11px">${inT}${rec?.clock_in_map?` <a href="${rec.clock_in_map}" target="_blank" style="color:#FF5900"><i class="ti ti-map-pin" style="font-size:10px"></i></a>`:''}</td>
      <td style="font-size:11px">${outT}${rec?.clock_out_map?` <a href="${rec.clock_out_map}" target="_blank" style="color:#FF5900"><i class="ti ti-map-pin" style="font-size:10px"></i></a>`:''}</td>
      <td style="font-size:11px">${dur}</td>
      ${canEdit()?`<td style="white-space:nowrap">
        <button onclick="markAttendance('${p.id}','${p.name.replace(/'/g,"\'")}','Attended')" style="padding:4px 10px;border-radius:6px;border:1.5px solid #86efac;background:${isAtt?'#DCFCE7':'transparent'};color:#166534;font-family:inherit;font-size:11px;cursor:pointer;font-weight:600">✓ Attended</button>
        <button onclick="markAttendance('${p.id}','${p.name.replace(/'/g,"\'")}','Absent')" style="padding:4px 10px;border-radius:6px;border:1.5px solid #fca5a5;background:${isAbs?'#FEE2E2':'transparent'};color:#991B1B;font-family:inherit;font-size:11px;cursor:pointer;font-weight:600;margin-left:4px">✗ Absent</button>
      </td>`:''}
    </tr>`;
  };

  return`
  <div class="stats">
    <div class="stat green"><div class="stat-label">Attended</div><div class="stat-value">${attended}</div><div class="stat-sub">${today}</div></div>
    <div class="stat red"><div class="stat-label">Absent</div><div class="stat-value">${absent}</div></div>
    <div class="stat" style="--c:#7C3AED"><div class="stat-label">On Vacation</div><div class="stat-value" style="color:#7C3AED">${onVacCount}</div></div>
    <div class="stat amber"><div class="stat-label">Scheduled today</div><div class="stat-value">${workingPats.length}</div></div>
  </div>
  <div class="toolbar">
    <input type="date" value="${today}" onchange="D.attDate=this.value;render()" style="padding:7px 11px;border-radius:var(--r8);border:1.5px solid var(--g2);font-family:inherit;font-size:12.5px">
    <button class="btn" onclick="dlAttendance()"><i class="ti ti-download"></i>Export CSV</button>
    <span style="font-size:12px;color:var(--g3)">${workingPats.length} scheduled · ${vacPats.length} on vacation · ${offPats.length} off</span>
  </div>
  ${workingPats.length===0?`<div style="padding:40px;text-align:center;color:var(--g3)"><i class="ti ti-calendar-off" style="font-size:40px;display:block;margin-bottom:10px"></i>No one scheduled for this day.</div>`:`
  <div class="tcard"><div class="t-scroll"><table style="table-layout:auto"><thead><tr><th class="lt">Name</th><th>Zone</th><th>Shift</th><th>Status</th><th>Clock In</th><th>Clock Out</th><th>Duration</th>${canEdit()?'<th>Actions</th>':''}</tr></thead><tbody>${workingPats.map(mkRow).join('')}</tbody></table></div></div>`}
  ${vacPats.length>0?`<div style="margin-top:16px"><div style="font-size:11px;font-weight:700;color:#7C3AED;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">🌴 On Vacation</div><div style="display:flex;gap:8px;flex-wrap:wrap">${vacPats.map(p=>`<span style="background:#EDE9FE;color:#4C1D95;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500">${p.name}</span>`).join('')}</div></div>`:''}
  ${offPats.length>0?`<div style="margin-top:12px"><div style="font-size:11px;font-weight:700;color:var(--g3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Off Today</div><div style="display:flex;gap:8px;flex-wrap:wrap">${offPats.map(p=>`<span style="background:var(--g1);color:var(--g4);padding:4px 12px;border-radius:20px;font-size:12px">${p.name}</span>`).join('')}</div></div>`:''}`;
}

function getWeekStartForDate(dateStr){
  const d=new Date(dateStr);const jsDay=d.getUTCDay();
  const diff=jsDay===6?0:-(jsDay+1);
  const sat=new Date(d);sat.setDate(sat.getDate()+diff);sat.setHours(0,0,0,0);
  return sat.toISOString().split('T')[0];
}

function dlAttendance(){
  const rows=[['Name','Date','Status','Clock In','Clock Out','Duration','Clock In Location','Clock Out Location']];
  (D.attendance||[]).forEach(a=>{
    const dur=a.clock_in&&a.clock_out?`${Math.floor(Math.round((new Date(a.clock_out)-new Date(a.clock_in))/60000)/60)}h ${Math.round((new Date(a.clock_out)-new Date(a.clock_in))/60000)%60}m`:'';
    rows.push([a.patroller_name||'',a.date,a.status||'',
      a.clock_in?new Date(a.clock_in).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'}):'',
      a.clock_out?new Date(a.clock_out).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'}):'',
      dur,a.clock_in_map||'',a.clock_out_map||'']);
  });
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.map(csvRow).join('\n')],{type:'text/csv'}));a.download='attendance.csv';a.click();
}


const TASK_TYPES=['Task','Meeting','Training','Other'];
const TASK_COLORS={
  'Task':'#FF5900','Meeting':'#1565C0','Training':'#166534','Other':'#7C3AED',
};
const TASK_BG={
  'Task':'#FFF0E6','Meeting':'#E3F2FD','Training':'#DCFCE7','Other':'#EDE9FE',
};

// Helper to get local date string (YYYY-MM-DD) from Date object
function dateToStr(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return`${y}-${m}-${day}`;
}

// ── HOURLY VIEW ──
function hourlyView(){
  const dates=wDates();const pts=activePats();
  const today=todayStr();
  // Find selected day (default today if in current week, else first day)
  let selDay=D.hourlyDay;
  if(!selDay||!dates.find(d=>dateToStr(d)===selDay)){
    const todayInWeek=dates.find(d=>dateToStr(d)===today);
    selDay=todayInWeek?today:dateToStr(dates[0]);
    D.hourlyDay=selDay;
  }
  const[y,m,d]=selDay.split('-').map(Number);
  const selDate=new Date(Date.UTC(y,m-1,d));
  const selJsDay=selDate.getUTCDay();
  const selIdx=selJsDay;

  // Day selector tabs
  const dayTabs=dates.map((d,i)=>{
    const ds=dateToStr(d);
    const isToday=ds===today;
    const isSel=ds===selDay;
    return`<button onclick="D.hourlyDay='${ds}';render()" style="padding:6px 12px;border-radius:8px;border:none;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;transition:all .13s;white-space:nowrap;${isSel?'background:#411517;color:#F4EDE3;':'background:transparent;color:var(--g4);'}${isToday&&!isSel?'outline:1.5px solid #FF5900;':''}">${SD[i]}<br><span style="font-size:9px;font-weight:400;font-family:monospace">${fmt(d)}</span></button>`;
  }).join('');

  // Hours 0-23
  // 30-minute intervals (48 slots)
  const SLOTS=Array.from({length:48},(_,i)=>i); // 0=00:00, 1=00:30, 2=01:00 ...
  const HOURS=Array.from({length:24},(_,i)=>i); // kept for compat
  const slotW=34; // px per 30-min slot (34*48=1632px total)
  const hourW=slotW*2; // 68px per hour (for bar positioning)
  const nameW=140;
  const fmtSlot=s=>{const h=Math.floor(s/2);const m=s%2===0?'00':'30';return`${String(h).padStart(2,'0')}:${m}`;};

  function getShiftSpan(p){
    const sh=getDayShift(p.id,selIdx);
    if(!sh||sh.start_time==='?')return null;
    const[sh_h,sh_m]=sh.start_time.split(':').map(Number);
    // Check for adj_end_time from attendance record
    const rec=getAttRecordForDate(p.id,selDay);
    let endStr=getEffectiveEndTime(p.id,sh,selDay)||sh.end_time;
    const[eh,em]=endStr.split(':').map(Number);
    const startH=sh_h+sh_m/60;
    let endH=eh+em/60;
    if(endH<=startH)endH+=24;
    return{start:startH,end:endH,type:sh.shift_type,name:sh.name,adjEnd:rec?.adj_end_time||null,lateMins:rec?.late_mins||0};
  }

  function getTasksForDay(pid){
    return(D.tasks||[]).filter(t=>t.patroller_id===pid&&t.date===selDay&&(t.status==='Approved'||t.status==='Running'||t.status==='Completed'));
  }

  function getRunningTasksForDay(pid){
    return(D.tasks||[]).filter(t=>t.patroller_id===pid&&t.date===selDay&&t.status==='Running');
  }

  function isOnVacDay(pid){
    return D.timeoff.find(t=>t.patroller_id===pid&&t.status==='Approved'&&selDay>=t.start_date&&selDay<=t.end_date);
  }

  function renderTimeline(p){
    const zone=gDZ(p.id,selIdx);
    const onVac=isOnVacDay(p.id);
    const sh=getShiftSpan(p);
    const tasks=getTasksForDay(p.id);
    const isAbs=isAbsentOnDate(p.id,selDay);
    let bars='';

    if(onVac){
      bars+=`<div style="position:absolute;left:0;right:0;top:4px;bottom:4px;background:linear-gradient(90deg,#7C3AED,#A855F7);border-radius:6px;display:flex;align-items:center;padding:0 8px"><span style="color:#fff;font-size:10px;font-weight:600">🌴 On Vacation</span></div>`;
    } else if(isAbs){
      bars+=`<div style="position:absolute;left:0;right:0;top:4px;bottom:4px;background:#FEE2E2;border:1.5px solid #fca5a5;border-radius:6px;display:flex;align-items:center;padding:0 8px"><span style="color:#DC2626;font-size:10px;font-weight:600">✗ Absent</span></div>`;
    } else if(!zone){
      bars+=`<div style="position:absolute;left:0;right:0;top:4px;bottom:4px;background:var(--g1);border-radius:6px;display:flex;align-items:center;padding:0 8px"><span style="color:var(--g3);font-size:10px">Off Day</span></div>`;
    } else {
      // Shift bar with late/clocked-in status
      if(sh){
        const ps=getPatrollerShiftStatus(p.id,selIdx,selDay);
        const left=Math.max(0,sh.start)*hourW;
        const width=(Math.min(sh.end,24)-Math.max(0,sh.start))*hourW;
        let bg=sh.type==='morning'?'#FFF0E6':'#FEF3C7';
        let col=sh.type==='morning'?'#FF5900':'#D97706';
        let border=`1.5px solid ${col}`;
        let statusOverlay='';

        if(ps.status==='late'){
          bg='#FEE2E2';col='#DC2626';border='2px solid #DC2626';
          const h=Math.floor(ps.lateMins/60);const m=ps.lateMins%60;
          const label=h>0?`${h}h ${m}m late`:`${m}m late`;
          statusOverlay=`<span style="background:#DC2626;color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px;animation:pulse 1.5s infinite">🔴 ${label}</span>`;
        } else if(ps.status==='clocked_in'){
          bg='#DCFCE7';col='#166534';border='2px solid #16A34A';
          const inT=new Date(ps.rec.clock_in).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});
          const adjEnd=ps.rec.adj_end_time||(ps.rec.late_mins>0?`${String(Math.floor((getShiftEndMins(ps.sh)+ps.rec.late_mins)/60)%24).padStart(2,'0')}:${String((getShiftEndMins(ps.sh)+ps.rec.late_mins)%60).padStart(2,'0')}`:null);
          // Add a "late period" red overlay from shift start to clock-in time
          if(ps.rec.late_mins>0){
            const lateStart=sh.start; // shift start hour
            const lateEnd=lateStart+(ps.rec.late_mins/60);
            const lateLeft=lateStart*hourW;
            const lateWidth=(lateEnd-lateStart)*hourW;
            bars+=`<div style="position:absolute;left:${lateLeft}px;width:${lateWidth}px;top:4px;bottom:4px;background:#FEE2E2;border:1.5px dashed #DC2626;border-radius:6px 0 0 6px;display:flex;align-items:center;justify-content:center;z-index:3"><span style="font-size:8px;color:#DC2626;font-weight:700">🔴 Late</span></div>`;
          }
          statusOverlay=`<span style="background:#166534;color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px">🟢 ${inT}${adjEnd&&ps.rec.late_mins>0?`→${adjEnd}`:''}</span>`;
        } else if(ps.status==='completed'){
          bg='#EAF1FD';col='#1565C0';border='1.5px solid #1565C0';
          const inT=new Date(ps.rec.clock_in).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});
          const outT=new Date(ps.rec.clock_out).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});
          const mins=Math.round((new Date(ps.rec.clock_out)-new Date(ps.rec.clock_in))/60000);
          const dur=`${Math.floor(mins/60)}h${mins%60}m`;
          statusOverlay=`<span style="background:#1565C0;color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px">✓ ${inT}→${outT} ${dur}</span>`;
        } else if(ps.status==='early_out_pending'){
          bg='#FEF3C7';col='#D97706';border='2px solid #D97706';
          statusOverlay=`<span style="background:#D97706;color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px">⏳ Early out</span>`;
        }

        bars+=`<div style="position:absolute;left:${left}px;width:${width}px;top:4px;bottom:4px;background:${bg};border:${border};border-radius:6px;overflow:hidden;display:flex;align-items:center;padding:0 6px" title="${sh.name}: ${zone}"><span style="color:${col};font-size:9px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${sh.type==='morning'?'☀️':'🌙'} ${zone}${statusOverlay}</span></div>`;
      }
      // Task bars (on top)
      tasks.forEach(t=>{
        if(!t.start_time)return;
        // For running tasks without end time, estimate end time as current time or shift end
        let tStart, tEnd;
        if(t.start_time){
          const[th,tm]=t.start_time.split(':').map(Number);
          tStart=th+tm/60;
        }
        if(t.end_time&&t.end_time!==''){
          const[eh2,em2]=t.end_time.split(':').map(Number);
          tEnd=eh2+em2/60;
        } else {
          // For running tasks, show from start to current time (or 1 hour minimum)
          if(selDay===today){
            const bhrN=getBahrainNow();
            tEnd=Math.max(tStart+0.5,bhrN.getUTCHours()+bhrN.getUTCMinutes()/60);
          } else {
            tEnd=tStart+1;
          }
        }
        
        const left=tStart*hourW;const width=(tEnd-tStart)*hourW;
        const bg=TASK_BG[t.task_type]||'#EDE9FE';
        const col=TASK_COLORS[t.task_type]||'#7C3AED';
        const isRunning=t.status==='Running';
        const isCompleted=t.status==='Completed';
        const pulse=isRunning?'animation:pulse 1.5s infinite;':'';
        const completedBg=isCompleted?'rgba(34, 197, 94, 0.1)':'';
        const completedBorder=isCompleted?'1.5px solid #16A34A':'2px solid '+col;
        
        bars+=`<div style="position:absolute;left:${left}px;width:${Math.max(width,hourW*.5)}px;top:3px;bottom:3px;background:${completedBg||bg};border:${completedBorder};border-radius:6px;overflow:visible;display:flex;align-items:center;padding:0 6px;z-index:2;cursor:pointer;${pulse}" title="${t.task_type}${isRunning?' (RUNNING)':''}${isCompleted?' (COMPLETED)':''}: ${t.description||''}" ${isRunning?`onclick="openM({type:'endtaskrun',taskId:'${t.id}',patName:'${p.name.replace(/'/g,"\\'")}'})"`:isRunning?``:`onclick="openM({type:'viewtask',task:D.tasks.find(x=>x.id==='${t.id}')})"`}><span style="color:${isCompleted?'#16A34A':col};font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${isRunning?'▶️':isCompleted?'✓':'📋'} ${t.task_type}</span>${isRunning?`<span style="color:${col};font-size:8px;margin-left:4px;font-weight:600;background:rgba(255,255,255,0.6);padding:1px 4px;border-radius:3px;white-space:nowrap">END</span>`:isCompleted?`<span style="color:#16A34A;font-size:8px;margin-left:4px;font-weight:600;background:rgba(34,197,94,0.2);padding:1px 4px;border-radius:3px;white-space:nowrap">DONE</span>`:''}</div>`;
      });
    }

    // Now indicator (Bahrain time)
    if(selDay===today){
      const bhrNow=getBahrainNow();
      const nowH=bhrNow.getUTCHours()+bhrNow.getUTCMinutes()/60;
      const nowLeft=nowH*hourW; // hourW=2*slotW so this is correct
      bars+=`<div style="position:absolute;left:${nowLeft}px;top:0;bottom:0;width:2px;background:#DC2626;z-index:10;pointer-events:none" title="Now (Bahrain)"></div>`;
    }

    return`<div style="position:relative;height:38px;min-width:${48*slotW}px">${bars}</div>`;
  }

  // Hourly count bar (how many on duty per hour)
  const activePtsDay=pts.filter(p=>!isOnVacDay(p.id)&&!isAbsentOnDate(p.id,selDay)&&gDZ(p.id,selIdx));
  const slotCounts=SLOTS.map(s=>{
    const slotH=s/2; // decimal hour (e.g. slot 17 = 8.5 = 08:30)
    const onDuty=activePtsDay.filter(p=>{
      const sh=getShiftSpan(p);if(!sh)return false;
      return slotH>=sh.start&&slotH<sh.end;
    }).length;
    const onTask=activePtsDay.filter(p=>(D.tasks||[]).some(t=>{
      if(!t.start_time||t.patroller_id!==p.id||t.date!==selDay||t.status==='Pending')return false;
      const[th,tm]=t.start_time.split(':').map(Number);const tStart=th+tm/60;
      const[eh,em]=(t.end_time||'23:59').split(':').map(Number);const tEnd=eh+em/60;
      return slotH>=tStart&&slotH<tEnd;
    })).length;
    return{s,onDuty,onTask};
  });
  const maxDuty=Math.max(1,...slotCounts.map(x=>x.onDuty));

  const countBar=`<div style="background:#fff;border:1.5px solid #E8DDD4;border-radius:12px;padding:12px 16px;margin-bottom:12px;overflow-x:auto">
    <div style="font-size:11px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Hourly staffing — ${selDay}</div>
    <div style="min-width:${48*slotW+nameW}px">
      <div style="display:flex;margin-left:${nameW}px;margin-bottom:4px">
        ${SLOTS.map(s=>{
          const isHour=s%2===0;
          const isNowSlot=selDay===today&&s===Math.floor(getBahrainNow().getUTCHours()*2+getBahrainNow().getUTCMinutes()/30);
          return`<div style="width:${slotW}px;font-size:${isHour?'9':'8'}px;color:${isNowSlot?'#FF5900':isHour?'var(--g3)':'var(--g2)'};text-align:center;font-family:monospace;overflow:hidden">${isHour?fmtSlot(s):s%4===2?'30':''}</div>`;
        }).join('')}
      </div>
      <div style="display:flex;align-items:flex-end;margin-left:${nameW}px;height:40px;gap:1px">
        ${slotCounts.map(({s,onDuty,onTask})=>{
          const barH=maxDuty?Math.round((onDuty/maxDuty)*36):0;
          const taskH=onDuty?Math.round((onTask/onDuty)*barH):0;
          const isNow=selDay===today&&s===Math.floor(getBahrainNow().getUTCHours()*2+getBahrainNow().getUTCMinutes()/30);
          const isHour=s%2===0;
          return`<div style="width:${slotW-1}px;display:flex;flex-direction:column;justify-content:flex-end;height:36px;position:relative;cursor:default;border-left:${isHour?'1px solid #F0EDE8':'none'}" title="${fmtSlot(s)} — ${onDuty} on duty">
            <div style="background:${isNow?'#FF5900':'#411517'};height:${barH}px;border-radius:2px 2px 0 0;transition:height .3s;position:relative">
              ${taskH>0?`<div style="position:absolute;bottom:0;left:0;right:0;height:${taskH}px;background:#7C3AED;border-radius:2px 2px 0 0"></div>`:''}
            </div>
            ${onDuty>0&&isHour?`<div style="position:absolute;top:0;left:0;right:0;text-align:center;font-size:8px;font-weight:700;color:${isNow?'#FF5900':'#411517'}">${onDuty}</div>`:''}
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;margin-left:${nameW}px;margin-top:4px;gap:8px">
        <span style="font-size:9px;color:#411517"><span style="display:inline-block;width:10px;height:8px;background:#411517;border-radius:2px;margin-right:3px;vertical-align:middle"></span>On duty</span>
        <span style="font-size:9px;color:#7C3AED"><span style="display:inline-block;width:10px;height:8px;background:#7C3AED;border-radius:2px;margin-right:3px;vertical-align:middle"></span>On task</span>
        <span style="font-size:9px;color:#FF5900"><span style="display:inline-block;width:10px;height:8px;background:#FF5900;border-radius:2px;margin-right:3px;vertical-align:middle"></span>Now</span>
      </div>
    </div>
  </div>`;

  const rows=pts.map(p=>`
    <div style="display:flex;align-items:center;border-bottom:1px solid #F4EDE3;min-height:46px">
      <div style="width:${nameW}px;flex-shrink:0;padding:0 10px;font-size:12px;font-weight:600;color:#2A0D0F">
        ${p.name}
        ${canEdit()?`<button class="edit-btn" style="width:20px;height:20px;margin-left:3px" onclick="openM({type:'taskreq',pid:'${p.id}',pname:'${p.name.replace(/'/g,"\'")}',pdate:'${selDay}'})"><i class="ti ti-plus" style="font-size:10px"></i></button>`:''}
      </div>
      <div style="flex:1;overflow-x:visible;padding:4px 0">
        ${renderTimeline(p)}
      </div>
    </div>`).join('');

  return`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;background:var(--g1);border-radius:10px;padding:4px;width:fit-content">${dayTabs}</div>
  ${countBar}
  <div style="background:#fff;border:1.5px solid #E8DDD4;border-radius:12px;overflow:hidden">
    <div style="overflow-x:auto">
      <div style="display:flex;background:#F4EDE3;border-bottom:1.5px solid #E8DDD4;position:sticky;top:0;z-index:5;min-width:${48*slotW+nameW}px">
        <div style="width:${nameW}px;flex-shrink:0;padding:7px 10px;font-size:10px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em">Name</div>
        ${SLOTS.map(s=>{
          const isHour=s%2===0;
          const isNow=selDay===today&&s===Math.floor(getBahrainNow().getUTCHours()*2+getBahrainNow().getUTCMinutes()/30);
          return`<div style="width:${slotW}px;flex-shrink:0;text-align:center;padding:${isHour?'7':'9'}px 0 ${isHour?'7':'5'}px;font-size:${isHour?'9':'8'}px;font-weight:${isNow?'700':'400'};color:${isNow?'#FF5900':isHour?'var(--g3)':'var(--g2)'};font-family:monospace;border-left:${isHour?'1px solid #E8DDD4':'none'}">${isHour?fmtSlot(s):s%4===2?':30':''}</div>`;
        }).join('')}
      </div>
      ${rows}
    </div>
  </div>`;
}

function tasksView(){
  const ed=canEdit();
  const all=D.tasks||[];
  const running=all.filter(t=>t.status==='Running').length;
  const completed=all.filter(t=>t.status==='Completed').length;
  const pen=all.filter(t=>t.status==='Pending').length;

  const getStatusStyle=(status)=>{
    if(status==='Running')return'background:#DCFCE7;color:#166534;font-weight:700';
    if(status==='Completed')return'background:#E5F6E6;color:#0B6D2F;font-weight:700';
    if(status==='Pending')return'background:#FEF3C7;color:#92400E';
    return'background:var(--g1);color:var(--g3)';
  };

  const rows=all.map(t=>{
    const col=TASK_COLORS[t.task_type]||'#411517';
    const bg=TASK_BG[t.task_type]||'#F4EDE3';
    const duration=t.start_time&&t.end_time?`${t.start_time} → ${t.end_time}`:t.start_time?`Started: ${t.start_time}`:'--';
    const statusDisplay=t.status==='Running'?`<i class="ti ti-circle-filled" style="font-size:6px;margin-right:4px;animation:pulse 1.5s infinite"></i>${t.status}`:`${t.status==='Completed'?'✓':''} ${t.status}`;
    
    return`<tr>
      <td class="lt" style="font-weight:600">${t.patroller_name||'--'}</td>
      <td><span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;background:${bg};color:${col}">${t.task_type}</span></td>
      <td style="font-family:monospace;font-size:11px">${t.date||'--'}</td>
      <td style="font-size:11px">${duration}</td>
      <td style="font-size:11px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.description||'--'}</td>
      <td><span style="font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;${getStatusStyle(t.status)}">${statusDisplay}</span></td>
      ${ed?`<td style="white-space:nowrap">
        ${t.status==='Running'?`<button class="btn btn-primary" style="padding:4px 10px;font-size:10px" onclick="endTask('${t.id}','${t.patroller_name}')"><i class="ti ti-player-stop"></i>End</button>`:``}
        <button class="icon-btn" onclick="delTask('${t.id}')"><i class="ti ti-trash"></i></button>
      </td>`:''}
    </tr>`;
  }).join('');

  return`<style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}</style><div class="stats">
    <div class="stat green"><div class="stat-label">Running</div><div class="stat-value">${running}</div></div>
    <div class="stat blue"><div class="stat-label">Completed</div><div class="stat-value">${completed}</div></div>
    <div class="stat amber"><div class="stat-label">Pending</div><div class="stat-value">${pen}</div></div>
    <div class="stat" style="background:#FFFFFF;border:1.5px solid #E8DDD4"><div class="stat-label">Total</div><div class="stat-value">${all.length}</div></div>
  </div>
  <div class="toolbar">
    <button class="btn btn-primary" onclick="openM({type:'taskreq'})"><i class="ti ti-plus"></i>Start New Task</button>
    <button class="btn" onclick="dlTasks()"><i class="ti ti-download"></i>Export CSV</button>
  </div>
  ${all.length===0?`<div style="padding:40px;text-align:center;color:var(--g3)"><i class="ti ti-checklist" style="font-size:40px;display:block;margin-bottom:10px;opacity:.4"></i>No tasks yet.</div>`:`
  <div class="tcard"><div class="t-scroll"><table style="table-layout:auto"><thead><tr>
    <th class="lt">Patroller</th><th>Type</th><th>Date</th><th>Time</th><th>Description</th><th>Status</th>${ed?'<th>Actions</th>':''}
  </tr></thead><tbody>${rows}</tbody></table></div></div>`}`;
}

async function startTask(){
  const e=document.getElementById('tr-e');e.style.display='none';
  const pid=document.getElementById('tr-pat').value;
  const type=document.getElementById('tr-type').value;
  const name=(document.getElementById('tr-name').value||'').trim();
  const desc=(document.getElementById('tr-desc').value||'').trim();
  const selectedDate=(document.getElementById('tr-date').value||'').trim();
  
  if(!pid){e.textContent='Select a patroller.';e.style.display='block';return;}
  if(!name){e.textContent='Task name is required.';e.style.display='block';return;}
  if(!selectedDate){e.textContent='Select a date.';e.style.display='block';return;}
  
  const pat=D.patrollers.find(p=>p.id===pid);
  const now=new Date().toISOString();
  const startTime=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});
  
  const{error}=await sb.from('task_requests').insert({
    patroller_id:pid,
    patroller_name:pat?.name||'Unknown',
    task_type:type,
    date:selectedDate,
    start_time:startTime,
    end_time:(()=>{const ed=new Date();ed.setHours(ed.getHours()+1);return ed.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});})(),
    description:desc||null,
    status:'Running',
    submitted_by:D.profile.id,
    created_at:now,
    updated_at:now
  });
  
  if(error){e.textContent=error.message;e.style.display='block';return;}
  sendWebhook('task_started',{patroller_name:pat?.name,task_type:type,task_name:name,description:desc,started_by:D.profile.full_name,started_at:new Date().toLocaleString('en-GB'),app_url:REDIRECT});
  closeM();await reload();
}

async function endTask(taskId,patrollerName){
  const now=new Date().toISOString();
  const endTime=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});
  
  const{error}=await sb.from('task_requests').update({
    end_time:endTime,
    status:'Completed',
    updated_at:now
  }).eq('id',taskId);
  
  if(error){alert('Error completing task: '+error.message);return;}
  
  const task=D.tasks.find(t=>t.id===taskId);
  if(task){
    const duration=task.start_time&&endTime?`${task.start_time} - ${endTime}`:'';
    sendWebhook('task_completed',{patroller_name:patrollerName,task_name:task.description||task.task_type,task_type:task.task_type,duration,completed_by:D.profile.full_name,app_url:REDIRECT});
  }
  
  await reload();
}

async function endTaskPatroller(taskId){
  const task=D.tasks.find(t=>t.id===taskId);
  if(!task){alert('Task not found');return;}
  const patName=task.patroller_name||'Unknown';
  await endTask(taskId,patName);
}

async function doCreateUser(){
  clearMsgs('cu-e','cu-ok');
  const name=document.getElementById('cu-name').value.trim();
  const email=document.getElementById('cu-email').value.trim().toLowerCase();
  const roleRaw=document.getElementById('cu-role').value;
  const isCustomRole=roleRaw.startsWith('cr:');
  const customRoleId=isCustomRole?roleRaw.replace('cr:',''):null;
  const cr2=customRoleId?(D.customRoles||[]).find(r=>r.id===customRoleId):null;
  const role=cr2?(cr2.access_level==='admin'?'admin':cr2.access_level==='editor'?'lead':'patroller'):'patroller';
  const phone=(document.getElementById('cu-phone')?.value||'').trim();
  if(!name||!email){showErr('cu-e','Name and email required.');return;}
  const btn=document.getElementById('cu-btn');btn.disabled=true;btn.textContent='Creating...';
  try{
    // Check if already exists
    const{data:existing}=await wt(sb.from('profiles').select('id').eq('email',email).maybeSingle(),5000);
    if(existing){showErr('cu-e','A user with this email already exists.');btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i>Create user';return;}
    // Create auth account with email-derived password
    const{data,error}=await sb.auth.signUp({email,password:email+'_talabat_access',options:{data:{full_name:name,role},emailRedirectTo:REDIRECT}});
    if(error)throw error;
    const uid=data?.user?.id;
    if(uid){
      await sb.from('profiles').upsert({id:uid,email,full_name:name,role,is_active:true,custom_role_id:customRoleId||null},{onConflict:'id'});
      if(role==='patroller'||role==='coordinator'){
        // Check if patroller entry already exists for this user
        const{data:existingPat}=await sb.from('patrollers').select('id').eq('user_id',uid).maybeSingle();
        if(!existingPat){
          const{data:np}=await sb.from('patrollers').insert({name,shift_id:D.shifts[0]?.id||null,cov_area:'',user_id:uid,is_active:true,user_type:role,phone:phone||null}).select().single();
          if(np)await sb.from('schedules').insert({patroller_id:np.id,week_start:wStart(),day_0:'',day_1:'',day_2:'',day_3:'',day_4:'',day_5:'',day_6:''});
        } else {
          // Update existing patroller
          await sb.from('patrollers').update({name,user_type:role,is_active:true}).eq('user_id',uid);
        }
      }
    }
    showOk('cu-ok',`User "${name}" created! They can log in with their email.`);
    btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i>Create user';await reload();
  }catch(e){btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i>Create user';showErr('cu-e',e.message||'Failed.');}
}

async function savePat(id){

// ── LEAVE BALANCE HELPERS ──
const ANNUAL_DAILY_RATE = 30.295 / 365; // ~0.083 days per day

function getLeaveYear(){ return new Date().getFullYear(); }

function calcAnnualAccrued(){
  const now = new Date();
  const jan1 = new Date(now.getFullYear(), 0, 1);
  const daysElapsed = Math.floor((now - jan1) / 86400000);
  return Math.round(daysElapsed * ANNUAL_DAILY_RATE * 1000) / 1000;
}

function getLeaveBalance(patrollerId){
  const lb = D.leaveBalances.find(b => b.patroller_id === patrollerId);
  const pat = D.patrollers.find(p=>p.id===patrollerId);
  // For patroller's own view, use their profile email directly
  const isOwnProfile = pat && D.profile && pat.user_id === D.profile.id;
  const ownEmail = isOwnProfile ? D.profile.email : null;
  const rosterEntry = ownEmail
    ? getRosterByEmail(ownEmail)
    : (pat ? getRosterByPatroller(pat) : null);
  const year = getLeaveYear();
  const accrued = calcAnnualAccrued();

  // Carry forward: use DB value if set, else use roster spreadsheet value
  const carryForward = (lb && lb.annual_carry_forward != null && lb.annual_carry_forward > 0)
    ? lb.annual_carry_forward
    : (rosterEntry ? rosterEntry.carryFwd : 0);
  const totalAnnual = carryForward + accrued;

  // Entitlements: use roster values (sick leave varies per person from spreadsheet)
  const sickEnt = rosterEntry ? rosterEntry.sickEnt : 15;
  const sick50Ent = rosterEntry ? rosterEntry.sick50Ent : 20;
  const unpaidEnt = rosterEntry ? rosterEntry.unpaidEnt : 20;
  const bereavEnt = rosterEntry ? rosterEntry.bereavEnt : 5;

  // Consumed this year from approved time-off requests
  const yearStr = String(year);
  const approved = (D.timeoff || []).filter(t =>
    t.patroller_id === patrollerId &&
    t.status === 'Approved' &&
    (t.start_date || '').startsWith(yearStr)
  );

  const countDays = arr => arr.reduce((s,t) => {
    const d1=new Date(t.start_date), d2=new Date(t.end_date);
    return s + (isNaN(d1)||isNaN(d2) ? 1 : Math.round((d2-d1)/86400000)+1);
  }, 0);

  // Historical consumed: DB value takes priority, then roster spreadsheet value
  const historicalConsumed = (lb && lb.historical_consumed != null)
    ? lb.historical_consumed
    : (rosterEntry ? (rosterEntry.historicalConsumed || 0) : 0);
  const historicalSick = (lb && lb.historical_sick != null)
    ? lb.historical_sick
    : 0;
  // App consumed = new approved requests entered in this app
  const appConsumedAnnual  = countDays(approved.filter(t=>t.request_type==='Annual Leave'));
  const consumedAnnual     = historicalConsumed + appConsumedAnnual;
  const appConsumedSick    = countDays(approved.filter(t=>t.request_type==='Sick Leave'));
  const consumedSick       = historicalSick + appConsumedSick;
  const consumedSick50     = countDays(approved.filter(t=>t.request_type==='Sick Leave 50%'));
  const consumedUnpaid     = countDays(approved.filter(t=>['Sick Leave Unpaid','Unpaid Leave'].includes(t.request_type)));
  const consumedBereavement= countDays(approved.filter(t=>['Death','Bereavement'].includes(t.request_type)));

  const r = (v) => Math.round(v * 1000) / 1000;

  return {
    carryForward:        r(carryForward),
    accrued:             r(accrued),
    totalAnnual:         r(totalAnnual),
    consumedAnnual,
    annualRemaining:     Math.max(0, r(totalAnnual - consumedAnnual)),
    sickEnt, consumedSick,
    sickRemaining:       Math.max(0, sickEnt - consumedSick),
    sick50Ent, consumedSick50,
    sick50Remaining:     Math.max(0, sick50Ent - consumedSick50),
    unpaidEnt, consumedUnpaid,
    unpaidRemaining:     Math.max(0, unpaidEnt - consumedUnpaid),
    bereavEnt, consumedBereavement,
    bereavementRemaining:Math.max(0, bereavEnt - consumedBereavement),
    year,
    historicalConsumed, historicalSick,
    riderId: (lb&&lb.rider_id) ? lb.rider_id : (rosterEntry ? rosterEntry.riderId : ''),
    lastUpdated: lb ? lb.updated_at : null,
  };
}

  const allBalances = pts.map(p => getLeaveBalance(p.id));
  const lowBalance = allBalances.filter(b => b.annualRemaining < 5).length;
  const totalAnnualUsed = allBalances.reduce((s,b) => s + b.consumedAnnual, 0);

  const isJan1=getBahrainNow().getUTCMonth()===0&&getBahrainNow().getUTCDate()===1;
  return`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
    <div style="font-size:11px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em">${pts.length} staff · ${getLeaveYear()}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${lowBalance>0?`<span style="font-size:11px;background:#FEE2E2;color:#DC2626;padding:4px 10px;border-radius:8px;font-weight:600">⚠ ${lowBalance} low balance</span>`:''}
      <span style="font-size:11px;background:#F4EDE3;color:#411517;padding:4px 10px;border-radius:8px">Used this year: ${totalAnnualUsed}d</span>
      ${isJan1?`<button class="btn btn-primary" onclick="runYearEndCarryForward()" style="font-size:11px"><i class="ti ti-calendar-stats"></i>Run Year-End</button>`:''}
      <button class="btn" onclick="downloadReport('leave')" style="font-size:11px"><i class="ti ti-download"></i>Export</button>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px">
    ${pts.map(p => leaveBalanceCard(p)).join('')}
  </div>`;
}

// ── MY LEAVE BALANCE VIEW (patroller) ──
function myLeaveBalanceView(){
  const p = D.patrollers.find(pt => pt.user_id === D.profile.id);
  if(!p) return `<div style="padding:40px;text-align:center;color:var(--g3)">Your account is not linked to a schedule record.</div>`;
  return `<div style="max-width:480px;margin:0 auto">${leaveBalanceCard(p, true)}</div>`;
}

// ── EARLY CLOCK OUT ──
async function submitEarlyClockOut(patId,attId,adjEndStr){
  const reason=document.getElementById('early-reason').value.trim()||'No reason provided';
  const pat=D.patrollers.find(p=>p.id===patId);
  const now=getBahrainNow();
  const timeStr=`${String(now.getUTCHours()).padStart(2,'0')}:${String(now.getUTCMinutes()).padStart(2,'0')}`;
  const{error}=await sb.from('task_requests').insert({
    patroller_id:patId,patroller_name:pat?.name||'',
    task_type:'Early Clock Out',
    date:todayStr(),start_time:timeStr,end_time:adjEndStr,
    status:'Pending',description:`Early clock out request. Reason: ${reason}. Att ID: ${attId}`,
  });
  if(error){alert(error.message);return;}
  closeM();await reload();
  addNotification('Early clock out request submitted — awaiting approval','info');
}

async function approveEarlyClockOut(taskId,attId){
  // Complete the clock out
  const now=new Date();
  let map='';
  try{const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:5000}));map=`https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;}catch(e){}
  await sb.from('attendance').update({clock_out:now.toISOString(),clock_out_map:map||null,status:'Attended'}).eq('id',attId);
  await sb.from('task_requests').update({status:'Approved',reviewed_by:D.profile.id,updated_at:now.toISOString()}).eq('id',taskId);
  await reload();
  addNotification('Early clock out approved','success');
}

async function rejectEarlyClockOut(taskId){
  await sb.from('task_requests').update({status:'Rejected',reviewed_by:D.profile.id,updated_at:new Date().toISOString()}).eq('id',taskId);
  await reload();
  addNotification('Early clock out rejected — patroller must complete shift','warning');
}

// ── YEAR END LEAVE CARRY FORWARD ──
async function runYearEndCarryForward(){
  // Call this manually on Jan 1 to lock annual remaining as new carry forward
  const confirm=window.confirm('This will update all annual leave carry forwards to remaining balances. Run only on Jan 1. Continue?');
  if(!confirm)return;
  const pts=activePats();
  let updated=0;
  for(const p of pts){
    const b=getLeaveBalance(p.id);
    const existing=D.leaveBalances.find(lb=>lb.patroller_id===p.id);
    const newCF=Math.max(0,b.annualRemaining);
    if(existing){
      await sb.from('leave_balances').update({annual_carry_forward:newCF,historical_consumed:0,historical_sick:0,year:new Date().getFullYear(),updated_at:new Date().toISOString()}).eq('id',existing.id);
    } else {
      await sb.from('leave_balances').insert({patroller_id:p.id,annual_carry_forward:newCF,historical_consumed:0,historical_sick:0,year:new Date().getFullYear()});
    }
    updated++;
  }
  await reload();
  addNotification(`Year-end carry forward updated for ${updated} staff`,'success');
}

// ── NOTIFICATIONS ──
let D_notifs=[];
let notifSoundEnabled=true;

function playNotifSound(type='info'){
  if(!notifSoundEnabled)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    if(type==='success'){
      osc.frequency.setValueAtTime(520,ctx.currentTime);
      osc.frequency.setValueAtTime(780,ctx.currentTime+0.12);
      gain.gain.setValueAtTime(0.3,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.4);
    } else {
      osc.frequency.setValueAtTime(660,ctx.currentTime);
      gain.gain.setValueAtTime(0.2,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.3);
    }
  }catch(e){}
}

function showToast(msg,type='info'){
  const cols={info:'#1565C0',success:'#166534',warning:'#D97706',error:'#DC2626'};
  const bgs={info:'#EAF1FD',success:'#DCFCE7',warning:'#FEF3C7',error:'#FEE2E2'};
  const icons={info:'ti-info-circle',success:'ti-circle-check',warning:'ti-alert-triangle',error:'ti-circle-x'};
  let toast=document.getElementById('toast-container');
  if(!toast){toast=document.createElement('div');toast.id='toast-container';toast.style.cssText='position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:300px';document.body.appendChild(toast);}
  const t=document.createElement('div');
  t.style.cssText=`background:${bgs[type]};border:1.5px solid ${cols[type]}33;border-radius:12px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:slideIn .2s ease;font-family:'Plus Jakarta Sans',sans-serif`;
  t.innerHTML=`<i class="ti ${icons[type]}" style="font-size:15px;color:${cols[type]};flex-shrink:0"></i><div style="flex:1;font-size:12px;color:#2A0D0F;line-height:1.4">${msg}</div><button onclick="this.parentElement.remove()" style="background:none;border:none;cursor:pointer;color:#A08070;font-size:16px;line-height:1;padding:0">×</button>`;
  toast.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},4000);
}

function addNotification(msg,type='info'){
  D_notifs.unshift({id:Date.now(),msg,type,time:new Date(),read:false});
  if(D_notifs.length>20)D_notifs=D_notifs.slice(0,20);
  playNotifSound(type);
  showToast(msg,type);
  renderNotifications();
}

function renderNotifications(){
  const badge=document.getElementById('notif-count');
  const list=document.getElementById('notif-list');
  if(!badge||!list)return;
  const unread=D_notifs.filter(n=>!n.read).length;
  badge.textContent=unread;
  badge.style.display=unread>0?'flex':'none';
  if(!D_notifs.length){list.innerHTML='<div style="padding:20px;text-align:center;color:#A08070;font-size:12px">No notifications</div>';return;}
  const icons={info:'ti-info-circle',success:'ti-circle-check',warning:'ti-alert-triangle',error:'ti-circle-x'};
  const cols={info:'#1565C0',success:'#166534',warning:'#D97706',error:'#DC2626'};
  list.innerHTML=D_notifs.map(n=>`<div style="padding:10px 14px;border-bottom:1px solid #F4EDE3;display:flex;gap:10px;background:${n.read?'#fff':'#FFFBF5'}"><i class="ti ${icons[n.type]||icons.info}" style="font-size:14px;color:${cols[n.type]||cols.info};margin-top:1px;flex-shrink:0"></i><div style="flex:1"><div style="font-size:12px;color:#2A0D0F;line-height:1.4">${n.msg}</div><div style="font-size:10px;color:#A08070;margin-top:2px">${n.time.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'})}</div></div></div>`).join('');
  D_notifs.forEach(n=>n.read=true);
}

function toggleNotifications(){
  const panel=document.getElementById('notif-panel');if(!panel)return;
  const open=panel.style.display==='block';
  panel.style.display=open?'none':'block';
  if(!open){renderNotifications();setTimeout(()=>document.addEventListener('click',function h(e){if(!panel.contains(e.target)){panel.style.display='none';document.removeEventListener('click',h);}}),50);}
}
function clearNotifications(){D_notifs=[];renderNotifications();}

// ── GLOBAL ERROR HANDLER ──
window.addEventListener('error', (e) => {
  console.error('Global error:', e.message, e.filename, e.lineno);
  const main = document.getElementById('main');
  if(main && (!main.innerHTML || main.innerHTML.trim() === '' || main.innerHTML === '<div class="fade-in"></div>')) {
    main.innerHTML = `<div style="padding:40px;text-align:center">
      <div style="font-size:40px;margin-bottom:12px">⚠️</div>
      <div style="font-size:15px;font-weight:700;color:#DC2626;margin-bottom:8px">Something went wrong</div>
      <div style="font-size:12px;color:#A08070;margin-bottom:16px;font-family:monospace">${e.message}</div>
      <button class="btn btn-primary" onclick="doRefresh()"><i class="ti ti-refresh"></i>Tap to refresh</button>
    </div>`;
  }
});

  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').then(r=>{
      console.log('SW registered');
    }).catch(e=>console.log('SW failed',e));
  });
}

// ── Install prompt ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();deferredPrompt=e;
  const btn=document.getElementById('install-btn');
  if(btn)btn.style.display='flex';
});
function installApp(){
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.waitForOutcome().then(()=>{deferredPrompt=null;const btn=document.getElementById('install-btn');if(btn)btn.style.display='none';});}
}
