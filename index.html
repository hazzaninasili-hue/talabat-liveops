  }
  if(m.type==='endtaskrun'){
    const taskId=m.taskId;
    const patName=m.patName;
    box.innerHTML=`<div class="modal-title"><i class="ti ti-player-stop"></i>End Task - ${patName}</div>
    <div style="background:#DCFCE7;border:1.5px solid #86efac;border-radius:12px;padding:14px;margin-bottom:16px;text-align:center">
      <div style="font-size:13px;font-weight:600;color:#166534;margin-bottom:4px">Task is currently running</div>

async function saveEditUser(uid){
  clearMsgs('eu-e','eu-ok');
  const name=document.getElementById('eu-name').value.trim();
  const email=document.getElementById('eu-email').value.trim().toLowerCase();
  const role=document.getElementById('eu-role').value;
  const phone=(document.getElementById('eu-phone').value||'').trim();
  const patrollerIdNum=(document.getElementById('eu-patroller-id')?.value||'').trim();
  const basicSalary=parseFloat(document.getElementById('eu-basic-salary')?.value)||null;
  if(!name||!email){showErr('eu-e','Name and email are required.');return;}
  if(!phone){showErr('eu-e','Mobile number is required.');return;}
  if(!patrollerIdNum){showErr('eu-e','Patroller ID is required.');return;}
  if(!basicSalary){showErr('eu-e','Basic salary is required.');return;}
  // Update profile
  const{error}=await sb.from('profiles').update({full_name:name,email,role}).eq('id',uid);
  if(error){showErr('eu-e',error.message);return;}
  // Update linked patroller entry if exists
  const pat=D.patrollers.find(p=>p.user_id===uid);
  if(pat){
    // For lead/admin: keep is_active=false for schedule, but still save profile data
    const isLeadOrAdmin=role==='admin'||role==='lead';
    await sb.from('patrollers').update({
      name,phone:phone||null,user_type:role,
      patroller_id_num:patrollerIdNum||null,
      basic_salary:basicSalary,
      join_date:document.getElementById('eu-join-date')?.value||null,
      is_active:isLeadOrAdmin?false:true
    }).eq('id',pat.id);
  } else {
    // No patroller row yet — create one for ALL roles (needed for profile card + incentive)
    const isLeadOrAdmin=role==='admin'||role==='lead';
    const{data:np}=await sb.from('patrollers').insert({
      name,shift_id:D.shifts[0]?.id||null,cov_area:'',
      user_id:uid,is_active:!isLeadOrAdmin,user_type:role,
      phone:phone||null,patroller_id_num:patrollerIdNum||null,basic_salary:basicSalary
    }).select().single();
    if(np&&!isLeadOrAdmin)await sb.from('schedules').insert({patroller_id:np.id,week_start:wStart(),day_0:'',day_1:'',day_2:'',day_3:'',day_4:'',day_5:'',day_6:''});
  }
  showOk('eu-ok','Profile updated!');
  await reload();
  closeM();
}

// ── DEVICE BIOMETRIC AUTHENTICATION ──
async function getDeviceFingerprint(){
  try{
    const userAgent=navigator.userAgent;
    const screen=`${window.innerWidth}x${window.innerHeight}`;
    const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
    const lang=navigator.language;
    const fingerprint=`${userAgent}|${screen}|${tz}|${lang}`;
    const hash=await sha256(fingerprint);
    return hash.substring(0,32);
  }catch(e){
    return btoa(Math.random().toString()).substring(0,32);
  }
}

async function sha256(str){
  const buf=new TextEncoder().encode(str);
  const hashBuf=await crypto.subtle.digest('SHA-256',buf);
  const hashArr=Array.from(new Uint8Array(hashBuf));
  return hashArr.map(x=>x.toString(16).padStart(2,'0')).join('');
}

async function checkDeviceRegistration(email){
  const deviceId=await getDeviceFingerprint();
  const{data}=await sb.from('device_biometric').select('*').eq('email',email).eq('device_id',deviceId).maybeSingle();
  return{deviceId,registered:!!data,deviceData:data};
}

async function verifyBiometric(){
  return new Promise((resolve)=>{
    // Try native biometric API first
    if(navigator.credentials && navigator.permissions){
      navigator.permissions.query({name:'biometric'})
        .then(result=>{
          if(result.state==='granted'){
            resolve(true);
            return;
          }
          // Fallback to simple modal verification
          showBiometricSimpleModal(resolve);
        })
        .catch(()=>showBiometricSimpleModal(resolve));
    } else {
      // No advanced API - use simple verification
      showBiometricSimpleModal(resolve);
    }
  });
}

function showBiometricSimpleModal(callback){
  const verifyCode=generateVerifyCode();
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:10000';

      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:50px;margin-bottom:10px">👆</div>
        <div style="font-size:16px;font-weight:600;color:#411517">Device Verification</div>
        <div style="font-size:13px;color:#666;margin-top:8px">Please verify your identity</div>
      </div>
      
      <div style="background:#F3F4F6;border-radius:8px;padding:16px;margin-bottom:16px;text-align:center;font-family:monospace;font-size:18px;letter-spacing:4px;font-weight:600;color:#1F2937">${verifyCode}</div>
      
      <div style="font-size:12px;color:#666;margin-bottom:16px;line-height:1.5">
        Your device has been recognized. Enter the code above to confirm your identity.
      </div>
      
      <input type="text" id="verify-code-input" placeholder="Enter 4-digit code" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px;text-align:center;letter-spacing:3px;margin-bottom:12px">
      
      <div style="display:flex;gap:8px">
        <button style="flex:1;padding:10px;background:#f0f0f0;border:none;border-radius:6px;cursor:pointer;font-weight:600" onclick="this.parentElement.parentElement.parentElement.remove();window.biometricVerifyCallback(false)">Cancel</button>
        <button style="flex:1;padding:10px;background:#FF5900;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:600" onclick="verifyCode(this.parentElement.parentElement)">Verify</button>
      </div>
    </div>
  `;
  
  document.body.appendChild(overlay);
  document.getElementById('verify-code-input').focus();
  
  // Store for verification
  window.biometricVerifyCallback=callback;
  window.biometricExpectedCode=verifyCode;
}

function generateVerifyCode(){
  return Math.floor(Math.random()*9000+1000).toString();
}

function verifyCode(formEl){
  const entered=document.getElementById('verify-code-input').value;
  const expected=window.biometricExpectedCode;
  
  if(entered===expected){
    // Success
    formEl.parentElement.remove();
    window.biometricVerifyCallback(true);
  } else {
    // Show error
    const input=document.getElementById('verify-code-input');
    input.style.borderColor='#DC2626';
    input.value='';
    input.placeholder='Wrong code. Try again';
    setTimeout(()=>{
      input.style.borderColor='#ddd';
      input.placeholder='Enter 4-digit code';
    },2000);
  }
}

// ── ATTENDANCE HELPERS ──
function getBahrainNow(){
  // Bahrain is UTC+3, always (no DST)
  const now=new Date();
  const bhr=new Date(now.getTime()+(3*60*60*1000));
  return bhr;
}
function todayStr(){
  const bhr=getBahrainNow();
  const y=bhr.getUTCFullYear();
  const m=String(bhr.getUTCMonth()+1).padStart(2,'0');
  const d=String(bhr.getUTCDate()).padStart(2,'0');
  return`${y}-${m}-${d}`;
}
function todayDayIdx(){
  // Sun=0, Mon=1, ... Sat=6 (Bahrain week, UTC+3)
  return getBahrainNow().getUTCDay();
}
function getMyAttRecord(){const today=todayStr();return(D.attendance||[]).find(a=>a.patroller_id===(D.patrollers.find(p=>p.user_id===D.profile.id)?.id)&&a.date===today);}
function isOnVacationToday(pid){const today=todayStr();return D.timeoff.find(t=>t.patroller_id===pid&&t.status==='Approved'&&today>=t.start_date&&today<=t.end_date);}
function fmtDateTime(ts){if(!ts)return'--';const d=new Date(ts);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});}
function mapsLink(lat,lng){return`https://www.google.com/maps?q=${lat},${lng}`;}

// ── GET LOCATION ──
async function checkAndSaveLocationPermission(){
  if(!navigator.geolocation){
    saveLocationPermission('denied','Geolocation not supported by browser');return;
  }
  try{
    // Use permissions API if available
    if(navigator.permissions){
      const result=await navigator.permissions.query({name:'geolocation'});
      if(result.state==='granted'){saveLocationPermission('granted',null);return;}
      if(result.state==='denied'){saveLocationPermission('denied','User denied location access');return;}
    }
    // Try to get location to check
    navigator.geolocation.getCurrentPosition(
      ()=>saveLocationPermission('granted',null),
      (e)=>saveLocationPermission('denied',e.message),
      {timeout:5000}
    );
  }catch(e){saveLocationPermission('unknown',e.message);}
}

async function saveLocationPermission(status,reason){
  const pat=D.patrollers.find(p=>p.user_id===D.profile.id);
  if(!pat)return;
  
  const now=new Date().toISOString();
  try{
    await sb.from('location_permissions').upsert({
      patroller_id:pat.id,patroller_name:pat.name,
      user_id:D.profile.id,status,reason:reason||null,
      last_checked:now,device:navigator.userAgent.substring(0,120)
    },{onConflict:'patroller_id'});
    
    await loadLocationPerms();
    if(status==='denied'){
      // Show warning banner to patroller
      showLocationWarning();
    }
  }catch(e){console.warn('Location perm save failed:',e);}
}

async function loadLocationPerms(){
  try{
    const{data}=await sb.from('location_permissions').select('*');
    D.locPerms={};
    (data||[]).forEach(r=>{D.locPerms[r.patroller_id]=r;});
  }catch(e){D.locPerms={};}
}

function showLocationWarning(){
  // Show persistent warning banner for patrollers who denied location

async function getLocation(){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){reject(new Error('Geolocation not supported'));return;}
    navigator.geolocation.getCurrentPosition(
      p=>resolve({lat:p.coords.latitude,lng:p.coords.longitude,accuracy:p.coords.accuracy}),
      e=>reject(new Error('Location denied: '+e.message)),
      {enableHighAccuracy:true,timeout:15000}
    );
  });
}

// ── CLOCK IN ──
async function doClockIn(){
  const btn=document.getElementById('clock-in-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader" style="animation:spin .7s linear infinite"></i> Getting location...';}
  try{
    const loc=await getLocation();
    const pat=D.patrollers.find(p=>p.user_id===D.profile.id);
    if(!pat)throw new Error('No schedule record found');
    const today=todayStr();
    const todayIdx=todayDayIdx();
    const sh=getDayShift(pat.id,todayIdx);
    const mapUrl=mapsLink(loc.lat,loc.lng);
    const now=new Date();
    const nowIso=now.toISOString();

    // Calculate late minutes and adjusted end time
    const bhrNow=getBahrainNow();
    const clockInMins=bhrNow.getUTCHours()*60+bhrNow.getUTCMinutes();
    const startMins=sh?getShiftStartMins(sh):null;
    const lateMins=startMins!==null?Math.max(0,clockInMins-startMins):0;
    const adjEndMins=sh?getShiftEndMins(sh)+lateMins:null;
    const adjEndTime=adjEndMins!==null?`${String(Math.floor(adjEndMins/60)%24).padStart(2,'0')}:${String(adjEndMins%60).padStart(2,'0')}`:null;
    const clockInTimeStr=`${String(bhrNow.getUTCHours()).padStart(2,'0')}:${String(bhrNow.getUTCMinutes()).padStart(2,'0')}`;

    const{data,error}=await sb.from('attendance').upsert({
      patroller_id:pat.id,patroller_name:pat.name,date:today,
      clock_in:nowIso,clock_in_lat:loc.lat,clock_in_lng:loc.lng,clock_in_map:mapUrl,
      late_mins:lateMins,adj_end_time:adjEndTime,
      status:'Attended',updated_at:nowIso
    },{onConflict:'patroller_id,date'}).select().single();
    if(error)throw error;

    // Notify patroller if late
    if(lateMins>0&&sh){
      const lH=Math.floor(lateMins/60);const lM=lateMins%60;
      const lLabel=lH>0?`${lH}h ${lM}m`:`${lM}m`;
      addNotification(`⚠️ You clocked in ${lLabel} late. Shift adjusted: ${sh.start_time} → ${adjEndTime}`,'warning');
      // Show prominent modal alert
      setTimeout(()=>{
        openM({type:'lateAlert',lateMins,lLabel,origEnd:fmtT(sh.end_time),adjEnd:adjEndTime,startTime:fmtT(sh.start_time),clockInTime:clockInTimeStr});
      },500);
    } else {
      addNotification('Clocked in successfully! Have a great shift 🟢','success');
    }

    sendWebhook('clock_in',{patroller_name:pat.name,patroller_id:pat.id,date:today,clock_in_time:clockInTimeStr,late_mins:lateMins,adj_end_time:adjEndTime||'',clock_in_location:mapUrl,accuracy_meters:Math.round(loc.accuracy),app_url:REDIRECT});
    // Email admin if late
    if(lateMins>0){
      const lH=Math.floor(lateMins/60);const lM=lateMins%60;
      const lLabel=lH>0?`${lH}h ${lM}m`:`${lM}m`;
      const html=`<div style="${emailStyle()}">
        ${emailHeader('⚠️ Late Clock-In Alert','#D97706')}
        <div style="padding:24px">
          <table style="width:100%;border-collapse:collapse">
            ${emailRow('Patroller',pat.name)}
            ${emailRow('Date',today)}
            ${emailRow('Clock-in time',clockInTimeStr,'#DC2626')}
            ${emailRow('Late by',lLabel,'#DC2626')}
            ${emailRow('Shift start',sh?sh.start_time:'')}
            ${emailRow('Adjusted end',adjEndTime||'')}
            ${emailRow('Location','<a href="'+mapUrl+'" style="color:#FF5900">View on map</a>')}
          </table>
        </div>
        ${emailFooter()}
      </div>`;
      sendEmail(ADMIN_EMAIL,`⚠️ Late Clock-In — ${pat.name} (${lLabel} late)`,html);
    }
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-clock-play"></i> Clock In';}
    alert('Error: '+e.message);
  }
}

// ── CLOCK OUT ──
async function doClockOut(){
  const pat=D.patrollers.find(p=>p.user_id===D.profile.id);
  if(!pat)return;
  const rec=getMyAttRecord();
  if(!rec||!rec.clock_in)return;
  const todayIdx=todayDayIdx();
  const sh=getDayShift(pat.id,todayIdx);
  // Check if clocking out before shift end
  if(sh&&sh.end_time){
    const nowMins=getBahrainMinutes();
    const lateMins=rec.late_mins||0;
    let shiftEndMins=getShiftEndMins(sh)+lateMins;
    const shiftStartMins=getShiftStartMins(sh)||0;
    // Handle overnight shifts: if end < start, shift crosses midnight
    const isOvernightShift=getShiftEndMins(sh)<shiftStartMins;
    if(isOvernightShift){
      // nowMins is current time of day; shift end is next calendar day
      // If current time is in PM (after shift start), end is +24h away
      // If current time is in early AM (before end), compare directly with end
      const endRaw=getShiftEndMins(sh)+lateMins;
      if(nowMins>=shiftStartMins){
        // Still on the PM side — end is endRaw+1440
        shiftEndMins=endRaw+1440;
      } else {
        // Already past midnight, on the AM side — compare normally
        shiftEndMins=endRaw;
      }
    }
    if(nowMins<shiftEndMins-5){ // 5 min grace period
      const early=shiftEndMins-nowMins;
      const eH=Math.floor(early/60);const eM=early%60;
      const earlyLabel=eH>0?`${eH}h ${eM}m`:`${eM}m`;
      const rawEnd=(getShiftEndMins(sh)+lateMins)%1440;
      const adjEndStr=`${String(Math.floor(rawEnd/60)).padStart(2,'0')}:${String(rawEnd%60).padStart(2,'0')}`;
      openM({type:'earlyClockOut',earlyLabel,adjEndStr,patId:pat.id,attId:rec.id});
      return;
    }
  }
  // Normal clock out
  await _doNormalClockOut();
}

async function _doNormalClockOut(){
  const btn=document.getElementById('clock-out-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader" style="animation:spin .7s linear infinite"></i> Getting location...';}
  try{
    const loc=await getLocation();
    const pat=D.patrollers.find(p=>p.user_id===D.profile.id);
    if(!pat)throw new Error('No schedule record found');
    const today=todayStr();
    const mapUrl=mapsLink(loc.lat,loc.lng);
    const now=new Date().toISOString();
    const existing=getMyAttRecord();
    if(!existing)throw new Error('Please clock in first');
    const{error}=await sb.from('attendance').update({clock_out:now,clock_out_lat:loc.lat,clock_out_lng:loc.lng,clock_out_map:mapUrl,updated_at:now}).eq('id',existing.id);
    if(error)throw error;
    // Duration
    const inTime=new Date(existing.clock_in);const outTime=new Date(now);
    const mins=Math.round((outTime-inTime)/60000);
    const hrs=Math.floor(mins/60);const remMins=mins%60;
    const duration=`${hrs}h ${remMins}m`;
    sendWebhook('clock_out',{patroller_name:pat.name,patroller_id:pat.id,date:today,clock_in_time:new Date(existing.clock_in).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'}),clock_out_time:new Date(now).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'}),duration,clock_in_location:existing.clock_in_map,clock_out_location:mapUrl,app_url:REDIRECT});
    // Email admin attendance summary
    const inT2=new Date(existing.clock_in).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});
    const outT2=new Date(now).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});
    const mins2=Math.round((new Date(now)-new Date(existing.clock_in))/60000);
    const dur2=Math.floor(mins2/60)+'h '+(mins2%60)+'m';
    const late2=existing.late_mins||0;
    const co_html=`<div style="${emailStyle()}">
      ${emailHeader('🕐 Shift Completed')}
      <div style="padding:24px">
        <table style="width:100%;border-collapse:collapse">
          ${emailRow('Patroller',pat.name)}
          ${emailRow('Date',today)}
          ${emailRow('Clock in',inT2)}
          ${emailRow('Clock out',outT2)}
          ${emailRow('Duration',dur2,late2>0?'#DC2626':'#16A34A')}
          ${late2>0?emailRow('Late by',Math.floor(late2/60)>0?Math.floor(late2/60)+'h '+(late2%60)+'m':late2+'m','#DC2626'):''}
          ${emailRow('Location','<a href="'+mapUrl+'" style="color:#FF5900">View on map</a>')}
        </table>
      </div>
      ${emailFooter()}
    </div>`;
    sendEmail(ADMIN_EMAIL,'🕐 Shift Complete — '+pat.name+' ('+dur2+')',co_html);
    await reload();
  }catch(e){
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-clock-stop"></i> Clock Out';}
    alert('Error: '+e.message);
  }
}

// ── ADMIN MARK ATTENDANCE ──
async function markAttendance(patId,patName,status){
  if(status==='Absent'){
    // Show modal with absence reason dropdown
    openM({type:'absencereason',patId,patName,status});
  } else {
    const today=todayStr();
    const existing=(D.attendance||[]).find(a=>a.patroller_id===patId&&a.date===today);
    const now=new Date().toISOString();
    if(existing){await sb.from('attendance').update({status,updated_at:now,marked_by:D.profile.id}).eq('id',existing.id);}
    else{await sb.from('attendance').insert({patroller_id:patId,patroller_name:patName,date:today,status,marked_by:D.profile.id,updated_at:now});}
    await reload();
  }
}

async function confirmAbsenceReason(patId,patName,status,reason){
  const today=todayStr();
  const existing=(D.attendance||[]).find(a=>a.patroller_id===patId&&a.date===today);
  const now=new Date().toISOString();
  const statusWithReason=`${status} (${reason})`;
  if(existing){await sb.from('attendance').update({status:statusWithReason,updated_at:now,marked_by:D.profile.id}).eq('id',existing.id);}
  else{await sb.from('attendance').insert({patroller_id:patId,patroller_name:patName,date:today,status:statusWithReason,marked_by:D.profile.id,updated_at:now});}
  closeM();
  await reload();
}

function getWeekStartForDate(dateStr){
  // Must match wStart()/getCurrentSaturday() exactly — week starts on Sunday
  const[y,m,d]=dateStr.split('-').map(Number);
  const jsDay=new Date(Date.UTC(y,m-1,d)).getUTCDay();
  const diff=jsDay===0?0:-jsDay; // go back to Sunday
  const sun=new Date(Date.UTC(y,m-1,d));
  sun.setUTCDate(sun.getUTCDate()+diff);
  const yy=sun.getUTCFullYear();
  const mm=String(sun.getUTCMonth()+1).padStart(2,'0');
  const dd=String(sun.getUTCDate()).padStart(2,'0');
  return`${yy}-${mm}-${dd}`;
}

function dlAttendance(){
  const rows=[['Name','Date','Status','Clock In','Clock Out','Duration','Clock In Location','Clock Out Location']];
  (D.attendance||[]).forEach(a=>{
    const dur=a.clock_in&&a.clock_out?`${Math.floor(Math.round((new Date(a.clock_out)-new Date(a.clock_in))/60000)/60)}h ${Math.round((new Date(a.clock_out)-new Date(a.clock_in))/60000)%60}m`:'';
    rows.push([a.patroller_name||'',a.date,a.status||'',
      a.clock_in?new Date(a.clock_in).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'}):'',
      a.clock_out?new Date(a.clock_out).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'}):'',
      dur,a.clock_in_map||'',a.clock_out_map||'']);
  });
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.map(csvRow).join('\n')],{type:'text/csv'}));a.download='attendance.csv';a.click();
}

// Helper to get local date string (YYYY-MM-DD) from Date object
function dateToStr(d){
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return`${y}-${m}-${day}`;
}

// ── HOURLY VIEW ──
function hourlyView(){
  const dates=wDates();const pts=activePats();
  const today=todayStr();
  // Find selected day (default today if in current week, else first day)
  let selDay=D.hourlyDay;
  if(!selDay||!dates.find(d=>dateToStr(d)===selDay)){
    const todayInWeek=dates.find(d=>dateToStr(d)===today);
    selDay=todayInWeek?today:dateToStr(dates[0]);
    D.hourlyDay=selDay;
  }
  const[y,m,d]=selDay.split('-').map(Number);
  const selDate=new Date(Date.UTC(y,m-1,d));
  const selJsDay=selDate.getUTCDay();
  const selIdx=selJsDay;

  // Day selector tabs
  const dayTabs=dates.map((d,i)=>{
    const ds=dateToStr(d);
    const isToday=ds===today;
    const isSel=ds===selDay;
    return`<button onclick="D.hourlyDay='${ds}';render()" style="padding:6px 12px;border-radius:8px;border:none;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;transition:all .13s;white-space:nowrap;${isSel?'background:#411517;color:#F4EDE3;':'background:transparent;color:var(--g4);'}${isToday&&!isSel?'outline:1.5px solid #FF5900;':''}">${SD[i]}<br><span style="font-size:9px;font-weight:400;font-family:monospace">${fmt(d)}</span></button>`;
  }).join('');

  // Hours 0-23
  // 30-minute intervals (48 slots)
  const SLOTS=Array.from({length:48},(_,i)=>i); // 0=00:00, 1=00:30, 2=01:00 ...
  const HOURS=Array.from({length:24},(_,i)=>i); // kept for compat
  const slotW=34; // px per 30-min slot (34*48=1632px total)
  const hourW=slotW*2; // 68px per hour (for bar positioning)
  const nameW=140;
  const fmtSlot=s=>{const h=Math.floor(s/2);const m=s%2===0?'00':'30';return`${String(h).padStart(2,'0')}:${m}`;};

  function getShiftSpan(p){
    const sh=getDayShift(p.id,selIdx);
    if(!sh||sh.start_time==='?')return null;
    const[sh_h,sh_m]=sh.start_time.split(':').map(Number);
    const plannedStartH=sh_h+sh_m/60;
    // Calculate planned duration in hours
    const[peh,pem]=sh.end_time.split(':').map(Number);
    let plannedEndH=peh+pem/60;
    if(plannedEndH<=plannedStartH)plannedEndH+=24;
    const plannedDurH=plannedEndH-plannedStartH;

    const rec=getAttRecordForDate(p.id,selDay);
    // If clocked in (early or late), use actual clock-in as bar start
    // and preserve shift duration for bar end
    if(rec&&rec.clock_in){
      const inT=new Date(rec.clock_in).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});
      const[ih,im]=inT.split(':').map(Number);
      const actualStartH=ih+im/60;
      const actualEndH=actualStartH+plannedDurH;
      // early_mins: how many mins before planned start (positive = early)
      const earlyMins=Math.max(0,Math.round((plannedStartH-actualStartH)*60));
      const lateMins=Math.max(0,Math.round((actualStartH-plannedStartH)*60));
      return{start:actualStartH,end:actualEndH,plannedStart:plannedStartH,type:sh.shift_type,name:sh.name,adjEnd:rec.adj_end_time||null,lateMins,earlyMins};
    }
    // Not yet clocked in — use planned times + adj_end if any
    let endStr=getEffectiveEndTime(p.id,sh,selDay)||sh.end_time;
    const[eh,em]=endStr.split(':').map(Number);
    let endH=eh+em/60;
    if(endH<=plannedStartH)endH+=24;
    return{start:plannedStartH,end:endH,plannedStart:plannedStartH,type:sh.shift_type,name:sh.name,adjEnd:rec?.adj_end_time||null,lateMins:rec?.late_mins||0,earlyMins:0};
  }

  function getTasksForDay(pid){
    return(D.tasks||[]).filter(t=>t.patroller_id===pid&&t.date===selDay&&(t.status==='Approved'||t.status==='Running'||t.status==='Completed'));
  }

  function getRunningTasksForDay(pid){
    return(D.tasks||[]).filter(t=>t.patroller_id===pid&&t.date===selDay&&t.status==='Running');
  }

  function isOnVacDay(pid){
    return D.timeoff.find(t=>t.patroller_id===pid&&t.status==='Approved'&&selDay>=t.start_date&&selDay<=t.end_date);
  }

  function renderTimeline(p){
    const zone=gDZ(p.id,selIdx);
    const onVac=isOnVacDay(p.id);
    const sh=getShiftSpan(p);
    const tasks=getTasksForDay(p.id);
    const isAbs=isAbsentOnDate(p.id,selDay);
    let bars='';

    if(onVac){
      bars+=`<div style="position:absolute;left:0;right:0;top:4px;bottom:4px;background:linear-gradient(90deg,#7C3AED,#A855F7);border-radius:6px;display:flex;align-items:center;padding:0 8px"><span style="color:#fff;font-size:10px;font-weight:600">🌴 On Vacation</span></div>`;
    } else if(isAbs){
      bars+=`<div style="position:absolute;left:0;right:0;top:4px;bottom:4px;background:#FEE2E2;border:1.5px solid #fca5a5;border-radius:6px;display:flex;align-items:center;padding:0 8px"><span style="color:#DC2626;font-size:10px;font-weight:600">✗ Absent</span></div>`;
    } else if(!zone){
      bars+=`<div style="position:absolute;left:0;right:0;top:4px;bottom:4px;background:var(--g1);border-radius:6px;display:flex;align-items:center;padding:0 8px"><span style="color:var(--g3);font-size:10px">Off Day</span></div>`;
    } else {
      // Shift bar with late/clocked-in status
      if(sh){
        const ps=getPatrollerShiftStatus(p.id,selIdx,selDay);
        const left=Math.max(0,sh.start)*hourW;
        const width=(Math.min(sh.end,24)-Math.max(0,sh.start))*hourW;
        let bg=sh.type==='morning'?'#FFF0E6':'#FEF3C7';
        let col=sh.type==='morning'?'#FF5900':'#D97706';
        let border=`1.5px solid ${col}`;
        let statusOverlay='';

        if(ps.status==='late'){
          bg='#FEE2E2';col='#DC2626';border='2px solid #DC2626';
          const h=Math.floor(ps.lateMins/60);const m=ps.lateMins%60;
          const label=h>0?`${h}h ${m}m late`:`${m}m late`;
          statusOverlay=`<span style="background:#DC2626;color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px;animation:pulse 1.5s infinite">🔴 ${label}</span>`;
        } else if(ps.status==='clocked_in'){
          bg='#DCFCE7';col='#166534';border='2px solid #16A34A';
          const inT=new Date(ps.rec.clock_in).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});
          // Calculate actual end time = clock_in + planned shift duration
          const[ih2,im2]=inT.split(':').map(Number);
          const actualStartMins=ih2*60+im2;
          const sh2=getDayShift(p.id,selIdx);
          let shDurMins=0;
          if(sh2&&sh2.start_time&&sh2.end_time){
            const[psh2,psm2]=sh2.start_time.split(':').map(Number);
            const[peh2,pem2]=sh2.end_time.split(':').map(Number);
            let pStartM=psh2*60+psm2;let pEndM=peh2*60+pem2;
            if(pEndM<=pStartM)pEndM+=24*60;
            shDurMins=pEndM-pStartM;
          }
          const adjEndMins=actualStartMins+shDurMins;
          const adjEndStr=`${String(Math.floor(adjEndMins/60)%24).padStart(2,'0')}:${String(adjEndMins%60).padStart(2,'0')}`;
          const adjEndFmt=fmtT(adjEndStr);
          // Show early badge if clocked in before planned start
          const earlyLabel=sh.earlyMins>0?`<span style="background:#7C3AED;color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px">⚡ ${sh.earlyMins}m early</span>`:'';
          // Show late dashed overlay if late (bar already shifted so overlay is from planned start to actual start — not needed now bar starts at clock-in)
          if(ps.rec.late_mins>0){
            // Ghost bar showing planned start window
            const ghostLeft=sh.plannedStart*hourW;
            const ghostWidth=(sh.start-sh.plannedStart)*hourW;
            if(ghostWidth>0)bars+=`<div style="position:absolute;left:${ghostLeft}px;width:${ghostWidth}px;top:4px;bottom:4px;background:#FEE2E2;border:1.5px dashed #DC2626;border-radius:6px 0 0 6px;display:flex;align-items:center;justify-content:center;z-index:3"><span style="font-size:7px;color:#DC2626;font-weight:700">Late</span></div>`;
          }
          statusOverlay=`<span style="background:#166534;color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px">🟢 ${inT}→${adjEndFmt}</span>${earlyLabel}`;
        } else if(ps.status==='completed'){
          bg='#EAF1FD';col='#1565C0';border='1.5px solid #1565C0';
          const inT=new Date(ps.rec.clock_in).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});
          const outT=new Date(ps.rec.clock_out).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});
          const mins=Math.round((new Date(ps.rec.clock_out)-new Date(ps.rec.clock_in))/60000);
          const dur=`${Math.floor(mins/60)}h${mins%60}m`;
          const earlyLabel=sh.earlyMins>0?`<span style="background:#7C3AED;color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px">⚡ ${sh.earlyMins}m early</span>`:'';
          statusOverlay=`<span style="background:#1565C0;color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px">✓ ${inT}→${outT} ${dur}</span>${earlyLabel}`;
        } else if(ps.status==='early_out_pending'){
          bg='#FEF3C7';col='#D97706';border='2px solid #D97706';
          statusOverlay=`<span style="background:#D97706;color:#fff;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;margin-left:4px">⏳ Early out</span>`;
        }

        bars+=`<div style="position:absolute;left:${left}px;width:${width}px;top:4px;bottom:4px;background:${bg};border:${border};border-radius:6px;overflow:hidden;display:flex;align-items:center;padding:0 6px" title="${sh.name}: ${zone}"><span style="color:${col};font-size:9px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${sh.type==='morning'?'☀️':'🌙'} ${zone}${statusOverlay}</span></div>`;
      }
      // Task bars (on top)
      tasks.forEach(t=>{
        if(!t.start_time)return;
        // For running tasks without end time, estimate end time as current time or shift end
        let tStart, tEnd;
        if(t.start_time){
          const[th,tm]=t.start_time.split(':').map(Number);
          tStart=th+tm/60;
        }
        if(t.end_time&&t.end_time!==''){
          const[eh2,em2]=t.end_time.split(':').map(Number);
          tEnd=eh2+em2/60;
        } else {
          // For running tasks, show from start to current time (or 1 hour minimum)
          if(selDay===today){
            const bhrN=getBahrainNow();
            tEnd=Math.max(tStart+0.5,bhrN.getUTCHours()+bhrN.getUTCMinutes()/60);
          } else {
            tEnd=tStart+1;
          }
        }
        
        const left=tStart*hourW;const width=(tEnd-tStart)*hourW;
        const bg=TASK_BG[t.task_type]||'#EDE9FE';
        const col=TASK_COLORS[t.task_type]||'#7C3AED';
        const isRunning=t.status==='Running';
        const isCompleted=t.status==='Completed';
        const pulse=isRunning?'animation:pulse 1.5s infinite;':'';
        const completedBg=isCompleted?'rgba(34, 197, 94, 0.1)':'';
        const completedBorder=isCompleted?'1.5px solid #16A34A':'2px solid '+col;
        
        bars+=`<div style="position:absolute;left:${left}px;width:${Math.max(width,hourW*.5)}px;top:3px;bottom:3px;background:${completedBg||bg};border:${completedBorder};border-radius:6px;overflow:visible;display:flex;align-items:center;padding:0 6px;z-index:2;cursor:pointer;${pulse}" title="${t.task_type}${isRunning?' (RUNNING)':''}${isCompleted?' (COMPLETED)':''}: ${t.description||''}" ${isRunning?`onclick="openM({type:'endtaskrun',taskId:'${t.id}',patName:'${p.name.replace(/'/g,"\\'")}'})"`:isRunning?``:`onclick="openM({type:'viewtask',task:D.tasks.find(x=>x.id==='${t.id}')})"`}><span style="color:${isCompleted?'#16A34A':col};font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${isRunning?'▶️':isCompleted?'✓':'📋'} ${t.task_type}</span>${isRunning?`<span style="color:${col};font-size:8px;margin-left:4px;font-weight:600;background:rgba(255,255,255,0.6);padding:1px 4px;border-radius:3px;white-space:nowrap">END</span>`:isCompleted?`<span style="color:#16A34A;font-size:8px;margin-left:4px;font-weight:600;background:rgba(34,197,94,0.2);padding:1px 4px;border-radius:3px;white-space:nowrap">DONE</span>`:''}</div>`;
      });
    }

    // Now indicator (Bahrain time)
    if(selDay===today){
      const bhrNow=getBahrainNow();
      const nowH=bhrNow.getUTCHours()+bhrNow.getUTCMinutes()/60;
      const nowLeft=nowH*hourW; // hourW=2*slotW so this is correct
      bars+=`<div style="position:absolute;left:${nowLeft}px;top:0;bottom:0;width:2px;background:#DC2626;z-index:10;pointer-events:none" title="Now (Bahrain)"></div>`;
    }

    return`<div style="position:relative;height:38px;min-width:${48*slotW}px">${bars}</div>`;
  }

  // Hourly count bar (how many on duty per hour)
  const activePtsDay=pts.filter(p=>!isOnVacDay(p.id)&&!isAbsentOnDate(p.id,selDay)&&gDZ(p.id,selIdx));
  const slotCounts=SLOTS.map(s=>{
    const slotH=s/2; // decimal hour (e.g. slot 17 = 8.5 = 08:30)
    const onDuty=activePtsDay.filter(p=>{
      const sh=getShiftSpan(p);if(!sh)return false;
      return slotH>=sh.start&&slotH<sh.end;
    }).length;
    const onTask=activePtsDay.filter(p=>(D.tasks||[]).some(t=>{
      if(!t.start_time||t.patroller_id!==p.id||t.date!==selDay||t.status==='Pending')return false;
      const[th,tm]=t.start_time.split(':').map(Number);const tStart=th+tm/60;
      const[eh,em]=(t.end_time||'23:59').split(':').map(Number);const tEnd=eh+em/60;
      return slotH>=tStart&&slotH<tEnd;
    })).length;
    return{s,onDuty,onTask};
  });
  const maxDuty=Math.max(1,...slotCounts.map(x=>x.onDuty));

  const countBar=`<div style="background:#fff;border:1.5px solid #E8DDD4;border-radius:12px;padding:12px 16px;margin-bottom:12px;overflow-x:auto">
    <div style="font-size:11px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Hourly staffing — ${selDay}</div>
    <div style="min-width:${48*slotW+nameW}px">
      <div style="display:flex;margin-left:${nameW}px;margin-bottom:4px">
        ${SLOTS.map(s=>{
          const isHour=s%2===0;
          const isNowSlot=selDay===today&&s===Math.floor(getBahrainNow().getUTCHours()*2+getBahrainNow().getUTCMinutes()/30);
          return`<div style="width:${slotW}px;font-size:${isHour?'9':'8'}px;color:${isNowSlot?'#FF5900':isHour?'var(--g3)':'var(--g2)'};text-align:center;font-family:monospace;overflow:hidden">${isHour?fmtSlot(s):s%4===2?'30':''}</div>`;
        }).join('')}
      </div>
      <div style="display:flex;align-items:flex-end;margin-left:${nameW}px;height:40px;gap:1px">
        ${slotCounts.map(({s,onDuty,onTask})=>{
          const barH=maxDuty?Math.round((onDuty/maxDuty)*36):0;
          const taskH=onDuty?Math.round((onTask/onDuty)*barH):0;
          const isNow=selDay===today&&s===Math.floor(getBahrainNow().getUTCHours()*2+getBahrainNow().getUTCMinutes()/30);
          const isHour=s%2===0;
          return`<div style="width:${slotW-1}px;display:flex;flex-direction:column;justify-content:flex-end;height:36px;position:relative;cursor:default;border-left:${isHour?'1px solid #F0EDE8':'none'}" title="${fmtSlot(s)} — ${onDuty} on duty">
            <div style="background:${isNow?'#FF5900':'#411517'};height:${barH}px;border-radius:2px 2px 0 0;transition:height .3s;position:relative">
              ${taskH>0?`<div style="position:absolute;bottom:0;left:0;right:0;height:${taskH}px;background:#7C3AED;border-radius:2px 2px 0 0"></div>`:''}
            </div>
            ${onDuty>0&&isHour?`<div style="position:absolute;top:0;left:0;right:0;text-align:center;font-size:8px;font-weight:700;color:${isNow?'#FF5900':'#411517'}">${onDuty}</div>`:''}
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;margin-left:${nameW}px;margin-top:4px;gap:8px">
        <span style="font-size:9px;color:#411517"><span style="display:inline-block;width:10px;height:8px;background:#411517;border-radius:2px;margin-right:3px;vertical-align:middle"></span>On duty</span>
        <span style="font-size:9px;color:#7C3AED"><span style="display:inline-block;width:10px;height:8px;background:#7C3AED;border-radius:2px;margin-right:3px;vertical-align:middle"></span>On task</span>
        <span style="font-size:9px;color:#FF5900"><span style="display:inline-block;width:10px;height:8px;background:#FF5900;border-radius:2px;margin-right:3px;vertical-align:middle"></span>Now</span>
      </div>
    </div>
  </div>`;

  const rows=pts.map(p=>`
    <div style="display:flex;align-items:center;border-bottom:1px solid #F4EDE3;min-height:46px">
      <div style="width:${nameW}px;flex-shrink:0;padding:0 10px;font-size:12px;font-weight:600;color:#2A0D0F">
        ${p.name}
        ${canEdit()?`<button class="edit-btn" style="width:20px;height:20px;margin-left:3px" onclick="openM({type:'taskreq',pid:'${p.id}',pname:'${p.name.replace(/'/g,"\'")}',pdate:'${selDay}'})"><i class="ti ti-plus" style="font-size:10px"></i></button>`:''}
      </div>
      <div style="flex:1;overflow-x:visible;padding:4px 0">
        ${renderTimeline(p)}
      </div>
    </div>`).join('');

  return`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;background:var(--g1);border-radius:10px;padding:4px;width:fit-content">${dayTabs}</div>
  ${countBar}
  <div style="background:#fff;border:1.5px solid #E8DDD4;border-radius:12px;overflow:hidden">
    <div style="overflow-x:auto">
      <div style="display:flex;background:#F4EDE3;border-bottom:1.5px solid #E8DDD4;position:sticky;top:0;z-index:5;min-width:${48*slotW+nameW}px">
        <div style="width:${nameW}px;flex-shrink:0;padding:7px 10px;font-size:10px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em">Name</div>
        ${SLOTS.map(s=>{
          const isHour=s%2===0;
          const isNow=selDay===today&&s===Math.floor(getBahrainNow().getUTCHours()*2+getBahrainNow().getUTCMinutes()/30);
          return`<div style="width:${slotW}px;flex-shrink:0;text-align:center;padding:${isHour?'7':'9'}px 0 ${isHour?'7':'5'}px;font-size:${isHour?'9':'8'}px;font-weight:${isNow?'700':'400'};color:${isNow?'#FF5900':isHour?'var(--g3)':'var(--g2)'};font-family:monospace;border-left:${isHour?'1px solid #E8DDD4':'none'}">${isHour?fmtSlot(s):s%4===2?':30':''}</div>`;
        }).join('')}
      </div>
      ${rows}
    </div>
  </div>`;
}

// ── TASKS VIEW (admin) ──
function tasksView(){
  const ed=canEdit();
  const all=D.tasks||[];
  const running=all.filter(t=>t.status==='Running').length;
  const completed=all.filter(t=>t.status==='Completed').length;
  const pen=all.filter(t=>t.status==='Pending').length;

  const getStatusStyle=(status)=>{
    if(status==='Running')return'background:#DCFCE7;color:#166534;font-weight:700';
    if(status==='Completed')return'background:#E5F6E6;color:#0B6D2F;font-weight:700';
    if(status==='Pending')return'background:#FEF3C7;color:#92400E';
    return'background:var(--g1);color:var(--g3)';
  };

  const rows=all.map(t=>{
    const col=TASK_COLORS[t.task_type]||'#411517';
    const bg=TASK_BG[t.task_type]||'#F4EDE3';
    const duration=t.start_time&&t.end_time?`${t.start_time} → ${t.end_time}`:t.start_time?`Started: ${t.start_time}`:'--';
    const durMins=(()=>{
      if(!t.start_time||!t.end_time)return 0;
      const[sh,sm,ss]=(t.start_time+':00').split(':').map(Number);
      const[eh,em,es]=(t.end_time+':00').split(':').map(Number);
      let mins=(eh*60+em)-(sh*60+sm);
      if(mins<0)mins+=24*60;
      return mins;
    })();
    const durLabel=durMins>0?(durMins>=60?`${Math.floor(durMins/60)}h ${durMins%60}m`:`${durMins}m`):'';
    const timeCell=t.start_time&&t.end_time
      ?`${t.start_time} → ${t.end_time}`
      :t.start_time?`Started: ${t.start_time}`:'--';
    const statusDisplay=t.status==='Running'?`<i class="ti ti-circle-filled" style="font-size:6px;margin-right:4px;animation:pulse 1.5s infinite"></i>${t.status}`:`${t.status==='Completed'?'✓':''} ${t.status}`;
    
    return`<tr>
      <td style="font-size:11px;font-family:monospace;color:var(--g4);white-space:nowrap">${(()=>{const _tp=D.patrollers.find(x=>x.id===t.patroller_id);return _tp?.patroller_id_num||'--';})()}</td><td class="lt" style="font-weight:600">${t.patroller_name||'--'}</td>
      <td><span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;background:${bg};color:${col}">${t.task_type}</span></td>
      <td style="font-family:monospace;font-size:11px">${t.date||'--'}</td>
      <td style="font-size:11px">${timeCell}</td>
      <td style="font-size:11px;font-weight:700;color:#FF5900">${durLabel||'--'}</td>
      <td style="font-size:11px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.description||'--'}</td>
      <td><span style="font-size:10px;font-weight:700;padding:4px 10px;border-radius:8px;${getStatusStyle(t.status)}">${statusDisplay}</span></td>
      ${ed?`<td style="white-space:nowrap">
        ${t.status==='Running'?`<button class="btn btn-primary" style="padding:4px 10px;font-size:10px" onclick="endTask('${t.id}','${t.patroller_name}')"><i class="ti ti-player-stop"></i>End</button>`:``}
        <button class="icon-btn" onclick="delTask('${t.id}')"><i class="ti ti-trash"></i></button>
      </td>`:''}
    </tr>`;
  }).join('');

function myTasksView(){
  const pat=D.patrollers.find(p=>p.user_id===D.profile.id);
  const myTasks=pat?(D.tasks||[]).filter(t=>t.patroller_id===pat.id):[];
  const pen=myTasks.filter(t=>t.status==='Pending').length;
  const apr=myTasks.filter(t=>t.status==='Approved').length;
  const rows=myTasks.map(t=>{
    const col=TASK_COLORS[t.task_type]||'#411517';
    const bg=TASK_BG[t.task_type]||'#F4EDE3';
    const sc=t.status==='Approved'?'background:#DCFCE7;color:#166534':t.status==='Rejected'?'background:#FEE2E2;color:#991B1B':'background:#FEF3C7;color:#92400E';
    const durMins2=(()=>{
      if(!t.start_time||!t.end_time)return 0;
      const[sh,sm]=(t.start_time+':00').split(':').map(Number);
      const[eh,em]=(t.end_time+':00').split(':').map(Number);
      let m=(eh*60+em)-(sh*60+sm);if(m<0)m+=24*60;return m;
    })();
    const durLabel2=durMins2>0?(durMins2>=60?`${Math.floor(durMins2/60)}h ${durMins2%60}m`:`${durMins2}m`):'';
    return`<tr>
      <td><span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;background:${bg};color:${col}">${t.task_type}</span></td>
      <td style="font-family:monospace;font-size:11px">${t.date||'--'}</td>
      <td style="font-size:11px">${t.start_time||'--'} → ${t.end_time||'--'}</td>
      <td style="font-size:11px;font-weight:700;color:#FF5900">${durLabel2||'--'}</td>
      <td style="font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.description||'--'}</td>
      <td><span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;${sc}">${t.status}</span></td>
    </tr>`;
  }).join('');

  return`<div class="stats">
    <div class="stat amber"><div class="stat-label">Pending</div><div class="stat-value">${pen}</div></div>
    <div class="stat green"><div class="stat-label">Approved</div><div class="stat-value">${apr}</div></div>
    <div class="stat blue"><div class="stat-label">Total</div><div class="stat-value">${myTasks.length}</div></div>
  </div>
  <div class="toolbar"><button class="btn btn-primary" onclick="openM({type:'taskreq'})"><i class="ti ti-plus"></i>New task request</button></div>
  ${myTasks.length===0?`<div style="padding:40px;text-align:center;color:var(--g3)"><i class="ti ti-checklist" style="font-size:40px;display:block;margin-bottom:10px;opacity:.4"></i>No task requests yet.<br><span style="font-size:12px">Submit a request for a task or meeting.</span></div>`:`
  <div class="tcard"><div class="t-scroll"><table style="table-layout:auto"><thead><tr>
    <th>Type</th><th>Date</th><th>Time</th><th>Duration</th><th>Description</th><th>Status</th>
  </tr></thead><tbody>${rows}</tbody></table></div></div>`}`;
}

async function startTask(){
  const e=document.getElementById('tr-e');e.style.display='none';
  const pid=document.getElementById('tr-pat').value;
  const type=document.getElementById('tr-type').value;
  const name=(document.getElementById('tr-name').value||'').trim();
  const desc=(document.getElementById('tr-desc').value||'').trim();
  const selectedDate=(document.getElementById('tr-date').value||'').trim();
  
  if(!pid){e.textContent='Select a patroller.';e.style.display='block';return;}
  if(!name){e.textContent='Task name is required.';e.style.display='block';return;}
  if(!selectedDate){e.textContent='Select a date.';e.style.display='block';return;}
  
  const pat=D.patrollers.find(p=>p.id===pid);
  const now=new Date().toISOString();
  const startTime=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});
  
  const{error}=await sb.from('task_requests').insert({
    patroller_id:pid,
    patroller_name:pat?.name||'Unknown',
    task_type:type,
    date:selectedDate,
    start_time:startTime,
    end_time:(()=>{const ed=new Date();ed.setHours(ed.getHours()+1);return ed.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});})(),
    description:desc||null,
    status:'Running',
    submitted_by:D.profile.id,
    created_at:now,
    updated_at:now
  });
  
  if(error){e.textContent=error.message;e.style.display='block';return;}
  sendWebhook('task_started',{patroller_name:pat?.name,task_type:type,task_name:name,description:desc,started_by:D.profile.full_name,started_at:new Date().toLocaleString('en-GB'),app_url:REDIRECT});
  closeM();await reload();
}

async function endTask(taskId,patrollerName){
  const now=new Date().toISOString();
  const endTime=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});
  
  const{error}=await sb.from('task_requests').update({
    end_time:endTime,
    status:'Completed',
    updated_at:now
  }).eq('id',taskId);
  
  if(error){alert('Error completing task: '+error.message);return;}
  
  const task=D.tasks.find(t=>t.id===taskId);
  if(task){
    const duration=task.start_time&&endTime?`${task.start_time} - ${endTime}`:'';
    sendWebhook('task_completed',{patroller_name:patrollerName,task_name:task.description||task.task_type,task_type:task.task_type,duration,completed_by:D.profile.full_name,app_url:REDIRECT});
  }
  
  await reload();
}

async function doCreateUser(){
  clearMsgs('cu-e','cu-ok');

  const email=document.getElementById('cu-email').value.trim().toLowerCase();
  const roleRaw=document.getElementById('cu-role').value;
  const isCustomRole=roleRaw.startsWith('cr:');
  const customRoleId=isCustomRole?roleRaw.replace('cr:',''):null;
  const cr2=customRoleId?(D.customRoles||[]).find(r=>r.id===customRoleId):null;
  const role=cr2?(cr2.access_level==='admin'?'admin':cr2.access_level==='editor'?'lead':'patroller'):'patroller';
  const phone=(document.getElementById('cu-phone')?.value||'').trim();
  const patrollerId=(document.getElementById('cu-patroller-id')?.value||'').trim();
  const basicSalary=parseFloat(document.getElementById('cu-basic-salary')?.value)||null;
  if(!name||!email){showErr('cu-e','Name and email are required.');return;}
  if(!phone){showErr('cu-e','Mobile number is required.');return;}

  if(!basicSalary){showErr('cu-e','Basic salary is required.');return;}
  const btn=document.getElementById('cu-btn');btn.disabled=true;btn.textContent='Creating...';
  try{
    // Check if already exists
    const{data:existing}=await wt(sb.from('profiles').select('id').eq('email',email).maybeSingle(),5000);
    if(existing){showErr('cu-e','A user with this email already exists.');btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i>Create user';return;}
    // Create auth account with email-derived password
    const{data,error}=await sb.auth.signUp({email,password:email+'_talabat_access',options:{data:{full_name:name,role},emailRedirectTo:REDIRECT}});
    if(error)throw error;
    const uid=data?.user?.id;
    if(uid){
      await sb.from('profiles').upsert({id:uid,email,full_name:name,role,is_active:true,custom_role_id:customRoleId||null},{onConflict:'id'});
      const isLeadOrAdmin=role==='admin'||role==='lead';
      // Always create patroller row — needed for profile card, incentive & OT for ALL roles
      const{data:existingPat}=await sb.from('patrollers').select('id').eq('user_id',uid).maybeSingle();
      if(!existingPat){
        const{data:np}=await sb.from('patrollers').insert({
          name,shift_id:isLeadOrAdmin?null:D.shifts[0]?.id||null,cov_area:'',
          user_id:uid,is_active:!isLeadOrAdmin,user_type:role,
          phone:phone||null,patroller_id_num:patrollerId||null,basic_salary:basicSalary,
          join_date:document.getElementById('cu-join-date')?.value||null
        }).select().single();
        if(np&&!isLeadOrAdmin)await sb.from('schedules').insert({patroller_id:np.id,week_start:wStart(),day_0:'',day_1:'',day_2:'',day_3:'',day_4:'',day_5:'',day_6:''});
      } else {

      }
    }
    showOk('cu-ok',`Profile for "${name}" created! They can log in with their email.`);
    btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i>Create profile';
    await reload();closeM();
  }catch(e){btn.disabled=false;btn.innerHTML='<i class="ti ti-check"></i>Create user';showErr('cu-e',e.message||'Failed.');}
}

async function saveLeaveBalance(patrollerId){
  const e=document.getElementById('lb-e');e.style.display='none';
  const cf=parseFloat(document.getElementById('lb-cf').value)||0;
  const rid=(document.getElementById('lb-rid').value||'').trim();
  const hc=parseFloat(document.getElementById('lb-hc').value)||0;
  const hs=parseFloat(document.getElementById('lb-hs').value)||0;
  const hs50=parseFloat(document.getElementById('lb-hs50')?.value)||0;
  const hu=parseFloat(document.getElementById('lb-hu')?.value)||0;
  const joinDate=document.getElementById('lb-joindate')?.value||null;
  const year=getLeaveYear();
  const payload={annual_carry_forward:cf,rider_id:rid||null,year,
    historical_consumed:hc,historical_sick:hs,
    sick50_consumed:hs50,unpaid_consumed:hu,
    join_date:joinDate||null,
    updated_at:new Date().toISOString()};

  // Handle profile-based IDs (team leads with no patroller record)
  let realPatrollerId=patrollerId;
  if(patrollerId.startsWith('profile-')){
    const userId=patrollerId.replace('profile-','');
    // Find or create a patroller record for this lead
    let pat=D.patrollers.find(p=>p.user_id===userId);
    if(!pat){
      const u=D.users.find(u=>u.id===userId);
      if(!u){e.textContent='User not found';e.style.display='block';return;}
      const{data:np,error:ne}=await sb.from('patrollers').insert({name:u.full_name,user_id:userId,is_active:true,user_type:'lead'}).select().single();
      if(ne){e.textContent=ne.message;e.style.display='block';return;}
      pat=np;await reload();
    }
    realPatrollerId=pat.id;
  }

  const existing=D.leaveBalances.find(b=>b.patroller_id===realPatrollerId);
  if(existing){
    const{error}=await sb.from('leave_balances').update(payload).eq('id',existing.id);
    if(error){e.textContent=error.message;e.style.display='block';return;}
  } else {
    const{error}=await sb.from('leave_balances').insert({patroller_id:realPatrollerId,...payload});
    if(error){e.textContent=error.message;e.style.display='block';return;}
  }
  closeM();await reload();
  addNotification('Leave balance updated','success');

// ── LEAVE BALANCE HELPERS ──
const ANNUAL_DAILY_RATE = 30.295 / 365; // ~0.083 days per day

function getLeaveYear(){ return new Date().getFullYear(); }

function calcAnnualAccrued(joinDate){
  const now=getBahrainNow();
  const jan1=new Date(Date.UTC(now.getUTCFullYear(),0,1));
  let startDate=jan1;
  if(joinDate){
    const jd=new Date(joinDate+'T00:00:00Z');
    if(jd.getUTCFullYear()===now.getUTCFullYear()&&jd>jan1)startDate=jd;
    else if(jd>now)return 0;
  }
  const daysElapsed=Math.floor((now-startDate)/86400000);
  return Math.round(daysElapsed*ANNUAL_DAILY_RATE*1000)/1000;
}
function getLeaveBalance(patrollerId){
  const lb = D.leaveBalances.find(b => b.patroller_id === patrollerId);
  const pat = D.patrollers.find(p=>p.id===patrollerId);
  // For patroller's own view, use their profile email directly
  const isOwnProfile = pat && D.profile && pat.user_id === D.profile.id;
  const ownEmail = isOwnProfile ? D.profile.email : null;
  const rosterEntry = ownEmail
    ? getRosterByEmail(ownEmail)
    : (pat ? getRosterByPatroller(pat) : null);
  const year = getLeaveYear();
  const joinDate=lb?.join_date||pat?.join_date||null;
  const accrued = calcAnnualAccrued(joinDate);

  // Carry forward: use DB value if set, else use roster spreadsheet value
  const carryForward = (lb && lb.annual_carry_forward != null && lb.annual_carry_forward > 0)
    ? lb.annual_carry_forward
    : (rosterEntry ? rosterEntry.carryFwd : 0);
  const totalAnnual = carryForward + accrued;

  // Entitlements: use roster values (sick leave varies per person from spreadsheet)
  const sickEnt = rosterEntry ? rosterEntry.sickEnt : 15;
  const sick50Ent = rosterEntry ? rosterEntry.sick50Ent : 20;
  const unpaidEnt = rosterEntry ? rosterEntry.unpaidEnt : 20;
  const bereavEnt = rosterEntry ? rosterEntry.bereavEnt : 5;

  // Consumed this year from approved time-off requests
  const yearStr = String(year);
  const approved = (D.timeoff || []).filter(t =>
    t.patroller_id === patrollerId &&
    t.status === 'Approved' &&
    (t.start_date || '').startsWith(yearStr)
  );

  const countDays = arr => arr.reduce((s,t) => {
    const d1=new Date(t.start_date), d2=new Date(t.end_date);
    return s + (isNaN(d1)||isNaN(d2) ? 1 : Math.round((d2-d1)/86400000)+1);
  }, 0);

  // Historical consumed: DB value takes priority, then roster spreadsheet value
  const historicalConsumed = (lb && lb.historical_consumed != null)
    ? lb.historical_consumed
    : (rosterEntry ? (rosterEntry.historicalConsumed || 0) : 0);
  const historicalSick = (lb && lb.historical_sick != null)
    ? lb.historical_sick
    : 0;
  // App consumed = new approved requests entered in this app
  const appConsumedAnnual  = countDays(approved.filter(t=>t.request_type==='Annual Leave'));
  const consumedAnnual     = historicalConsumed + appConsumedAnnual;
  const appConsumedSick    = countDays(approved.filter(t=>t.request_type==='Sick Leave'));
  const consumedSick       = historicalSick + appConsumedSick;
  const consumedSick50     = countDays(approved.filter(t=>t.request_type==='Sick Leave 50%'));
  const consumedUnpaid     = countDays(approved.filter(t=>['Sick Leave Unpaid','Unpaid Leave'].includes(t.request_type)));
  const consumedBereavement= countDays(approved.filter(t=>['Death','Bereavement'].includes(t.request_type)));

  const r = (v) => Math.round(v * 1000) / 1000;

  return {
    carryForward:        r(carryForward),
    accrued:             r(accrued),
    totalAnnual:         r(totalAnnual),
    consumedAnnual,
    annualRemaining:     Math.max(0, r(totalAnnual - consumedAnnual)),
    sickEnt, consumedSick,
    sickRemaining:       Math.max(0, sickEnt - consumedSick),
    sick50Ent, consumedSick50,
    sick50Remaining:     Math.max(0, sick50Ent - consumedSick50),
    unpaidEnt, consumedUnpaid,
    unpaidRemaining:     Math.max(0, unpaidEnt - consumedUnpaid),
    bereavEnt, consumedBereavement,
    bereavementRemaining:Math.max(0, bereavEnt - consumedBereavement),
    year,
    historicalConsumed, historicalSick,
    riderId: (lb&&lb.rider_id) ? lb.rider_id : (rosterEntry ? rosterEntry.riderId : ''),
    lastUpdated: lb ? lb.updated_at : null,
  };
}

async function submitEarlyClockOut(patId,attId,adjEndStr){
  const reason=document.getElementById('early-reason').value.trim()||'No reason provided';
  const pat=D.patrollers.find(p=>p.id===patId);
  const now=getBahrainNow();
  const timeStr=`${String(now.getUTCHours()).padStart(2,'0')}:${String(now.getUTCMinutes()).padStart(2,'0')}`;
  // Use the attendance record's date (clock-in date) — handles overnight shifts correctly
  const attRec=(D.attendance||[]).find(a=>a.id===attId);
  const taskDate=attRec?.date||todayStr();
  const{error}=await sb.from('task_requests').insert({
    patroller_id:patId,patroller_name:pat?.name||'',
    task_type:'Early Clock Out',
    date:taskDate,start_time:timeStr,end_time:adjEndStr,
    status:'Pending',description:`Early clock out request. Reason: ${reason}. Att ID: ${attId}`,
  });
  if(error){alert(error.message);return;}
  closeM();await reload();
  addNotification('Early clock out request submitted — awaiting TL/Admin approval','info');
}

async function approveEarlyClockOut(taskId,attId){
  // Complete the clock out
  const now=new Date();
  let map='';
  try{const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:5000}));map=`https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;}catch(e){}
  await sb.from('attendance').update({clock_out:now.toISOString(),clock_out_map:map||null,status:'Attended'}).eq('id',attId);
  await sb.from('task_requests').update({status:'Approved',reviewed_by:D.profile.id,updated_at:now.toISOString()}).eq('id',taskId);
  await reload();
  addNotification('Early clock out approved','success');
}

async function rejectEarlyClockOut(taskId){
  await sb.from('task_requests').update({status:'Rejected',reviewed_by:D.profile.id,updated_at:new Date().toISOString()}).eq('id',taskId);
  await reload();
  addNotification('Early clock out rejected — patroller must complete shift','warning');
}

// ── YEAR END LEAVE CARRY FORWARD ──
async function runYearEndCarryForward(){
  // Call this manually on Jan 1 to lock annual remaining as new carry forward
  const confirm=window.confirm('This will update all annual leave carry forwards to remaining balances. Run only on Jan 1. Continue?');
  if(!confirm)return;
  const pts=activePats();
  let updated=0;
  for(const p of pts){
    const b=getLeaveBalance(p.id);
    const existing=D.leaveBalances.find(lb=>lb.patroller_id===p.id);
    const newCF=Math.max(0,b.annualRemaining);
    if(existing){
      await sb.from('leave_balances').update({annual_carry_forward:newCF,historical_consumed:0,historical_sick:0,year:new Date().getFullYear(),updated_at:new Date().toISOString()}).eq('id',existing.id);
    } else {
      await sb.from('leave_balances').insert({patroller_id:p.id,annual_carry_forward:newCF,historical_consumed:0,historical_sick:0,year:new Date().getFullYear()});
    }
    updated++;
  }
  await reload();
  addNotification(`Year-end carry forward updated for ${updated} staff`,'success');
}

let D_notifs=[];
let notifSoundEnabled=true;

function playNotifSound(type='info'){
  if(!notifSoundEnabled)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    if(type==='success'){
      osc.frequency.setValueAtTime(520,ctx.currentTime);
      osc.frequency.setValueAtTime(780,ctx.currentTime+0.12);
      gain.gain.setValueAtTime(0.3,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.4);
    } else {
      osc.frequency.setValueAtTime(660,ctx.currentTime);
      gain.gain.setValueAtTime(0.2,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.3);
    }
  }catch(e){}
}

function showToast(msg,type='info'){
  const cols={info:'#1565C0',success:'#166534',warning:'#D97706',error:'#DC2626'};
  const bgs={info:'#EAF1FD',success:'#DCFCE7',warning:'#FEF3C7',error:'#FEE2E2'};
  const icons={info:'ti-info-circle',success:'ti-circle-check',warning:'ti-alert-triangle',error:'ti-circle-x'};
  let toast=document.getElementById('toast-container');
  if(!toast){toast=document.createElement('div');toast.id='toast-container';toast.style.cssText='position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:300px';document.body.appendChild(toast);}
  const t=document.createElement('div');
  t.style.cssText=`background:${bgs[type]};border:1.5px solid ${cols[type]}33;border-radius:12px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:slideIn .2s ease;font-family:Inter,sans-serif`;
  t.innerHTML=`<i class="ti ${icons[type]}" style="font-size:15px;color:${cols[type]};flex-shrink:0"></i><div style="flex:1;font-size:12px;color:#2A0D0F;line-height:1.4">${msg}</div><button onclick="this.parentElement.remove()" style="background:none;border:none;cursor:pointer;color:#A08070;font-size:16px;line-height:1;padding:0">×</button>`;
  toast.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},4000);
}

function addNotification(msg,type='info'){
  D_notifs.unshift({id:Date.now(),msg,type,time:new Date(),read:false});
  if(D_notifs.length>20)D_notifs=D_notifs.slice(0,20);
  playNotifSound(type);
  showToast(msg,type);
  renderNotifications();
}

function renderNotifications(){
  const badge=document.getElementById('notif-count');
  const list=document.getElementById('notif-list');
  if(!badge||!list)return;
  const unread=D_notifs.filter(n=>!n.read).length;
  badge.textContent=unread;
  badge.style.display=unread>0?'flex':'none';
  if(!D_notifs.length){list.innerHTML='<div style="padding:20px;text-align:center;color:#A08070;font-size:12px">No notifications</div>';return;}
  const icons={info:'ti-info-circle',success:'ti-circle-check',warning:'ti-alert-triangle',error:'ti-circle-x'};
  const cols={info:'#1565C0',success:'#166534',warning:'#D97706',error:'#DC2626'};
  list.innerHTML=D_notifs.map(n=>`<div style="padding:10px 14px;border-bottom:1px solid #F4EDE3;display:flex;gap:10px;background:${n.read?'#fff':'#FFFBF5'}"><i class="ti ${icons[n.type]||icons.info}" style="font-size:14px;color:${cols[n.type]||cols.info};margin-top:1px;flex-shrink:0"></i><div style="flex:1"><div style="font-size:12px;color:#2A0D0F;line-height:1.4">${n.msg}</div><div style="font-size:10px;color:#A08070;margin-top:2px">${n.time.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'})}</div></div></div>`).join('');
  D_notifs.forEach(n=>n.read=true);
}

function toggleNotifications(){
  const panel=document.getElementById('notif-panel');if(!panel)return;
  const open=panel.style.display==='block';
  panel.style.display=open?'none':'block';
  if(!open){renderNotifications();setTimeout(()=>document.addEventListener('click',function h(e){if(!panel.contains(e.target)){panel.style.display='none';document.removeEventListener('click',h);}}),50);}
}
function clearNotifications(){D_notifs=[];renderNotifications();}

function getPerfSettings(){
  const s=D.perfSettings||{};
  return{
    targetTotal:s.target_total||2200,
    targetUnique:s.target_unique||2000,
    workingHours:s.working_hours||208,

    rateUnique:s.rate_unique||10,
    taskThreshold:s.task_threshold||40,

}

function coachingScore(patrollerId,month){
  const assignments=D.coachingAssignments.filter(a=>
    a.patroller_id===patrollerId&&(a.month||a.assigned_date?.slice(0,7))===month
  );
  if(!assignments.length)return null;
  let score=100;
  // SLA: -1 per case not completed within 24h of case created_at
  assignments.forEach(a=>{
    const c=D.coachingCases.find(x=>x.id===a.case_id);
    if(!c)return;
    const batchTime=new Date(c.created_at).getTime();
    if(a.status==='completed'&&a.completed_at){
      const completedTime=new Date(a.completed_at).getTime();
      if(completedTime-batchTime>24*60*60*1000)score-=1;
    }else if(a.status==='pending'){
      // not done = SLA breached
      const now=new Date().getTime();
      if(now-batchTime>24*60*60*1000)score-=1;
    }
  });
  // Duplicate: -2 per same rider+violation coached twice in same month
  const completed=assignments.filter(a=>a.status==='completed');
  const seen={};
  completed.forEach(a=>{
    const c=D.coachingCases.find(x=>x.id===a.case_id);
    if(!c)return;
    const key=c.rider_id+'|'+c.violation_type;
    seen[key]=(seen[key]||0)+1;
  });
  Object.values(seen).forEach(count=>{if(count>1)score-=(count-1)*2;});
  return Math.max(0,score);
}

function getPatrollerTaskHours(patrollerId,month){
  const tasks=(D.tasks||[]).filter(t=>
    t.patroller_id===patrollerId&&
    t.date&&t.date.startsWith(month)&&
    t.status==='Completed'&&
    t.start_time&&t.end_time
  );
  let mins=0;
  tasks.forEach(t=>{
    const[sh,sm]=(t.start_time+':00').split(':').map(Number);
    const[eh,em]=(t.end_time+':00').split(':').map(Number);
    let d=(eh*60+em)-(sh*60+sm);
    if(d<0)d+=24*60;
    mins+=d;
  });
  return+(mins/60).toFixed(1);
}

function getAdjustedTarget(taskHours,ps){
  const over=Math.max(0,taskHours-ps.taskThreshold);
  const adjTotal=Math.max(0,Math.round(ps.targetTotal-over*ps.rateTotal));
  const adjUnique=Math.max(0,Math.round(ps.targetUnique-over*ps.rateUnique));
  return{adjTotal,adjUnique,over:+over.toFixed(1)};
}

function perfScore(evalPct,coachPct,ps){
  const ew=ps.evalWeight/100;
  const cw=1-ew;
  return Math.round(evalPct*ew+coachPct*cw);
}

function performanceView(){
  const isAL=canEdit();
  const myPat=D.patrollers.find(p=>p.user_id===D.profile?.id);
  const now=getBahrainNow();
  const curMonth=now.getUTCFullYear()+'-'+String(now.getUTCMonth()+1).padStart(2,'0');
  const ps=getPerfSettings();
  const subTab=D.perfTab||(isAL?'overview':'myperformance');
  const segHtml='';

  // ── HELPERS ──
  const months=[...new Set([
    ...D.evaluations.map(e=>e.month||e.eval_date?.slice(0,7)).filter(Boolean),
    curMonth
  ])].sort().reverse();
  const selMonth=D.evalMonth||curMonth;
  const monthSel='<select onchange="D.evalMonth=this.value;render()" style="padding:4px 8px;border-radius:7px;border:1.5px solid var(--g2);font-size:11px;font-family:inherit">'+
    months.map(m=>'<option value="'+m+'" '+(m===selMonth?'selected':'')+'>'+m+'</option>').join('')+'</select>';

  const pill=(pct,bg,col)=>'<span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:'+bg+';color:'+col+'">'+pct+'%</span>';
  const pPill=pct=>pct>=75?pill(pct,'#DBEAFE','#1E40AF'):pct>=60?pill(pct,'#DCFCE7','#166534'):pct>=40?pill(pct,'#FEF3C7','#92400E'):pill(pct,'#FEE2E2','#991B1B');
  const ePill=pct=>pct>=75?pill(pct,'#DBEAFE','#1E40AF'):pct>=50?pill(pct,'#DCFCE7','#166534'):pct>=25?pill(pct,'#FEF3C7','#92400E'):pill(pct,'#FEE2E2','#991B1B');
  const ini=n=>(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const trendBar=(val,col)=>'<div style="height:44px;background:var(--g1);border-radius:6px;display:flex;align-items:flex-end;padding:2px"><div style="width:100%;height:'+Math.max(4,val)+'%;background:'+col+';border-radius:3px;max-height:40px"></div></div>';
  const monthLabel=m=>new Date(m+'-01').toLocaleString('en-GB',{month:'short'});

  if(isAL){
    const pts=activePats().filter(p=>getUtype(p)==='patroller');

    // Per-patroller data for selected month
    const perfData=pts.map(p=>{
      const evals=D.evaluations.filter(e=>e.patroller_id===p.id&&(e.month||e.eval_date?.slice(0,7))===selMonth);
      const evalAvg=evals.length?Math.round(evals.reduce((s,e)=>s+evalScore(e),0)/evals.length):null;
      const evalAvgRaw=evals.length?+(evals.reduce((s,e)=>s+evalAvgRating(e),0)/evals.length).toFixed(2):null;
      const cScore=coachingScore(p.id,selMonth);
      const pScore=(evalAvg!==null&&cScore!==null)?perfScore(evalAvg,cScore,ps):null;
      const taskHrs=getPatrollerTaskHours(p.id,selMonth);
      const adj=getAdjustedTarget(taskHrs,ps);
      return{p,evalAvg,evalAvgRaw,cScore,pScore,evals:evals.length,taskHrs,adj};
    });
    const hasData=perfData.filter(x=>x.pScore!==null||x.cScore!==null);
    const sorted=hasData.slice().sort((a,b)=>(b.pScore||0)-(a.pScore||0));
    const best=sorted[0];
    const worst=sorted[sorted.length-1]!==best?sorted[sorted.length-1]:null;

    const teamAvgPerf=hasData.length?Math.round(hasData.filter(r=>r.pScore!==null).reduce((s,r)=>s+(r.pScore||0),0)/hasData.filter(r=>r.pScore!==null).length):0;
    const teamAvgEval=hasData.length?Math.round(hasData.filter(r=>r.evalAvg!==null).reduce((s,r)=>s+(r.evalAvg||0),0)/hasData.filter(r=>r.evalAvg!==null).length):0;
    const teamAvgCoach=hasData.length?Math.round(hasData.filter(r=>r.cScore!==null).reduce((s,r)=>s+(r.cScore||0),0)/hasData.filter(r=>r.cScore!==null).length):0;

    // Last month comparison
    const prevMonth=months[months.indexOf(selMonth)+1];
    const prevEvals=prevMonth?D.evaluations.filter(e=>(e.month||e.eval_date?.slice(0,7))===prevMonth):[];
    const prevAvg=prevEvals.length?Math.round(prevEvals.reduce((s,e)=>s+evalScore(e),0)/prevEvals.length):null;
    const diff=prevAvg!==null?teamAvgPerf-prevAvg:null;
    const diffLabel=diff!==null?(diff>=0?'+'+diff+'%':diff+'%'):'--';
    const diffCol=diff===null?'var(--g3)':diff>0?'#166534':'#DC2626';

    // 6-month trend data
    const last6=months.slice(0,6);
    const trendRows=pts.map(p=>{
      const scores=last6.map(m=>{
        const ev=D.evaluations.filter(e=>e.patroller_id===p.id&&(e.month||e.eval_date?.slice(0,7))===m);
        const ea=ev.length?Math.round(ev.reduce((s,e)=>s+evalScore(e),0)/ev.length):null;
        const cs=coachingScore(p.id,m);
        return(ea!==null&&cs!==null)?perfScore(ea,cs,ps):null;
      });
      const hasAny=scores.some(s=>s!==null);
      if(!hasAny)return'';
      const nonNull=scores.filter(s=>s!==null);
      const diff2=nonNull.length>1?nonNull[nonNull.length-1]-nonNull[0]:null;
      const trend2=diff2===null?'--':diff2>0?'↑ +'+diff2+'%':'↓ '+diff2+'%';

      return'<tr>'+
        '<td style="font-size:11px;font-family:monospace;color:var(--g4);white-space:nowrap">'+(p.patroller_id_num||'--')+'</td>'+

        '<td class="r" style="font-weight:700;color:'+trendCol+'">'+trend2+'</td></tr>';
    }).filter(Boolean).join('');

    // Full performance log — filter by selected month or all time
    const perfLogMonth=D.perfLogMonth||'all';
    const allMonths=months.slice(0,24); // up to 2 years
    const logSourceMonths=perfLogMonth==='all'?allMonths:[perfLogMonth];

      const cs=coachingScore(p.id,m);

      return{p,m,ea,cs,ps2};
    }).filter(Boolean)).flat().sort((a,b)=>b.m.localeCompare(a.m)||a.p.name.localeCompare(b.p.name));
    window._downloadPerfLog=()=>{
      const csv=['"Month","ID","Patroller","Eval %","Coaching %","Performance %"',...logRows.map(r=>[r.m,r.p.patroller_id_num||'',r.p.name,r.ea??'',r.cs??'',r.ps2??''].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','))].join('\n');

      '</tr>'

    // ── OVERVIEW ──
    if(subTab==='overview'){
      const patCards=sorted.map((d,i)=>{
        const isBest=i===0;
        const isWorst=d===worst;
