<script>
// Clear any old SW immediately and reload once if needed
(function(){
  if(!('serviceWorker' in navigator)) return;
  // If we haven't cleared yet, clear and reload
  if(location.hostname.includes('github.io') && !sessionStorage.getItem('sw-cleared')){
    sessionStorage.setItem('sw-cleared','1');
    navigator.serviceWorker.getRegistrations().then(function(regs){
      var had = regs.length > 0;
      var p = regs.map(function(r){return r.unregister();});
      return Promise.all(p).then(function(){
        return caches.keys();
      }).then(function(keys){
        return Promise.all(keys.map(function(k){return caches.delete(k);}));
      }).then(function(){
        if(had) window.location.reload();
      });
    });
  }
})();

  function from(table){
    let sel='*',filters=[],ord=null,lim=null,isSingle=false,isMaybe=false;
    
    async function run(method,body){
      let qs='select='+encodeURIComponent(sel);
      filters.forEach(f=>{qs+='&'+f;});
      if(ord)qs+='&order='+ord;
      if(lim)qs+='&limit='+lim;
      const extra={};
      if(isSingle||isMaybe)extra['Accept']='application/vnd.pgrst.object+json';
      const resp=await fetch(U+'/rest/v1/'+table+'?'+qs,{
        method:method||'GET',
        headers:hdrs(extra),
        body:body!=null?JSON.stringify(body):undefined
      });
      const txt=await resp.text();
      let data=null;
      try{data=txt?JSON.parse(txt):null;}catch(e){}
      if(!resp.ok)return{data:null,error:{message:(data&&data.message)||txt||resp.statusText}};
      return{data:data,error:null};
    }
    
    const q={
      select(s){sel=s;return q;},
      eq(c,v){filters.push(c+'=eq.'+encodeURIComponent(v));return q;},
      order(c,o){ord=c+(o&&o.ascending===false?'.desc':'');return q;},
      limit(n){lim=n;return q;},
      single(){isSingle=true;return q;},
      maybeSingle(){isMaybe=true;return q;},
      insert(d){return run('POST',d);},
      update(d){return run('PATCH',d);},

      setTimeout(()=>{if(ses)fn('SIGNED_IN',ses);},0);
      return{data:{subscription:{unsubscribe:()=>{}}}};
    }
  };

})();

function wt(p,ms=8000){return Promise.race([p,new Promise((_,r)=>setTimeout(()=>r(new Error('timeout')),ms))]);}
function ini(n){return (n||'').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();}
function fmtT(t){if(!t||t==='?')return'?';const[h,m]=t.split(':');const hr=parseInt(h);return(hr===0?12:hr>12?hr-12:hr)+':'+m+' '+(hr<12||hr===24?'AM':'PM');}
function fmt(d){return d.getUTCDate()+'-'+(d.getUTCMonth()+1)+'-'+d.getUTCFullYear();}
function getBahrainNow(){const n=new Date();return new Date(n.getTime()+3*3600000);}
function todayStr(){const b=getBahrainNow();return b.getUTCFullYear()+'-'+String(b.getUTCMonth()+1).padStart(2,'0')+'-'+String(b.getUTCDate()).padStart(2,'0');}
function todayDayIdx(){return getBahrainNow().getUTCDay();}
function wNum(d){const j=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil(((d-j)/86400000+j.getUTCDay()+1)/7);}
function wStart(){
  const b=getBahrainNow();const day=b.getUTCDay();

  const sun=new Date(b);sun.setUTCDate(sun.getUTCDate()+diff+D.woff*7);sun.setUTCHours(0,0,0,0);
  return sun.toISOString().split('T')[0];
}
function wDates(){
  const ws=wStart();const base=new Date(ws);
  return Array.from({length:7},(_,i)=>{const d=new Date(base);d.setUTCDate(d.getUTCDate()+i);return d;});
}

const ANNUAL_DAILY_RATE=30.295/365;
function getRosterByEmail(email){return ROSTER_DATA.find(r=>r.email.toLowerCase()===(email||'').toLowerCase());}
function getLeaveYear(){return new Date().getFullYear();}
function calcAnnualAccrued(){const now=new Date();const jan1=new Date(now.getFullYear(),0,1);const days=Math.floor((now-jan1)/86400000);return Math.round(days*ANNUAL_DAILY_RATE*1000)/1000;}
const LEAVE_TYPES=['Annual Leave','Sick Leave','Sick Leave 50%','Sick Leave Unpaid','Unpaid Leave','Death'];

// ── AUTH ──
window.addEventListener('load',async()=>{
  document.getElementById('s-login').style.display='flex';
  const{data:{session}}=await sb.auth.getSession();
  if(session)afterLogin(session.user);
});
sb.auth.onAuthStateChange((ev,session)=>{
  if(ev==='SIGNED_OUT'){document.getElementById('app').style.display='none';document.getElementById('s-login').style.display='flex';}
  else if(ev==='SIGNED_IN'&&session)afterLogin(session.user);
});

async function doLogin(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  if(!email){document.getElementById('login-err').textContent='Please enter your email.';return;}
  const btn=document.querySelector('.auth-btn');btn.disabled=true;btn.textContent='Signing in...';
  document.getElementById('login-err').textContent='';
  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password:email+'_talabat_access'});
    if(error)throw error;
    await afterLogin(data.user);
  }catch(e){
    btn.disabled=false;btn.textContent='Sign in';
    document.getElementById('login-err').textContent=e.message||'Login failed';
  }
}

async function afterLogin(user){
  D.user=user;
  // Load profile
  try{
    let{data:prof}=await wt(sb.from('profiles').select('*,custom_roles(id,name,access_level,visible_tabs)').eq('id',user.id).single(),5000);
    if(!prof){
      const{data:byEmail}=await wt(sb.from('profiles').select('*').eq('email',user.email).maybeSingle(),5000);
      if(byEmail){await sb.from('profiles').update({id:user.id}).eq('email',user.email);prof={...byEmail,id:user.id};}
      else{await sb.from('profiles').upsert({id:user.id,email:user.email,full_name:user.user_metadata?.full_name||user.email.split('@')[0],role:'patroller',is_active:true},{onConflict:'id'});const{data:p2}=await wt(sb.from('profiles').select('*').eq('id',user.id).single(),5000);prof=p2;}
    }
    D.profile=prof||{id:user.id,email:user.email,full_name:user.email.split('@')[0],role:'patroller'};
  }catch(e){D.profile={id:user.id,email:user.email,full_name:user.email.split('@')[0],role:'patroller'};}

  // Check if admin/lead → redirect to dashboard
  const role=D.profile.role;
  const crId=D.profile.custom_role_id;
  let isAdmin=role==='admin'||role==='lead';
  if(!isAdmin&&crId){
    try{const{data:cr}=await sb.from('custom_roles').select('access_level').eq('id',crId).single();if(cr&&(cr.access_level==='admin'||cr.access_level==='editor'))isAdmin=true;}catch(e){}
  }
  if(isAdmin){window.location.href=DASHBOARD;return;}

  // Patroller — load data and show app
  document.getElementById('s-login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('main').innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:300px;gap:12px;color:#999"><div style="width:28px;height:28px;border:3px solid #eee;border-top-color:#FF5900;border-radius:50%;animation:spin .7s linear infinite"></div><div>Loading...</div></div>';
  await loadAll();
  // Auto-link patroller record
  try{
    const linked=D.patrollers.find(p=>p.user_id===D.profile.id);
    if(!linked){const byName=D.patrollers.find(p=>p.name.toLowerCase()===D.profile.full_name.toLowerCase()&&!p.user_id);if(byName){await sb.from('patrollers').update({user_id:D.profile.id,user_type:'patroller'}).eq('id',byName.id);await loadAll();}}
  }catch(e){}
  render();
}

async function doLogout(){
  await sb.auth.signOut();
  document.getElementById('app').style.display='none';
  document.getElementById('s-login').style.display='flex';
}

// ── DATA LOADING ──
async function loadAll(){
  try{
    const[sh,pt,sc]=await Promise.all([
      wt(sb.from('shifts').select('*').order('created_at')),
      wt(sb.from('patrollers').select('*').eq('is_active',true).order('name')),
      wt(sb.from('schedules').select('*')),
    ]);
    D.shifts=sh.data||[];D.patrollers=pt.data||[];D.schedules=sc.data||[];
  }catch(e){}
  try{const{data}=await wt(sb.from('profiles').select('*').order('full_name'),5000);D.users=data||[];}catch(e){}
  try{const{data}=await wt(sb.from('time_off_requests').select('*').order('created_at',{ascending:false}),5000);D.timeoff=data||[];}catch(e){}
  try{const{data}=await wt(sb.from('attendance').select('*').order('date',{ascending:false}).limit(200),5000);D.attendance=data||[];}catch(e){}
  try{const{data}=await wt(sb.from('leave_balances').select('*'),4000);D.leaveBalances=data||[];}catch(e){}
  try{const{data}=await wt(sb.from('documents').select('*').order('created_at',{ascending:false}),5000);D.docs=data||[];}catch(e){}
  try{const{data}=await wt(sb.from('task_requests').select('*').order('created_at',{ascending:false}),5000);D.tasks=data||[];}catch(e){}
  try{const{data}=await wt(sb.from('custom_roles').select('*'),4000);D.customRoles=data||[];}catch(e){}
  try{const notes=await wt(sb.from('notes').select('*'),5000);const nd=notes.data||[];D.notesAll={content:(nd.find(n=>n.audience==='all')||{}).content||''};D.notesPat={content:(nd.find(n=>n.audience==='patroller')||{}).content||''};}catch(e){}
}
async function reload(){await loadAll();render();}

// ── RENDER ──
function render(){
  if(!D.profile)return;
  renderHeader();
  renderBottomNav();
  const main=document.getElementById('main');
  if(D.tab==='schedule')main.innerHTML=renderSchedule();
  else if(D.tab==='attendance')main.innerHTML=renderAttendance();
  else if(D.tab==='tasks')main.innerHTML=renderTasks();
  else if(D.tab==='leave')main.innerHTML=renderLeave();
  else if(D.tab==='docs')main.innerHTML=renderDocs();
}

function setTab(t){D.tab=t;render();window.scrollTo(0,0);}

function renderHeader(){
  const u=D.profile;
  document.getElementById('avatar').textContent=ini(u.full_name);
  const dates=wDates();
  document.getElementById('week-lbl').textContent='Week '+wNum(dates[0])+' \u00b7 '+dates[0].getFullYear();
  // Stats: today zone + shift time
  const pat=D.patrollers.find(p=>p.user_id===u.id);
  const ti=todayDayIdx();
  const zone=pat?gDZ(pat.id,ti):'';
  const sh=pat?getDayShift(pat.id,ti):null;
  const sr=document.getElementById('stats-row');
  sr.innerHTML=
    '<div class="stat-pill"><div class="stat-pill-v" style="color:#fff;font-size:12px">'+(zone||'Off today')+'</div><div class="stat-pill-l">TODAY\'S ZONE</div></div>'+
    '<div class="stat-pill"><div class="stat-pill-v" style="color:#fff;font-size:12px">'+(sh&&sh.start_time!=='?'?fmtT(sh.start_time)+' \u2013 '+fmtT(sh.end_time):'--')+'</div><div class="stat-pill-l">SHIFT HOURS</div></div>';
  // Tabs
  const tr=document.getElementById('tabs-row');
  tr.innerHTML=TABS.map(t=>'<button class="tab-btn'+(D.tab===t.id?' active':'')+'" onclick="setTab(\''+t.id+'\')">'+t.label+'</button>').join('');
}

function renderBottomNav(){
  const bn=document.getElementById('bottom-nav');
  bn.innerHTML=TABS.map(t=>'<button class="bn-btn'+(D.tab===t.id?' active':'')+'" onclick="setTab(\''+t.id+'\')"><i class="ti '+t.icon+'"></i><span>'+t.label.replace('My ','')+'</span></button>').join('');
}

// ── SCHEDULE VIEW ──
function renderSchedule(){
  const pat=D.patrollers.find(p=>p.user_id===D.profile.id);
  if(!pat)return '<div style="padding:40px;text-align:center;color:#999"><i class="ti ti-user-off" style="font-size:40px;display:block;margin-bottom:12px"></i>Not linked to a schedule. Contact admin.</div>';
  const today=todayStr();
  const ti=todayDayIdx();
  const dates=wDates();
  const wn=wNum(dates[0]);
  const sh=getDayShift(pat.id,ti);
  const onVac=isOnVacationToday(pat.id);
  const todayZone=gDZ(pat.id,ti);
  // Count shifts this week
  const shifts=dates.filter((_,i)=>gDZ(pat.id,i)).length;
  const offDays=7-shifts;

  let html='';
  // Hero card
  html+='<div style="background:#411517;margin:10px 12px;border-radius:14px;padding:16px">';
  html+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">';
  html+='<div style="width:48px;height:48px;background:rgba(255,255,255,.15);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff">'+ini(pat.name)+'</div>';
  html+='<div><div style="font-size:16px;font-weight:800;color:#fff">'+pat.name+'</div><div style="font-size:12px;color:rgba(255,255,255,.55);margin-top:1px">'+(sh&&sh.name?sh.name:'Morning Shift')+'</div></div></div>';
  // Status pill
  const rec=getMyAttRecord();
  const inTime=rec&&rec.clock_in?new Date(rec.clock_in).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'}):'';
  let statusColor='#FCD34D';let statusText='Scheduled';
  if(onVac){statusColor='#C084FC';statusText='On Vacation';}
  else if(!todayZone){statusColor='#888';statusText='Off Today';}
  else if(rec&&rec.clock_out){statusColor='#60A5FA';statusText='Shift Complete';}
  else if(rec&&rec.clock_in){statusColor='#4ADE80';statusText='On Shift \u2022 '+inTime;}
  html+='<div style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);padding:5px 12px;border-radius:20px;margin-bottom:14px">';
  html+='<div style="width:7px;height:7px;background:'+statusColor+';border-radius:50%"></div>';
  html+='<span style="font-size:12px;font-weight:700;color:#fff">'+statusText+'</span>';
  if(todayZone&&!onVac)html+='<span style="font-size:11px;color:rgba(255,255,255,.6)">\u00b7 '+todayZone+'</span>';
  html+='</div>';
  // Shift time grid
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  html+='<div style="background:rgba(255,255,255,.1);border-radius:9px;padding:10px"><div style="font-size:9px;color:rgba(255,255,255,.5);font-weight:700;text-transform:uppercase;margin-bottom:3px">Shift time</div>';
  html+='<div style="font-size:14px;font-weight:800;color:#fff">'+(sh&&sh.start_time!=='?'?fmtT(sh.start_time)+' \u2013 '+fmtT(sh.end_time):'Not set')+'</div></div>';
  html+='<div style="background:rgba(255,255,255,.1);border-radius:9px;padding:10px"><div style="font-size:9px;color:rgba(255,255,255,.5);font-weight:700;text-transform:uppercase;margin-bottom:3px">Zone</div>';
  html+='<div style="font-size:14px;font-weight:800;color:#fff">'+(onVac?'Vacation':todayZone||'Off day')+'</div></div>';
  html+='</div></div>';

  // Week stats row
  html+='<div style="display:flex;gap:8px;padding:10px 12px">';
  html+='<div style="background:#fff;border-radius:10px;padding:10px 12px;flex:1;text-align:center;border:1px solid #f0e8e0"><div style="font-size:18px;font-weight:800;color:#FF5900">'+shifts+'</div><div style="font-size:9px;font-weight:700;color:#999;text-transform:uppercase;margin-top:2px">Shifts</div></div>';
  html+='<div style="background:#fff;border-radius:10px;padding:10px 12px;flex:1;text-align:center;border:1px solid #f0e8e0"><div style="font-size:18px;font-weight:800;color:#7C3AED">'+offDays+'</div><div style="font-size:9px;font-weight:700;color:#999;text-transform:uppercase;margin-top:2px">Off Days</div></div>';
  html+='<div style="background:#fff;border-radius:10px;padding:10px 12px;flex:1;text-align:center;border:1px solid #f0e8e0"><div style="font-size:18px;font-weight:800;color:#16A34A">'+(shifts*8)+'h</div><div style="font-size:9px;font-weight:700;color:#999;text-transform:uppercase;margin-top:2px">This Week</div></div>';
  html+='</div>';

  // Week nav
  html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:#fff;border-top:1px solid #f5f5f5;border-bottom:1px solid #f5f5f5">';
  html+='<button onclick="D.woff--;render()" style="width:32px;height:32px;border:1px solid #eee;border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center"><i class="ti ti-chevron-left" style="font-size:14px"></i></button>';
  html+='<span style="font-size:12px;font-weight:600;color:#411517">Week '+wn+' \u00b7 '+fmt(dates[0])+' \u2013 '+fmt(dates[6])+'</span>';
  html+='<button onclick="D.woff++;render()" style="width:32px;height:32px;border:1px solid #eee;border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center"><i class="ti ti-chevron-right" style="font-size:14px"></i></button>';
  html+='</div>';

  // Day list
  const DAYS_SHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const todayFull=today;
  // Today highlight first
  const todayDate=dates[ti];
  html+='<div style="background:#fff">';
  if(dates.find(d=>d.toISOString().split('T')[0]===todayFull)){
    html+='<div class="today-row"><div class="today-accent"></div><div style="flex:1"><div style="font-size:12px;font-weight:800;color:#C2410C">TODAY \u2014 '+DAYS_SHORT[ti].toUpperCase()+' '+todayDate.getUTCDate()+' '+['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][todayDate.getUTCMonth()]+'</div><div style="font-size:11px;color:#888;margin-top:2px">'+(todayZone?todayZone+' \u00b7 '+(sh&&sh.start_time!=='?'?fmtT(sh.start_time)+' \u2013 '+fmtT(sh.end_time):''):'Off today')+'</div></div><div class="badge" style="background:'+(todayZone?'#DCFCE7':'#f5f5f5')+';color:'+(todayZone?'#166534':'#999')+'">'+(todayZone?(rec&&rec.clock_out?'DONE':rec&&rec.clock_in?'ON SHIFT':'SCHEDULED'):'OFF')+'</div></div>';
  }
  dates.forEach((d,i)=>{
    if(d.toISOString().split('T')[0]===todayFull)return;
    const z=gDZ(pat.id,i);
    const dsh=getDayShift(pat.id,i);
    const vac=D.timeoff.find(t=>t.patroller_id===pat.id&&t.status==='Approved'&&d.toISOString().split('T')[0]>=t.start_date&&d.toISOString().split('T')[0]<=t.end_date);
    html+='<div class="list-row"><div style="font-size:11px;font-weight:700;color:#999;width:28px;flex-shrink:0">'+DAYS_SHORT[i]+'</div>';
    if(vac)html+='<div style="flex:1"><div style="font-size:13px;font-weight:600;color:#7C3AED">On Vacation</div></div><div class="badge" style="background:#EDE9FE;color:#4C1D95">VAC</div>';
    else if(!z)html+='<div style="flex:1"><div style="font-size:13px;color:#bbb;font-style:italic">Off day</div></div><div class="badge" style="background:#f5f5f5;color:#999">OFF</div>';
    else html+='<div style="flex:1"><div style="font-size:13px;font-weight:700;color:#111">'+z+'</div><div style="font-size:11px;color:#888;margin-top:1px">'+(dsh&&dsh.start_time!=='?'?fmtT(dsh.start_time)+' \u2013 '+fmtT(dsh.end_time):'')+'</div></div><div class="badge" style="background:#F0F9FF;color:#0369A1">'+(dsh&&dsh.shift_type==='morning'?'AM':'PM')+'</div>';
    html+='</div>';
  });
  html+='</div>';

  // Notes
  if(D.notesAll.content)html+='<div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:12px;margin:8px 12px;padding:12px"><div style="font-size:10px;font-weight:700;color:#92400E;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em">General Notes</div><div style="font-size:13px;color:#78350F">'+D.notesAll.content+'</div></div>';
  if(D.notesPat.content)html+='<div style="background:#EFF6FF;border:1px solid #BFDBFE;border-radius:12px;margin:8px 12px;padding:12px"><div style="font-size:10px;font-weight:700;color:#1E40AF;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em">Patrollers Only</div><div style="font-size:13px;color:#1E3A8A">'+D.notesPat.content+'</div></div>';

  return html;
}

function renderAttendance(){
  const pat=D.patrollers.find(p=>p.user_id===D.profile.id);
  if(!pat)return '<div style="padding:40px;text-align:center;color:#999">Not linked to a schedule.</div>';
  const today=todayStr();
  const ti=todayDayIdx();
  const zone=gDZ(pat.id,ti);
  const onVac=isOnVacationToday(pat.id);
  const rec=getMyAttRecord();
  const sh=getDayShift(pat.id,ti);
  let html='';

  if(onVac){
    html+='<div style="background:#7C3AED;margin:10px 12px;border-radius:14px;padding:24px;text-align:center;color:#fff"><i class="ti ti-beach" style="font-size:40px;display:block;margin-bottom:8px"></i><div style="font-size:18px;font-weight:800">On Vacation</div></div>';

    if(rec.clock_in_map)html+='<a href="'+rec.clock_in_map+'" target="_blank" style="color:#86efac;font-size:12px;display:block;margin-bottom:12px"><i class="ti ti-map-pin"></i> View clock-in location</a>';
    html+='<button id="clock-out-btn" class="clock-btn" onclick="doClockOut()"><i class="ti ti-clock-stop" style="font-size:18px"></i>Clock Out</button>';
    html+='<div class="clock-gps"><i class="ti ti-map-pin" style="font-size:10px"></i> GPS location will be recorded</div></div>';
  } else {
    const inT=new Date(rec.clock_in).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});
    const outT=new Date(rec.clock_out).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});
    const mins=Math.round((new Date(rec.clock_out)-new Date(rec.clock_in))/60000);
    const dur=Math.floor(mins/60)+'h '+(mins%60)+'m';
    const tmrIdx=(ti+1)%7;const tmrZone=gDZ(pat.id,tmrIdx);const tmrSh=getDayShift(pat.id,tmrIdx);
    html+='<div class="clock-card-blue">';
    html+='<i class="ti ti-circle-check" style="font-size:52px;color:#60A5FA;display:block;margin-bottom:10px"></i>';

    html+='<div style="font-size:32px;font-weight:800;color:#60A5FA;margin:6px 0">'+dur+'</div>';

    if(rec.clock_out_map)html+='<a href="'+rec.clock_out_map+'" target="_blank" style="color:#93C5FD;font-size:13px"><i class="ti ti-map-pin"></i> Clock-out</a>';
    html+='</div>';
    if(tmrZone){
      html+='<div style="background:rgba(255,255,255,.12);border-radius:12px;padding:14px;text-align:left">';
      html+='<div style="font-size:10px;color:rgba(255,255,255,.5);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Tomorrow</div>';
      html+='<div style="font-size:18px;font-weight:800;color:#fff">'+tmrZone+'</div>';
      html+='<div style="font-size:13px;color:rgba(255,255,255,.55);margin-top:3px">'+(tmrSh&&tmrSh.start_time!=='?'?fmtT(tmrSh.start_time)+' – '+fmtT(tmrSh.end_time):'')+'</div>';
      html+='</div>';
    }else{
      html+='<div style="background:rgba(255,255,255,.08);border-radius:12px;padding:14px">';
      html+='<div style="font-size:10px;color:rgba(255,255,255,.5);font-weight:700;text-transform:uppercase;margin-bottom:4px">Tomorrow</div>';
      html+='<div style="font-size:15px;color:rgba(255,255,255,.5)">Day Off</div>';

  const myRecs=(D.attendance||[]).filter(a=>a.patroller_id===pat.id).slice(0,20);
  if(myRecs.length>0){
    html+='<div class="section-lbl">Attendance History</div>';
    html+='<div style="background:#fff">';
    myRecs.forEach(a=>{
      const inT=a.clock_in?new Date(a.clock_in).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'}):'--';
      const outT=a.clock_out?new Date(a.clock_out).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'}):'--';
      const dur=a.clock_in&&a.clock_out?Math.floor(Math.round((new Date(a.clock_out)-new Date(a.clock_in))/60000)/60)+'h '+(Math.round((new Date(a.clock_out)-new Date(a.clock_in))/60000)%60)+'m':'--';

      html+='<div style="flex:1"><div style="font-size:12px;font-weight:700;color:#111">'+a.date+'</div><div style="font-size:11px;color:#888;margin-top:1px">'+inT+' \u2192 '+outT+(dur!=='--'?' \u00b7 '+dur:'')+'</div></div>';
      html+='<div class="badge" style="background:'+(isAtt?'#DCFCE7':'#FEE2E2')+';color:'+(isAtt?'#166534':'#991B1B')+'">'+(a.status||'--')+'</div>';
      html+='</div>';
    });
    html+='</div>';
  }
  return html;
}

// ── CLOCK IN/OUT ──
async function doClockIn(){
  const btn=document.getElementById('clock-in-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader" style="animation:spin .7s linear infinite"></i> Getting location...';}
  try{
    const loc=await getLocation();
    const pat=D.patrollers.find(p=>p.user_id===D.profile.id);
    if(!pat)throw new Error('No schedule record found');
    const today=todayStr();const ti=todayDayIdx();
    const sh=getDayShift(pat.id,ti);
    const mapUrl=mapsLink(loc.lat,loc.lng);
    const now=new Date();const nowIso=now.toISOString();
    const bhr=getBahrainNow();
    const clockInMins=bhr.getUTCHours()*60+bhr.getUTCMinutes();
    const startMins=sh?getShiftStartMins(sh):null;
    const lateMins=startMins!==null?Math.max(0,clockInMins-startMins):0;
    const adjEndMins=sh?getShiftEndMins(sh)+lateMins:null;
    const adjEndTime=adjEndMins!==null?String(Math.floor(adjEndMins/60)%24).padStart(2,'0')+':'+String(adjEndMins%60).padStart(2,'0'):null;
    const{error}=await sb.from('attendance').upsert({patroller_id:pat.id,patroller_name:pat.name,date:today,clock_in:nowIso,clock_in_lat:loc.lat,clock_in_lng:loc.lng,clock_in_map:mapUrl,late_mins:lateMins,adj_end_time:adjEndTime,status:'Attended',updated_at:nowIso},{onConflict:'patroller_id,date'});
    if(error)throw error;
    const clockInTimeStr=String(bhr.getUTCHours()).padStart(2,'0')+':'+String(bhr.getUTCMinutes()).padStart(2,'0');
    try{fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event:'clock_in',patroller_name:pat.name,date:today,clock_in_time:clockInTimeStr,late_mins:lateMins,clock_in_location:mapUrl,app_url:REDIRECT})});}catch(e){}
    await reload();
  }catch(e){if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-clock-play"></i> Clock In';}alert('Error: '+e.message);}
}

async function doClockOut(){
  const pat=D.patrollers.find(p=>p.user_id===D.profile.id);
  if(!pat)return;
  const rec=getMyAttRecord();
  if(!rec||!rec.clock_in)return;
  const ti=todayDayIdx();const sh=getDayShift(pat.id,ti);
  if(sh&&sh.end_time){
    const nowMins=getBahrainMinutes();
    const lateMins=rec.late_mins||0;
    const adjEndMins=getShiftEndMins(sh)+lateMins;
    if(nowMins<adjEndMins-5){
      const early=adjEndMins-nowMins;
      const earlyLabel=Math.floor(early/60)>0?Math.floor(early/60)+'h '+(early%60)+'m':(early%60)+'m';
      const adjEndStr=String(Math.floor(adjEndMins/60)%24).padStart(2,'0')+':'+String(adjEndMins%60).padStart(2,'0');
      openModal('earlyClockOut',{earlyLabel,adjEndStr,patId:pat.id,attId:rec.id});
      return;
    }
  }
  await doNormalClockOut();
}

async function doNormalClockOut(){
  const btn=document.getElementById('clock-out-btn');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader" style="animation:spin .7s linear infinite"></i> Getting location...';}
  try{
    const loc=await getLocation();
    const pat=D.patrollers.find(p=>p.user_id===D.profile.id);
    if(!pat)throw new Error('No schedule record found');
    const today=todayStr();const now=new Date().toISOString();
    const existing=getMyAttRecord();
    if(!existing)throw new Error('Please clock in first');
    const mapUrl=mapsLink(loc.lat,loc.lng);
    const{error}=await sb.from('attendance').update({clock_out:now,clock_out_lat:loc.lat,clock_out_lng:loc.lng,clock_out_map:mapUrl,updated_at:now}).eq('id',existing.id);
    if(error)throw error;
    const inT=new Date(existing.clock_in).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});
    const outT=new Date(now).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Bahrain'});
    const mins=Math.round((new Date(now)-new Date(existing.clock_in))/60000);
    const dur=Math.floor(mins/60)+'h '+(mins%60)+'m';
    try{fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event:'clock_out',patroller_name:pat.name,date:today,clock_in_time:inT,clock_out_time:outT,duration:dur,clock_out_location:mapUrl,app_url:REDIRECT})});}catch(e){}
    await reload();
  }catch(e){if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-clock-stop"></i> Clock Out';}alert('Error: '+e.message);}
}

// ── LEAVE VIEW ──
function renderLeave(){
  const pat=D.patrollers.find(p=>p.user_id===D.profile.id);
  if(!pat)return '<div style="padding:40px;text-align:center;color:#999">Not linked to a schedule.</div>';
  const lb=D.leaveBalances.find(b=>b.patroller_id===pat.id);
  const roster=getRosterByEmail(D.profile.email);
  const accrued=calcAnnualAccrued();
  const carryFwd=(lb&&lb.annual_carry_forward>0)?lb.annual_carry_forward:(roster?roster.carryFwd:0);
  const totalAnnual=carryFwd+accrued;
  const yr=String(getLeaveYear());
  const approved=(D.timeoff||[]).filter(t=>t.patroller_id===pat.id&&t.status==='Approved'&&(t.start_date||'').startsWith(yr));
  const countDays=arr=>arr.reduce((s,t)=>{const d1=new Date(t.start_date),d2=new Date(t.end_date);return s+(isNaN(d1)||isNaN(d2)?1:Math.round((d2-d1)/86400000)+1);},0);
  const hc=(lb&&lb.historical_consumed!=null)?lb.historical_consumed:(roster?roster.historicalConsumed||0:0);
  const consumedAnnual=hc+countDays(approved.filter(t=>t.request_type==='Annual Leave'));
  const annualLeft=Math.max(0,Math.round((totalAnnual-consumedAnnual)*100)/100);
  const sickEnt=roster?roster.sickEnt:15;
  const consumedSick=countDays(approved.filter(t=>t.request_type==='Sick Leave'));
  const sickLeft=Math.max(0,sickEnt-consumedSick);
  const taken=countDays(approved);
  const annualPct=Math.round((annualLeft/Math.max(1,totalAnnual))*100);
  const sickPct=Math.round((sickLeft/Math.max(1,sickEnt))*100);
  const annualColor=annualLeft<3?'#DC2626':annualLeft<7?'#D97706':'#16A34A';
  const sickColor=sickLeft<2?'#DC2626':'#7C3AED';

  let html='';
  // Stats
  html+='<div style="display:flex;gap:8px;padding:10px 12px">';
  html+='<div style="background:#fff;border-radius:10px;padding:10px;flex:1;text-align:center;border:1px solid #f0e8e0"><div style="font-size:20px;font-weight:800;color:'+annualColor+'">'+annualLeft+'</div><div style="font-size:9px;font-weight:700;color:#999;text-transform:uppercase;margin-top:2px">Annual Left</div></div>';
  html+='<div style="background:#fff;border-radius:10px;padding:10px;flex:1;text-align:center;border:1px solid #f0e8e0"><div style="font-size:20px;font-weight:800;color:'+sickColor+'">'+sickLeft+'</div><div style="font-size:9px;font-weight:700;color:#999;text-transform:uppercase;margin-top:2px">Sick Left</div></div>';
  html+='<div style="background:#fff;border-radius:10px;padding:10px;flex:1;text-align:center;border:1px solid #f0e8e0"><div style="font-size:20px;font-weight:800;color:#FCD34D">'+taken+'</div><div style="font-size:9px;font-weight:700;color:#999;text-transform:uppercase;margin-top:2px">Taken</div></div>';
  html+='</div>';
  // Annual leave bar
  html+='<div style="background:#fff;padding:14px;margin:0 12px 8px;border-radius:12px;border:1px solid #f0e8e0">';
  html+='<div style="font-size:11px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Annual Leave</div>';
  html+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px"><span style="font-size:22px;font-weight:800;color:'+annualColor+'">'+annualLeft+'<span style="font-size:13px;color:#999;font-weight:400"> days left</span></span><span style="font-size:12px;color:#999">of '+Math.round(totalAnnual*10)/10+'</span></div>';
  html+='<div class="prog-bar"><div class="prog-fill" style="background:'+annualColor+';width:'+annualPct+'%"></div></div>';
  html+='<div style="font-size:11px;color:#999;margin-top:4px">'+consumedAnnual+' days used \u00b7 '+accrued.toFixed(1)+' accrued this year</div></div>';
  // Sick leave bar
  html+='<div style="background:#fff;padding:14px;margin:0 12px 8px;border-radius:12px;border:1px solid #f0e8e0">';
  html+='<div style="font-size:11px;font-weight:700;color:#411517;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Sick Leave</div>';
  html+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px"><span style="font-size:22px;font-weight:800;color:'+sickColor+'">'+sickLeft+'<span style="font-size:13px;color:#999;font-weight:400"> days left</span></span><span style="font-size:12px;color:#999">of '+sickEnt+'</span></div>';
  html+='<div class="prog-bar"><div class="prog-fill" style="background:'+sickColor+';width:'+sickPct+'%"></div></div>';
  html+='<div style="font-size:11px;color:#999;margin-top:4px">'+consumedSick+' days used</div></div>';
  // Request button
  html+='<button class="action-btn" onclick="openModal(\'timeoff\')"><i class="ti ti-plus"></i>Request Time Off</button>';
  return html;
}

    html+='<div style="background:#fff;border-radius:12px;border:1px solid #f0e8e0;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px">';
    html+='<div style="width:40px;height:40px;background:#FFF0E6;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="ti '+ic+'" style="font-size:20px;color:#FF5900"></i></div>';
    html+='<div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+doc.name+'</div><div style="font-size:11px;color:#888;margin-top:1px">'+(doc.category||'Document')+'</div></div>';
    html+='<i class="ti ti-external-link" style="font-size:16px;color:#ccc;flex-shrink:0"></i>';
    html+='</div></a>';
  });
  html+='</div>';
  return html;
}

// ── MODALS ──
function openModal(type,data){
  const box=document.getElementById('modal-box');
  const ov=document.getElementById('modal');
  if(type==='changepw'){
    box.innerHTML='<div class="modal-title"><i class="ti ti-key"></i>Change password</div><div id="cpw-e" class="msg-err"></div><div id="cpw-ok" style="color:#16A34A;font-size:12px;margin-bottom:10px;display:none"></div><div class="fg"><label>New password</label><input type="password" id="cpw1" placeholder="Min 8 characters"></div><div class="fg"><label>Confirm password</label><input type="password" id="cpw2"></div><div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="doChangePw()"><i class="ti ti-check"></i>Save</button></div>';
  } else if(type==='newrequest'||type==='timeoff'){
    const pat=D.patrollers.find(p=>p.user_id===D.profile.id);
    var patId=pat?pat.id:'';box.innerHTML='<div class="modal-title"><i class="ti ti-calendar-off"></i>New Request</div><div id="req-e" class="msg-err"></div><div class="fg"><label>Type</label><select id="req-type"><option value="">-- Select type --</option>'+LEAVE_TYPES.map(t=>'<option value="'+t+'">'+t+'</option>').join('')+'<option value="Task">Task Request</option></select></div><div class="fg"><label>Start date</label><input type="date" id="req-start"></div><div class="fg"><label>End date</label><input type="date" id="req-end"></div><div class="fg"><label>Notes (optional)</label><textarea id="req-note" rows="3" style="resize:none"></textarea></div><div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitRequest(\''+patId+'\')"><i class="ti ti-send"></i>Submit</button></div>';
  } else if(type==='earlyClockOut'&&data){
    box.innerHTML='<div class="modal-title"><i class="ti ti-clock-stop"></i>Early Clock Out</div><div style="background:#FEF3C7;border-radius:10px;padding:12px;margin-bottom:14px;font-size:13px;color:#92400E"><strong>'+data.earlyLabel+'</strong> remaining on your shift (ends '+data.adjEndStr+'). Requires approval.</div><div class="fg"><label>Reason</label><textarea id="early-reason" rows="3" placeholder="Reason for early clock out..." style="resize:none"></textarea></div><div class="modal-footer"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="submitEarlyOut(\''+data.patId+'\',\''+data.attId+'\',\''+data.adjEndStr+'\')"><i class="ti ti-send"></i>Submit</button></div>';
  }
  ov.classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

async function doChangePw(){
  const p1=document.getElementById('cpw1').value;const p2=document.getElementById('cpw2').value;
  const e=document.getElementById('cpw-e');const ok=document.getElementById('cpw-ok');
  if(p1.length<8){e.textContent='Min 8 characters';e.style.display='block';return;}
  if(p1!==p2){e.textContent='Passwords do not match';e.style.display='block';return;}
  const{error}=await sb.auth.updateUser({password:p1});
  if(error){e.textContent=error.message;e.style.display='block';}
  else{ok.textContent='Password updated!';ok.style.display='block';setTimeout(closeModal,1500);}
}

async function submitRequest(patId){
  const type=document.getElementById('req-type').value;
  const start=document.getElementById('req-start').value;
  const end=document.getElementById('req-end').value;
  const note=document.getElementById('req-note').value;
  const e=document.getElementById('req-e');
  if(!type){e.textContent='Select a type';e.style.display='block';return;}
  if(!start||!end){e.textContent='Select start and end dates';e.style.display='block';return;}
  if(end<start){e.textContent='End date cannot be before start';e.style.display='block';return;}
  const pat=D.patrollers.find(p=>p.user_id===D.profile.id);
  if(type==='Task'){
    const{error}=await sb.from('task_requests').insert({patroller_id:patId,patroller_name:pat?.name||'',task_type:'Task',date:start,start_time:'',end_time:'',status:'Pending',description:note||'Task request'});
    if(error){e.textContent=error.message;e.style.display='block';return;}
  } else {
    const{error}=await sb.from('time_off_requests').insert({patroller_id:patId,patroller_name:pat?.name||'',request_type:type,start_date:start,end_date:end,comment:note||null,status:'Pending',submitted_by:D.profile.id});
    if(error){e.textContent=error.message;e.style.display='block';return;}
  }
  closeModal();await reload();
}

async function submitEarlyOut(patId,attId,adjEndStr){
  const reason=document.getElementById('early-reason').value.trim()||'No reason provided';
  const pat=D.patrollers.find(p=>p.id===patId);
  const bhr=getBahrainNow();
  const timeStr=String(bhr.getUTCHours()).padStart(2,'0')+':'+String(bhr.getUTCMinutes()).padStart(2,'0');
  await sb.from('task_requests').insert({patroller_id:patId,patroller_name:pat?.name||'',task_type:'Early Clock Out',date:todayStr(),start_time:timeStr,end_time:adjEndStr,status:'Pending',description:'Early clock out. Reason: '+reason+'. Att ID: '+attId});
  closeModal();await reload();
}
